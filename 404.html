  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg: #07090f; --bg2: #0c1018;
      --blue: #5294ff; --blue2: #3a7ff0;
      --text: #e2e8f0; --mid: #94a3b8; --dim: #475569;
      --edge: rgba(255,255,255,.07);
      --fb: 'DM Sans', system-ui, sans-serif;
      --fh: 'Syne', sans-serif;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--fb); }
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px; text-align:center; }

    /* Background glow */
    .glow { position:fixed; top:20%; left:50%; transform:translateX(-50%); width:600px; height:300px; background:radial-gradient(ellipse,rgba(82,148,255,.08) 0%,transparent 70%); pointer-events:none; }

    /* Shield icon */
    .icon { width:72px; height:72px; background:rgba(82,148,255,.1); border:1px solid rgba(82,148,255,.2); border-radius:18px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }

    /* Code badge */
    .code { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color:var(--blue); background:rgba(82,148,255,.1); border:1px solid rgba(82,148,255,.2); padding:4px 12px; border-radius:20px; display:inline-block; margin-bottom:20px; letter-spacing:.08em; }

    h1 { font-family:var(--fh); font-size:clamp(32px,6vw,56px); font-weight:800; color:#fff; line-height:1.1; margin-bottom:14px; }
    h1 span { color:var(--blue); }

    p { font-size:15px; color:var(--mid); line-height:1.7; max-width:420px; margin:0 auto 32px; }

    .btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:9px; font-family:var(--fb); font-size:14px; font-weight:600; text-decoration:none; transition:all .2s; border:none; cursor:pointer; }
    .btn-p { background:var(--blue); color:#fff; box-shadow:0 0 24px rgba(82,148,255,.2); }
    .btn-p:hover { background:var(--blue2); transform:translateY(-1px); box-shadow:0 6px 24px rgba(82,148,255,.35); }
    .btn-g { background:transparent; color:var(--text); border:1px solid var(--edge); }
    .btn-g:hover { border-color:var(--blue); color:var(--blue); }

    /* Countdown */
    .redirect { margin-top:32px; font-size:12px; color:var(--dim); }
    .redirect span { color:var(--blue); font-weight:600; }

    /* Footer */
    footer { position:fixed; bottom:20px; font-size:11px; color:var(--dim); }
  </style>
</head>

  <div class="redirect">Redirecting to portfolio in <span id="count">10</span>s</div>

  <footer>Chris Olowo, PMP® · Cybersecurity Project Manager & GRC Leader</footer>

  <script>
    var n = 10;
    var el = document.getElementById('count');
    var t = setInterval(function() {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(t);
        window.location.href = 'https://chrisolowolafe-sys.github.io/Chris-Olowo-GRC-Portfolio/';
      }
    }, 1000);
  </script>
</body>
