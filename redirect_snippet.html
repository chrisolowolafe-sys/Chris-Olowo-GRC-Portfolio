<!--
  ============================================================
  GITHUB PAGES → CLOUDFLARE PAGES REDIRECT
  
  Paste this as the VERY FIRST THING inside your <head> tag
  on ALL HTML files: index.html, grc-platform.html, terms.html, 404.html
  
  How it works: checks if the visitor is on the GitHub Pages
  domain — if yes, redirects them to the Cloudflare Pages
  equivalent URL, preserving the path. Cloudflare Pages is
  unaffected because the hostname check won't match.
  ============================================================
-->
<script>
  (function() {
    var gh = 'chrisolowolafe-sys.github.io';
    var cf = 'https://chris-olowo-grc-portfolio.pages.dev';
    if (window.location.hostname === gh) {
      var path = window.location.pathname.replace('/Chris-Olowo-GRC-Portfolio', '');
      window.location.replace(cf + path + window.location.search + window.location.hash);
    }
  })();
</script>
