  <style>
    /* =============================================
       DESIGN SYSTEM — Dark Industrial Precision
    ============================================= */
    :root {
      --bg-void: #080c14;
      --bg-base: #0d1117;
      --bg-elevated: #161b27;
      --bg-surface: #1c2333;
      --bg-hover: #212840;
      --border: rgba(99,120,180,0.18);
      --border-strong: rgba(99,120,180,0.35);
      --text-primary: #e8edf5;
      --text-secondary: #8b98b5;
      --text-muted: #556080;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --accent-hover: #6ba3ff;
      --green: #2ecc8a;
      --green-dim: rgba(46,204,138,0.12);
      --red: #f05252;
      --red-dim: rgba(240,82,82,0.12);
      --orange: #f5a623;
      --orange-dim: rgba(245,166,35,0.12);
      --purple: #9b6cff;
      --purple-dim: rgba(155,108,255,0.12);
      --yellow: #f5d020;
      --yellow-dim: rgba(245,208,32,0.12);
      --cyan: #22d3ee;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--font-body);
      background: var(--bg-void);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }
    /* Demo banner top offset — JS removes this class when banner is dismissed */
    body.has-demo-banner #app { padding-top: 34px; }
    /* =============================================
       LAYOUT
    ============================================= */
    #app { display: flex; height: 100vh; }
    /* ═══ SIDEBAR — COLLAPSIBLE ══════════════════════════════════════════════ */
    /* Change widths here */
    :root { --plat-expanded: 240px; }
    @media (prefers-reduced-motion: reduce) { .sidebar, .sidebar *, .sidebar-peek-btn { transition-duration: 0ms !important; } }
    body.drawer-open { overflow: hidden; }

    /* Sidebar: fully hidden by default, slides in as overlay */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--plat-expanded);
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
      transform: translateX(-100%);
      transition: transform 220ms cubic-bezier(.4,0,.2,1), box-shadow 220ms;
      z-index: 300;
      box-shadow: none;
    }
    .sidebar.is-open {
      transform: translateX(0);
      box-shadow: 4px 0 32px rgba(0,0,0,.5);
    }
    /* is-collapsed is no longer used for desktop — keep for mobile compat */
    .sidebar.is-collapsed { transform: translateX(-100%); }

    /* Scrim — shown whenever sidebar is open */
    #platScrim {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200; cursor: pointer;
      backdrop-filter: blur(2px);
    }
    #platScrim.is-visible { display: block; }

    /* Floating peek button — always visible, top-left corner */
    .sidebar-peek-btn {
      position: fixed; top: 12px; left: 12px; z-index: 400;
      width: 38px; height: 38px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 150ms, color 150ms, opacity 200ms, transform 200ms;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .sidebar-peek-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-peek-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .sidebar-peek-btn svg { width: 18px; height: 18px; pointer-events: none; }
    /* Hide peek btn while sidebar is open */
    .sidebar-peek-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-8px); }

    /* Topbar toggle button (inside sidebar header) */
    .sidebar-toggle-btn {
      width: 34px; height: 34px; background: transparent;
      border: none; border-radius: 6px;
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 150ms, color 150ms;
    }
    .sidebar-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .sidebar-toggle-btn svg { width: 18px; height: 18px; pointer-events: none; }

    /* ═══ SIDEBAR LOGO ══════════════════════════════════════════════════════════ */
    .sidebar-logo {
      padding: 16px 14px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      overflow: hidden; flex-shrink: 0;
      background: linear-gradient(180deg,rgba(79,142,247,.05) 0%,transparent 100%);
    }
    .logo-mark {
      width: 34px; height: 34px; min-width: 34px; flex-shrink: 0;
      background: linear-gradient(135deg,#4f8ef7 0%,#2563eb 55%,#1a3fa8 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(79,142,247,.45), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .logo-text { overflow: hidden; flex: 1; min-width: 0; }
    .logo-text h1 {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 800; letter-spacing: .01em;
      color: var(--text-primary); white-space: nowrap; line-height: 1.2;
    }
    .logo-sub-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .logo-text .logo-sub {
      font-size: 9.5px; color: var(--accent);
      font-weight: 500; letter-spacing: .04em;
      white-space: nowrap; opacity: .85;
    }
    .logo-env {
      font-size: 8px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-muted); background: var(--bg-surface);
      border: 1px solid var(--border-strong); border-radius: 3px;
      padding: 1px 5px; white-space: nowrap; flex-shrink: 0;
    }

    /* ═══ SIDEBAR NAV ════════════════════════════════════════════════════════════ */
    .sidebar-nav {
      flex: 1; overflow-y: auto; padding: 6px 0 12px; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: #243050 transparent;
    }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: #243050; border-radius: 999px; }
    .sidebar-nav::-webkit-scrollbar-thumb:hover { background: #3d5080; }

    /* ── group ── */
    .nav-group { margin-bottom: 0; }
    .nav-group-label {
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 14px 14px 5px;
      white-space: nowrap; overflow: hidden;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-group-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border); opacity: .6;
    }

    /* ── item ── */
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 14px 7px 12px;
      font-size: 12.5px; color: var(--text-secondary);
      cursor: pointer; position: relative;
      border-left: 2px solid transparent;
      border-radius: 0 7px 7px 0;
      margin: 1px 10px 1px 0;
      transition: background .12s, color .12s, border-color .12s;
      user-select: none; white-space: nowrap; overflow: hidden;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      background: linear-gradient(90deg,rgba(79,142,247,.16) 0%,rgba(79,142,247,.05) 100%);
      color: var(--accent); border-left-color: var(--accent); font-weight: 600;
    }
    .nav-item .nav-icon { width: 18px; min-width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; opacity: .75; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-item .nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .nav-badge {
      margin-left: auto; flex-shrink: 0;
      background: rgba(240,82,82,.18); color: var(--red);
      font-size: 9px; font-weight: 700; min-width: 17px; text-align: center;
      padding: 1px 5px; border-radius: 8px;
    }

    /* ── assessments collapsible ── */
    .nav-assessments-toggle {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 14px 7px 12px;
      font-size: 12.5px; color: var(--text-secondary);
      cursor: pointer; border-left: 2px solid transparent;
      border-radius: 0 7px 7px 0; margin: 1px 10px 1px 0;
      transition: background .12s, color .12s; user-select: none;
      position: relative;
    }
    .nav-assessments-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-assessments-toggle.has-active { color: var(--accent); border-left-color: var(--accent); font-weight:600;
      background: linear-gradient(90deg,rgba(79,142,247,.16) 0%,rgba(79,142,247,.05) 100%); }
    .nav-assessments-toggle .nav-icon { width:18px;min-width:18px;text-align:center;font-size:13px;flex-shrink:0;opacity:.75; }
    .nav-assessments-toggle.has-active .nav-icon { opacity:1; }
    .nav-assessments-toggle .nav-label { flex:1;font-size:12.5px; }
    .nav-chevron { font-size:9px;color:var(--text-muted);transition:transform .2s;flex-shrink:0; }
    .nav-chevron.open { transform:rotate(90deg); }
    .nav-subnav {
      overflow: hidden;
      transition: max-height .22s cubic-bezier(.4,0,.2,1), opacity .18s;
      opacity: 1;
    }
    .nav-subnav.closed { max-height: 0 !important; opacity: 0; }
    .nav-subitem {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px 5px 40px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; border-left: 2px solid transparent;
      border-radius: 0 6px 6px 0; margin: 1px 10px 1px 0;
      transition: background .12s, color .12s, border-color .12s;
      user-select: none; white-space: nowrap;
    }
    .nav-subitem:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .nav-subitem.active { color: var(--accent); border-left-color: var(--accent); font-weight:600;
      background: linear-gradient(90deg,rgba(79,142,247,.13) 0%,transparent 100%); }
    .nav-subitem .nav-icon { width:14px;min-width:14px;text-align:center;font-size:11px;flex-shrink:0; }

    /* ── sidebar footer ── */
    .sidebar-footer {
      padding: 10px 10px 12px;
      border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-footer-btn {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      font-size: 11.5px; color: var(--text-muted); cursor: pointer;
      border-radius: 6px; transition: background .12s, color .12s;
      user-select: none; border: none; background: none; width: 100%; text-align: left;
    }
    .sidebar-footer-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .sidebar-footer-btn .nav-icon { font-size: 12px; width:16px;text-align:center;opacity:.7; }

    .main-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg-void);
      /* Sidebar no longer takes layout space — main area fills full width */
      width: 100%;
    }
    .topbar {
      height: 56px; min-height: 56px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px 0 62px; gap: 16px;  /* left pad clears floating peek button */
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-subtitle { font-size: 12px; color: var(--text-muted); margin-left: 2px; }
    .topbar-spacer { flex: 1; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      width: 240px;
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text-primary); font-family: var(--font-body);
      font-size: 13px; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .avatar:hover { transform: scale(1.08); box-shadow: 0 0 0 3px rgba(79,142,247,.3); }
    .avatar.active { box-shadow: 0 0 0 3px rgba(79,142,247,.5); }
    .pmenu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: #cbd5e1; transition: background .12s;
    }
    .pmenu-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .pmenu-danger { color: #f87171; }
    .pmenu-danger:hover { background: rgba(248,113,113,.1); color: #fca5a5; }
    .content-area { flex: 1; overflow-y: auto; padding: 24px;
      scrollbar-width: auto; scrollbar-color: #38bdf8 #0b1220; }
    .content-area::-webkit-scrollbar { width: 12px; }
    .content-area::-webkit-scrollbar-track { background: #0b1220; }
    .content-area::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 999px; border: 3px solid #0b1220; }
    .content-area::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
    /* =============================================
       COMMON COMPONENTS
    ============================================= */
    .page-header { margin-bottom: 24px; }
    .page-header h2 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
    }
    .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger { background: var(--red); color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-xs { padding: 2px 8px; font-size: 11px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .badge-critical { background: rgba(240,82,82,0.2); color: var(--red); }
    .badge-high { background: rgba(245,166,35,0.2); color: var(--orange); }
    .badge-medium { background: rgba(245,208,32,0.2); color: var(--yellow); }
    .badge-low { background: rgba(46,204,138,0.2); color: var(--green); }
    .badge-info { background: var(--accent-dim); color: var(--accent); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-success { background: var(--green-dim); color: var(--green); }
    .badge-warning { background: var(--orange-dim); color: var(--orange); }
    .badge-gray { background: rgba(139,152,181,0.15); color: var(--text-secondary); }
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 12px; }
    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left; white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      font-size: 13px; color: var(--text-secondary);
      border-bottom: 1px solid rgba(99,120,180,0.08);
      vertical-align: middle;
    }
    tr:hover td { background: var(--bg-hover); }
    tr:last-child td { border-bottom: none; }
    .td-primary { color: var(--text-primary); font-weight: 500; }
    .td-mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    /* Filter bar */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Metric cards */
    .metric-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .metric-card .metric-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .metric-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .metric-icon.blue { background: var(--accent-dim); color: var(--accent); }
    .metric-icon.red { background: var(--red-dim); color: var(--red); }
    .metric-icon.green { background: var(--green-dim); color: var(--green); }
    .metric-icon.orange { background: var(--orange-dim); color: var(--orange); }
    .metric-icon.purple { background: var(--purple-dim); color: var(--purple); }
    .metric-value {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--text-primary); line-height: 1;
    }
    .metric-label { font-size: 12px; color: var(--text-secondary); }
    .metric-trend { font-size: 11px; }
    .metric-trend.up { color: var(--red); }
    .metric-trend.down { color: var(--green); }
    .metric-trend.flat { color: var(--text-muted); }
    /* Section divider */
    .section-divider {
      height: 1px; background: var(--border);
      margin: 24px 0;
    }
    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }
    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(8,12,20,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 560px; max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-lg { width: 780px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 18px;
      cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .form-control {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: var(--font-body); font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    /* Progress */
    .progress-bar {
      height: 6px; background: var(--bg-surface);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-item {
      padding: 8px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    .tab-item:hover { color: var(--text-primary); }
    .tab-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    /* Severity dots */
    .severity-dot {
      width: 8px; height: 8px;
      border-radius: 50%; display: inline-block;
      margin-right: 6px; flex-shrink: 0;
    }
    .dot-critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot-high { background: var(--orange); }
    .dot-medium { background: var(--yellow); }
    .dot-low { background: var(--green); }
    /* =============================================
       DASHBOARD
    ============================================= */
    .health-ring {
      position: relative; width: 110px; height: 110px;
      flex-shrink: 0;
    }
    .health-ring canvas { position: absolute; inset: 0; }
    .health-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .health-ring-label .score {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }
    .health-ring-label .score-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .dashboard-bento {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }
    .bento-wide { grid-column: span 2; }
    .bento-tall { grid-row: span 2; }
    .risk-row-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(99,120,180,0.08);
    }
    .risk-row-item:last-child { border-bottom: none; }
    .risk-row-item .risk-name {
      flex: 1; font-size: 13px; color: var(--text-secondary);
    }
    .score-pill {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      min-width: 32px; text-align: center;
    }
    /* =============================================
       RISK MATRIX
    ============================================= */
    .risk-matrix-wrap { overflow-x: auto; padding-bottom: 8px; }
    .risk-matrix {
      display: grid;
      grid-template-columns: 40px repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr) 40px;
      gap: 4px;
      width: 100%; max-width: 640px;
      aspect-ratio: 1;
      margin: 0 auto;
    }
    .matrix-cell {
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      position: relative;
      cursor: default;
      transition: transform 0.1s;
      min-height: 60px;
    }
    .matrix-cell:hover { transform: scale(1.02); z-index: 1; }
    .cell-low { background: rgba(46,204,138,0.15); border: 1px solid rgba(46,204,138,0.3); }
    .cell-medium { background: rgba(245,208,32,0.15); border: 1px solid rgba(245,208,32,0.3); }
    .cell-high { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); }
    .cell-critical { background: rgba(240,82,82,0.15); border: 1px solid rgba(240,82,82,0.3); }
    .cell-label { color: var(--text-muted); font-size: 10px; writing-mode: vertical-rl; text-orientation: mixed; }
    .cell-label-h { color: var(--text-muted); font-size: 10px; }
    .risk-dot {
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white;
      cursor: pointer;
      transition: transform 0.15s;
      z-index: 2;
    }
    .risk-dot:hover { transform: scale(1.3); z-index: 10; }
    .risk-dot-tooltip {
      display: none;
      position: absolute;
      bottom: 130%; left: 50%; transform: translateX(-50%);
      background: var(--bg-void);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px 10px;
      white-space: nowrap;
      font-size: 11px; color: var(--text-primary);
      z-index: 20;
      pointer-events: none;
    }
    .risk-dot:hover .risk-dot-tooltip { display: block; }
    .matrix-axis-label {
      font-size: 11px; color: var(--text-muted);
      text-align: center;
    }
    .axis-title {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      text-align: center; margin-top: 8px;
    }
    /* =============================================
       FRAMEWORK LIBRARY
    ============================================= */
    .framework-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .framework-chip:hover { border-color: var(--accent); color: var(--accent); }
    .framework-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .control-row td:first-child { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    /* =============================================
       SCROLLBARS
    ============================================= */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #0b1220; }
    ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 999px; border: 3px solid #0b1220; }
    ::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
    * { scrollbar-width: auto; scrollbar-color: #38bdf8 #0b1220; }
    /* =============================================
       RESPONSIVE ARCHITECTURE — Mobile-First
       Breakpoints:
         Mobile:       < 768px
         Tablet:       768px – 1023px
         Desktop:      1024px – 1439px
         Large/Ultra:  ≥ 1440px
    ============================================= */

    /* ── View Toggle Button ─────────────────────── */
    #view-toggle-bar {
      position: fixed; bottom: 16px; right: 16px; z-index: 500;
      display: flex; gap: 4px;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    .vtb-btn {
      padding: 5px 10px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      font-family: var(--font-mono); background: transparent;
      color: var(--text-muted); transition: all .15s; white-space: nowrap;
    }
    .vtb-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .vtb-btn.active { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }

    /* ── Large / Ultrawide (≥ 1440px) ──────────────────── */
    @media (min-width: 1440px) {
      body:not(.view-mobile):not(.view-standard) .content-area { padding: 32px 40px; }
      body:not(.view-mobile):not(.view-standard) .grid-4 { grid-template-columns: repeat(4, 1fr); }
      body:not(.view-mobile):not(.view-standard) .grid-3 { grid-template-columns: repeat(3, 1fr); }
      body:not(.view-mobile):not(.view-standard) .grid-2 { grid-template-columns: repeat(2, 1fr); }
      body:not(.view-mobile):not(.view-standard) .dashboard-bento { grid-template-columns: repeat(4, 1fr); }
      body:not(.view-mobile):not(.view-standard) .bento-wide { grid-column: span 2; }
      body:not(.view-mobile):not(.view-standard) .page-header h2 { font-size: 26px; }
      body:not(.view-mobile):not(.view-standard) table th, body:not(.view-mobile):not(.view-standard) table td { padding: 12px 16px; font-size: 13px; }
      body:not(.view-mobile):not(.view-standard) .card { padding: 24px; }
    }

    /* ── Desktop (1024px – 1439px) ─────────────────────── */
    @media (min-width: 1024px) and (max-width: 1439px) {
      body:not(.view-mobile) .grid-4 { grid-template-columns: repeat(4, 1fr); }
      body:not(.view-mobile) .dashboard-bento { grid-template-columns: 1fr 1fr 1fr 1fr; }
      body:not(.view-mobile) .bento-wide { grid-column: span 2; }
    }

    /* ── Tablet (768px – 1023px) ────────────────────────── */
    @media (min-width: 768px) and (max-width: 1023px) {
      body:not(.view-mobile) .grid-4 { grid-template-columns: repeat(2, 1fr); }
      body:not(.view-mobile) .grid-3 { grid-template-columns: repeat(2, 1fr); }
      body:not(.view-mobile) .grid-2 { grid-template-columns: repeat(2, 1fr); }
      body:not(.view-mobile) .dashboard-bento { grid-template-columns: 1fr 1fr; }
      body:not(.view-mobile) .bento-wide { grid-column: span 2; }
      body:not(.view-mobile) .content-area { padding: 20px; }
      body:not(.view-mobile) .topbar { padding: 0 20px; }
    }

    /* ── Mobile (< 768px) ────────────────────────────────── */
    @media (max-width: 767px) {
      body:not(.view-standard):not(.view-wide) .topbar { padding: 0 16px; height: 52px; }
      body:not(.view-standard):not(.view-wide) .content-area { padding: 14px 12px; }
      body:not(.view-standard):not(.view-wide) .grid-4,
      body:not(.view-standard):not(.view-wide) .grid-3,
      body:not(.view-standard):not(.view-wide) .grid-2 { grid-template-columns: 1fr !important; }
      body:not(.view-standard):not(.view-wide) .dashboard-bento { grid-template-columns: 1fr !important; }
      body:not(.view-standard):not(.view-wide) .bento-wide { grid-column: span 1 !important; }
      body:not(.view-standard):not(.view-wide) .card { padding: 14px; }
      body:not(.view-standard):not(.view-wide) .btn { padding: 10px 16px; font-size: 14px; min-height: 44px; }
      body:not(.view-standard):not(.view-wide) .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 40px; }
      body:not(.view-standard):not(.view-wide) table th { font-size: 10px; padding: 8px 10px; }
      body:not(.view-standard):not(.view-wide) table td { font-size: 12px; padding: 8px 10px; }
      body:not(.view-standard):not(.view-wide) .page-header h2 { font-size: 18px; }
      body:not(.view-standard):not(.view-wide) .page-header p { font-size: 12px; }
      /* Mobile: hide non-essential table columns */
      body:not(.view-standard):not(.view-wide) table .hide-mobile { display: none; }
      /* Stack card-headers on mobile */
      body:not(.view-standard):not(.view-wide) .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
      /* Topbar: hide search on mobile */
      body:not(.view-standard):not(.view-wide) .topbar-search { display: none; }
      /* Larger touch targets for nav */
      body:not(.view-standard):not(.view-wide) .nav-item { min-height: 44px; padding: 10px 14px; }
      /* View toggle smaller on mobile */
      #view-toggle-bar { bottom: 8px; right: 8px; }
      .vtb-btn { padding: 4px 7px; font-size: 9px; }
    }

    /* ── Medium screens fallback (1024px – 1100px) ─────── */
    @media (max-width: 1100px) {
      body:not(.view-mobile) .grid-4 { grid-template-columns: repeat(2, 1fr); }
      body:not(.view-mobile) .dashboard-bento { grid-template-columns: 1fr 1fr; }
      body:not(.view-mobile) .bento-wide { grid-column: span 2; }
    }

    /* ── Manual View Override Classes ───────────────────── */
    /* .view-mobile — forces mobile layout regardless of screen */
    body.view-mobile .grid-4,
    body.view-mobile .grid-3,
    body.view-mobile .grid-2 { grid-template-columns: 1fr !important; }
    body.view-mobile .dashboard-bento { grid-template-columns: 1fr !important; }
    body.view-mobile .bento-wide { grid-column: span 1 !important; }
    body.view-mobile .content-area { padding: 14px 12px !important; }
    body.view-mobile .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    body.view-mobile .btn { min-height: 44px; padding: 10px 16px; font-size: 14px; }
    body.view-mobile .topbar-search { display: none; }

    /* .view-wide — forces wide dashboard layout */
    body.view-wide .grid-4 { grid-template-columns: repeat(4, 1fr) !important; }
    body.view-wide .grid-3 { grid-template-columns: repeat(3, 1fr) !important; }
    body.view-wide .grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
    body.view-wide .dashboard-bento { grid-template-columns: repeat(4, 1fr) !important; }
    body.view-wide .bento-wide { grid-column: span 2 !important; }
    body.view-wide .content-area { padding: 32px 40px !important; }
    body.view-wide table th, body.view-wide table td { padding: 12px 16px; font-size: 13px; }
    /* =============================================
       INCIDENTS
    ============================================= */
    .timeline {
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute; left: 7px; top: 8px; bottom: 8px;
      width: 1px; background: var(--border);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 20px;
    }
    .timeline-dot {
      position: absolute; left: -24px; top: 4px;
      width: 15px; height: 15px;
      border-radius: 50%;
      border: 2px solid var(--bg-elevated);
    }
    .timeline-content {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .timeline-title { font-weight: 600; color: var(--text-primary); font-size: 13px; }
    .timeline-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    /* =============================================
       RESILIENCE / BIA
    ============================================= */
    .bia-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .bia-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .bia-name { font-weight: 600; color: var(--text-primary); font-size: 14px; }
    .rto-rpo {
      display: flex; gap: 12px; margin-top: 10px;
    }
    .rto-rpo-item {
      flex: 1;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }
    .rto-rpo-item .val {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--accent);
    }
    .rto-rpo-item .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    /* =============================================
       SOA
    ============================================= */
    .soa-row-applicable td { background: rgba(46,204,138,0.04); }
    .soa-row-excluded td { opacity: 0.6; }
    /* =============================================
       EVIDENCE
    ============================================= */
    .evidence-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; }
    .evidence-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.15s;
    }
    .evidence-card:hover { border-color: var(--border-strong); }
    .evidence-icon { font-size: 28px; text-align: center; margin-bottom: 4px; }
    .evidence-name { font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .evidence-meta { font-size: 11px; color: var(--text-muted); }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .upload-zone:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; }
    /* notification toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-elevated);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px; color: var(--green);
      z-index: 9999;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
    .score-25 { background: rgba(240,82,82,0.25); color: var(--red); }
    .score-20 { background: rgba(240,82,82,0.18); color: #f87171; }
    .score-16 { background: rgba(245,166,35,0.25); color: var(--orange); }
    .score-12 { background: rgba(245,166,35,0.18); color: #fbbf24; }
    .score-9 { background: rgba(245,208,32,0.2); color: var(--yellow); }
    .score-6 { background: rgba(245,208,32,0.15); color: #eab308; }
    .score-4 { background: rgba(46,204,138,0.2); color: var(--green); }
    .score-1 { background: rgba(46,204,138,0.15); color: #4ade80; }
    /* action row */
    .action-row { display: flex; gap: 6px; align-items: center; }

    /* =============================================
       LEARNING MODE
    ============================================= */
    .learning-hero {
      background: linear-gradient(135deg, #0d1b35 0%, #0d1117 60%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; position: relative; overflow: hidden;
    }
    .learning-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(79,142,247,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .learning-hero h2 {
      font-family: var(--font-display); font-size: 22px; font-weight: 800;
      color: var(--text-primary); margin-bottom: 6px;
    }
    .learning-hero p { font-size: 13px; color: var(--text-secondary); max-width: 520px; line-height: 1.7; }
    .learning-hero-stats {
      display: flex; gap: 24px; flex-shrink: 0;
    }
    .lhero-stat {
      text-align: center;

<div id="app"></div>

<!-- View Toggle Bar -->
<div id="view-toggle-bar" title="Manually override layout view">
  <button class="vtb-btn" id="vtb-mobile" onclick="setViewMode('mobile')" title="Mobile layout">📱 Mobile</button>
  <button class="vtb-btn active" id="vtb-standard" onclick="setViewMode('standard')" title="Standard layout">🖥 Standard</button>
  <button class="vtb-btn" id="vtb-wide" onclick="setViewMode('wide')" title="Wide dashboard layout">⬛ Wide</button>
</div>

<script>
// ── VIEW MODE TOGGLE (no page reload) ──────────────────────────────────────
var VIEW_MODES = ['mobile', 'standard', 'wide'];
var currentViewMode = 'standard';
function setViewMode(mode) {
  if (!VIEW_MODES.includes(mode)) return;
  currentViewMode = mode;
  document.body.classList.remove('view-mobile', 'view-standard', 'view-wide');
  if (mode !== 'standard') document.body.classList.add('view-' + mode);
  VIEW_MODES.forEach(function(m) {
    var btn = document.getElementById('vtb-' + m);
    if (btn) btn.classList.toggle('active', m === mode);
  });
  try { localStorage.setItem('grcViewMode', mode); } catch(e) {}
}
// Restore saved view mode on load
(function() {
  var saved = '';
  try { saved = localStorage.getItem('grcViewMode') || ''; } catch(e) {}
  // Also auto-detect: if narrow screen, default to mobile
  if (!saved) {
    if (window.innerWidth < 768) saved = 'mobile';
    else saved = 'standard';
  }
  setViewMode(saved);
  // Listen for resize to auto-suggest but not force a change (respects manual override)
  var userHasToggled = !!localStorage.getItem('grcViewMode');
  window.addEventListener('resize', function() {
    if (userHasToggled) return; // respect manual choice
    if (window.innerWidth < 768 && currentViewMode !== 'mobile') setViewMode('mobile');
    else if (window.innerWidth >= 768 && currentViewMode === 'mobile') setViewMode('standard');
  });
})();
</script>

  {id:'GDPR-Art.25', name:'Data protection by design',     cat:'Data Protection', framework:'GDPR',
   desc:'Article 25(1): Taking into account the state of the art, the cost of implementation and the nature, scope, context and purposes of processing as well as the risks, the controller shall implement appropriate technical and organisational measures — both at the time of the determination of the means for processing and at the time of the processing itself — to implement data-protection principles in an effective manner and to integrate the necessary safeguards into the processing.'},
  {id:'GDPR-Art.32', name:'Security of processing',        cat:'Data Protection', framework:'GDPR',
   desc:'Article 32(1): Taking into account the state of the art, the costs of implementation and the nature, scope, context and purposes of processing as well as the risk of varying likelihood and severity for the rights and freedoms of natural persons, the controller and processor shall implement appropriate technical and organisational measures to ensure a level of security appropriate to the risk, including: (a) the pseudonymisation and encryption of personal data; (b) the ability to ensure ongoing confidentiality, integrity, availability and resilience of processing systems; (c) the ability to restore availability and access to personal data in a timely manner in the event of a physical or technical incident; (d) a process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures.'},
  {id:'GDPR-Art.33', name:'Breach notification (72h)',     cat:'Incident Mgmt',   framework:'GDPR',

  {id:'CIS-1', name:'Inventory of Enterprise Assets', cat:'Asset Management', framework:'CIS',

function getStore() {
  try {
    const raw = localStorage.getItem('grc_store_v3');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveStore(data) {
  try {
    localStorage.setItem('grc_store_v3', JSON.stringify(data));
  } catch(e) {
    // localStorage unavailable (private browsing, storage full, or blocked)
    // [Production] localStorage unavailable — data will not persist this session.
  }
  setTimeout(takeRiskSnapshot, 0);
}
function initStore() {
  const existing = getStore();
  const seed = JSON.parse(JSON.stringify(SEED_DATA));
  // Seed if no data, OR if stale empty data from a previous broken version
  const isEmpty = !existing ||
    (!existing.assets?.length && !existing.risks?.length && !existing.controls?.length);
  if (isEmpty) {
    saveStore(seed);
    return;
  }
  // Patch any arrays that may be missing from older stored sessions
  let patched = false;
  const arrayFields = ['assets','risks','controls','evidence','vendors','audits','incidents','resilience','soa','policies','treatmentPlans'];
  arrayFields.forEach(f => {
    if (!Array.isArray(existing[f])) {
      existing[f] = Array.isArray(seed[f]) ? JSON.parse(JSON.stringify(seed[f])) : [];
      patched = true;
    }
  });
  if (patched) saveStore(existing);
}
function store() { return getStore() || JSON.parse(JSON.stringify(SEED_DATA)); }
function updateStore(fn) {
  const s = store();
  fn(s);
  s._userModified = true;
  saveStore(s);
  markVisitorActivity(); // Signal that visitor has their own data
  render();
  checkGuideStepValidation();
}

// ULID-like ID generator
function genId(prefix) {
  return prefix + '-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase();
}

// HTML escape helper — prevents XSS when rendering user-entered data into innerHTML
// ── XSS SANITIZATION (OWASP-aligned) ──────────────────────────────────────
// esc() — HTML-encodes all special characters before inserting into innerHTML.
// Covers OWASP A03:2021 – Injection (XSS).
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/\//g, '&#x2F;')
    .replace(/`/g, '&#96;');
}
// escUrl() — validates URLs, blocks javascript: and data: URI injection (OWASP A03).
function escUrl(url) {
  if (!url || typeof url !== 'string') return '#';
  var t = url.trim().toLowerCase().replace(/\s/g,'');
  if (t.startsWith('javascript:') || t.startsWith('vbscript:') || t.startsWith('data:text/html')) return '#';
  return url;
}
// escAttr() — encodes values for HTML attribute insertion.
function escAttr(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleLearningStep(moduleId, stepId) {
  const l = getLearning();
  if (!l.progress[moduleId]) l.progress[moduleId] = { completedSteps: [], started: true };
  const steps = l.progress[moduleId].completedSteps;
  const idx = steps.indexOf(stepId);
  if (idx === -1) steps.push(stepId);
  else steps.splice(idx, 1);
  l.progress[moduleId].started = true;
  saveLearning(l);
  render();
}

function startModule(id) {
  const l = getLearning();
  if (!l.progress[id]) l.progress[id] = { completedSteps: [], started: true };
  else l.progress[id].started = true;
  saveLearning(l);
  render();
}

function setLearningTab(tab) {
  const l = getLearning(); l.activeTab = tab; saveLearning(l); render();
}

function setLearningFilter(f) {
  const l = getLearning(); l.activeFilter = f; saveLearning(l); render();
}

function resetModuleProgress(id) {
  const l = getLearning();
  delete l.progress[id];
  saveLearning(l); render();
}

    + '<div style="font-size:12px;color:#475569">&#9201; ' + item.estimatedTime + ' &nbsp;·&nbsp; ' + item.difficulty + ' &nbsp;·&nbsp; ' + item.category + '</div>'
    + '<div style="display:flex;gap:10px">' + continueBtn + reviewBtn + '</div>'
    + '</div>'
    + '</div>';

  document.body.appendChild(overlay);

  // Mark as started if first open
  if (!started && !complete) {
    var lx = getLearning();
    if (!lx.progress[mid]) lx.progress[mid] = { completedSteps: [], started: true };
    else lx.progress[mid].started = true;
    saveLearning(lx);
  }
}

function riskCategory(score) {
  if (score >= 17) return 'Critical';
  if (score >= 10) return 'High';
  if (score >= 5) return 'Medium';
  return 'Low';
}
function riskScore(l,i){ return l*i; }

/** Sidebar is always an overlay — open/close on all screen sizes */
function applySidebarState() {
  const sb = document.getElementById('platSidebar');
  const sc = document.getElementById('platScrim');
  const pb = document.getElementById('platPeekBtn');
  if (!sb) return;
  const isOpen = sidebarMobileOpen;   // reuse flag for both mobile & desktop
  sb.classList.toggle('is-open', isOpen);
  sb.classList.remove('is-collapsed');
  if (sc) { sc.style.display = isOpen ? 'block' : 'none'; }
  if (pb) { pb.classList.toggle('hidden', isOpen); }
  document.body.classList.toggle('drawer-open', isOpen);
}

  sidebarMobileOpen = !sidebarMobileOpen;
  localStorage.setItem(PLAT_SIDEBAR_KEY, sidebarMobileOpen);
  applySidebarState();
}

// Safe report opener — falls back to inline modal if popups blocked
function openReport(html) {
  try {
    var w = window.open('', '_blank');
    if (!w || w.closed || typeof w.document === 'undefined') throw new Error('blocked');
    w.document.write(html);
    w.document.close();
  } catch(e) {
    // Popup blocked — show in a full-screen overlay modal instead
    var overlay = document.getElementById('report-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'report-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0008;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto';
      overlay.innerHTML = '<div style="background:#fff;border-radius:14px;width:100%;max-width:960px;position:relative;overflow:hidden">'
        + '<button onclick="document.getElementById(\'report-overlay\').remove()" style="position:sticky;top:0;float:right;margin:12px 12px 0 0;padding:6px 14px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;z-index:10">✕ Close</button>'
        + '<iframe id="report-frame" style="width:100%;min-height:90vh;border:none;display:block"></iframe>'
        + '</div>';
      document.body.appendChild(overlay);
    }
    var frame = document.getElementById('report-frame');
    frame.srcdoc = html;
  }
}
function closeModal() { modalState = null; render(); }

function _loadNavGroup(key, defaultOpen) {
  try { return JSON.parse(localStorage.getItem('grcNav_' + key) || String(defaultOpen)); } catch(e) { return defaultOpen; }
}
function _toggleNavGroup(key) {
  var open = !_loadNavGroup(key, true);
  localStorage.setItem('grcNav_' + key, open);
  var sub  = document.getElementById('nav-subnav-' + key);
  var chev = document.getElementById('nav-chevron-' + key);
  if (!sub) return;
  if (open) {
    sub.style.maxHeight = sub.scrollHeight + 'px';
    sub.classList.remove('closed');
    if (chev) chev.classList.add('open');
  } else {
    sub.style.maxHeight = sub.scrollHeight + 'px';
    requestAnimationFrame(function(){ sub.style.maxHeight = '0'; });
    sub.classList.add('closed');
    if (chev) chev.classList.remove('open');
  }
}
// Exposed wrappers so onclick strings stay simple
function toggleNavInventory()   { _toggleNavGroup('inventory'); }
function toggleNavRisk()        { _toggleNavGroup('risk'); }
function toggleNavAudit()       { _toggleNavGroup('audit'); }
function toggleNavResilience()  { _toggleNavGroup('resilience'); }
function toggleNavIntelligence(){ _toggleNavGroup('intelligence'); }
function toggleNavGovernance()  { _toggleNavGroup('governance'); }

function renderSidebar() {
  const s = store();
  const criticalRisks = s.risks.filter(r=>r.category==='Critical').length;
  const openIncidents = (s.incidents||[]).filter(i=>i.status!=='Resolved'&&i.status!=='Mitigated').length;

  // ── Group membership maps ──────────────────────────────────────────────
  const inventoryViews    = ['assets','vendors'];
  const riskViews         = ['risks','matrix','frameworks','controls','treatment'];
  const assessmentViews   = ['assessments','nist','iso27001','soc2','gdpr','cis','hipaa','iso42001'];
  const auditViews        = ['audits','evidence','soa'];
  const resilienceViews   = ['resilience','incidents'];
  const intelligenceViews = ['trends','kpiroi','siem','riskengine','aigovernance'];
  const governanceViews   = ['policies','reports','datagovernance','traceability'];

  // ── Open/closed state (all default open so nothing hidden on first visit) ─
  const invOpen   = _loadNavGroup('inventory',    true);
  const riskOpen  = _loadNavGroup('risk',         true);
  const audOpen   = _loadNavGroup('audit',        true);
  const resOpen   = _loadNavGroup('resilience',   true);
  const intOpen   = _loadNavGroup('intelligence', true);
  const govOpen   = _loadNavGroup('governance',   true);

  const assessActiveNow = assessmentViews.includes(currentView);
  const showAssess = sidebarAssessmentsOpen || assessActiveNow;

  // Auto-open the group containing current view
  const showInv  = invOpen  || inventoryViews.includes(currentView);
  const showRisk = riskOpen || riskViews.includes(currentView);
  const showAud  = audOpen  || auditViews.includes(currentView);
  const showRes  = resOpen  || resilienceViews.includes(currentView);
  const showInt  = intOpen  || intelligenceViews.includes(currentView);
  const showGov  = govOpen  || governanceViews.includes(currentView);

  // ── Sub-item renderer ──────────────────────────────────────────────────
  function sub(item) {
    const isActive = currentView === item.id;
    const isGuide  = guideState.active && currentStepDef() && currentStepDef().view === item.id && !isActive;
    return `<div class="nav-subitem ${isActive?'active':''} ${isGuide?'guide-target':''}"
         onclick="navigate('${item.id}');sidebarMobileOpen=false;applySidebarState();"
         tabindex="0" role="menuitem" aria-pressed="${isActive}"
         onkeydown="if(event.key==='Enter'||event.key===' '){navigate('${item.id}');sidebarMobileOpen=false;applySidebarState();}">
      <span class="nav-icon">${item.icon}</span>
      <span class="nav-label">${item.label}</span>
      ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
    </div>`;
  }

  // ── Collapsible group renderer ─────────────────────────────────────────
  function group(key, label, icon, hasActive, isOpen, toggleFn, items) {
    const h = isOpen ? items.length * 34 + 4 : 0;
    return `<div class="nav-group">
        <div id="nav-toggle-${key}"
             class="nav-assessments-toggle ${hasActive ? 'has-active' : ''}"
             onclick="${toggleFn}()"
             tabindex="0" role="button" aria-expanded="${isOpen}"
             onkeydown="if(event.key==='Enter'||event.key===' ')${toggleFn}()">
          <span class="nav-icon">${icon}</span>
          <span class="nav-label">${label}</span>
          <span class="nav-chevron ${isOpen ? 'open' : ''}" id="nav-chevron-${key}">&#9658;</span>
        </div>
        <div id="nav-subnav-${key}"
             class="nav-subnav ${isOpen ? '' : 'closed'}"
             style="max-height:${h}px">
          ${items.map(sub).join('')}
        </div>
      </div>`;
  }

  // ── Assessment group (uses legacy toggle for backwards compat) ─────────
  const assessItems = [
    { id:'assessments', icon:'▦',  label:'All Assessments' },
    { id:'nist',        icon:'🛡', label:'NIST CSF' },
    { id:'iso27001',    icon:'🔐', label:'ISO 27001' },
    { id:'soc2',        icon:'☁',  label:'SOC 2' },
    { id:'gdpr',        icon:'🇪🇺', label:'GDPR' },
    { id:'cis',         icon:'🔬', label:'CIS Controls' },
    { id:'hipaa',       icon:'🏥', label:'HIPAA' },
    { id:'iso42001',    icon:'🤖', label:'ISO 42001 (AI)' },
  ];
  const assessH = showAssess ? assessItems.length * 34 + 4 : 0;
  const assessGroup = `<div class="nav-group">
      <div id="nav-toggle-assessments"
           class="nav-assessments-toggle ${assessActiveNow ? 'has-active' : ''}"
           onclick="toggleAssessmentsNav()"
           tabindex="0" role="button" aria-expanded="${showAssess}"
           onkeydown="if(event.key==='Enter'||event.key===' ')toggleAssessmentsNav()">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Frameworks &amp; Assessments</span>
        <span class="nav-chevron ${showAssess ? 'open' : ''}" id="nav-chevron-assessments">&#9658;</span>
      </div>
      <div id="nav-subnav-assessments"
           class="nav-subnav ${showAssess ? '' : 'closed'}"
           style="max-height:${assessH}px">
        ${assessItems.map(sub).join('')}
      </div>
    </div>`;

  // ── Dashboard (standalone) ─────────────────────────────────────────────
  const isDash = currentView === 'dashboard';
  const dash = `<div class="nav-item ${isDash?'active':''}"
       onclick="navigate('dashboard');sidebarMobileOpen=false;applySidebarState();"
       tabindex="0" role="button" aria-pressed="${isDash}"
       onkeydown="if(event.key==='Enter'||event.key===' '){navigate('dashboard');sidebarMobileOpen=false;applySidebarState();}">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Dashboard</span>
  </div>`;

  // ── Learning footer item ───────────────────────────────────────────────
  const isLearn = currentView === 'learning';
  const learnItem = `<div class="nav-item ${isLearn?'active':''}"
      onclick="navigate('learning');sidebarMobileOpen=false;applySidebarState();"
      tabindex="0" role="button" aria-pressed="${isLearn}"
      onkeydown="if(event.key==='Enter'||event.key===' '){navigate('learning');sidebarMobileOpen=false;applySidebarState();}">
      <span class="nav-icon">🎓</span>
      <span class="nav-label">Learning Mode</span>
    </div>`;

  return `
    <aside class="sidebar" id="platSidebar" role="navigation" aria-label="Primary navigation">

      <!-- LOGO -->
      <div class="sidebar-logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6L12 2z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-4" stroke="rgba(255,255,255,0.95)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>GRC Platform</h1>
          <div class="logo-sub-row">
            <div class="logo-sub">Chris Olowo, PMP®</div>
            <div class="logo-env">v3</div>
          </div>
        </div>
      </div>

      <!-- NAV -->
      <nav class="sidebar-nav" role="menu">

        ${dash}

        ${group('inventory', 'Inventory', '🗄️',
          inventoryViews.includes(currentView), showInv, 'toggleNavInventory', [
          { id:'assets',  icon:'🖥️', label:'Assets' },
          { id:'vendors', icon:'🏢', label:'Vendors' },
        ])}

        ${group('risk', 'Risk &amp; Controls', '⚠️',
          riskViews.includes(currentView), showRisk, 'toggleNavRisk', [
          { id:'risks',      icon:'⚠️',  label:'Risk Register', badge: criticalRisks||null },
          { id:'matrix',     icon:'🗂️',  label:'Risk Matrix' },
          { id:'frameworks', icon:'📚', label:'Framework Library' },
          { id:'controls',   icon:'🔒', label:'Controls' },
          { id:'treatment',  icon:'🗂️', label:'Treatment Plans' },
        ])}

        ${assessGroup}

        ${group('audit', 'Audit &amp; Compliance', '📋',
          auditViews.includes(currentView), showAud, 'toggleNavAudit', [
          { id:'audits',   icon:'📋', label:'Audits' },
          { id:'evidence', icon:'📁', label:'Evidence' },
          { id:'soa',      icon:'📝', label:'Statement of Applicability' },
        ])}

        ${group('resilience', 'Resilience', '💡',
          resilienceViews.includes(currentView), showRes, 'toggleNavResilience', [
          { id:'resilience', icon:'💡', label:'Business Continuity' },
          { id:'incidents',  icon:'🚨', label:'Incidents', badge: openIncidents||null },
        ])}

        ${group('intelligence', 'Intelligence', '📈',
          intelligenceViews.includes(currentView), showInt, 'toggleNavIntelligence', [
          { id:'trends',       icon:'📈', label:'Risk Trends' },
          { id:'kpiroi',       icon:'💰', label:'KPIs &amp; ROI' },
          { id:'siem',         icon:'🔔', label:'SIEM Alert Feed' },
          { id:'riskengine',   icon:'⚙️', label:'Risk Engine' },
          { id:'aigovernance', icon:'🤖', label:'AI Governance' },
        ])}

        ${group('governance', 'Governance', '📄',
          governanceViews.includes(currentView), showGov, 'toggleNavGovernance', [
          { id:'policies',      icon:'📄', label:'Policy Register' },
          { id:'reports',       icon:'📊', label:'Reporting Hub' },
          { id:'datagovernance',icon:'🗂️', label:'Data Governance' },
          { id:'traceability',  icon:'🔗', label:'Control Universe Map' },
        ])}

      </nav>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        ${learnItem}
        <a href="index.html" style="display:flex;align-items:center;gap:10px;padding:7px 14px;margin:4px 8px 0;border-radius:0 7px 7px 0;font-size:12px;font-weight:500;color:var(--text-muted);text-decoration:none;transition:background .15s,color .15s;" onmouseover="this.style.background='var(--bg-hover)';this.style.color='var(--text-secondary)'" onmouseout="this.style.background='';this.style.color='var(--text-muted)'">
          <span style="font-size:13px;width:18px;text-align:center;opacity:.7">←</span>
          <span>Back to Portfolio</span>

    </aside>`;
}

function renderProjectDashboard(pid) {
  const ws  = getWorkspaces();
  const s   = (ws[pid] && ws[pid].store) ? ws[pid].store : JSON.parse(JSON.stringify(SEED_DATA));
  const projectDef = LEARNING_DATA.projects.find(p => p.id === pid);
  const l   = getLearning();
  const prog = l.progress[pid] || {};
  const steps = STEP_DEFS[pid] || [];
  const done  = prog.completedSteps || [];
  const pct   = steps.length ? Math.round(done.length / steps.length * 100) : 0;

  const title    = projectDef ? projectDef.title    : pid;
  const company  = projectDef ? projectDef.company  : '';
  const industry = projectDef ? projectDef.industry : '';
  const fws      = projectDef ? projectDef.frameworks : [];

  const critRisks = s.risks.filter(r => r.category === 'Critical').length;
  const highRisks = s.risks.filter(r => r.category === 'High').length;
  const openRisks = s.risks.filter(r => r.status   === 'Open').length;
  const implCtrl  = s.controls.filter(c => c.status === 'Implemented').length;
  const ctrlEff   = s.controls.length > 0 ? Math.round(implCtrl / s.controls.length * 100) : 0;
  const openInc   = s.incidents ? s.incidents.filter(i => i.status !== 'Resolved' && i.status !== 'Mitigated').length : 0;
  const highRiskVendors = s.vendors.filter(v => v.riskRating === 'High').length;
  const riskScore = Math.max(0, 100 - (critRisks * 20) - (highRisks * 10));
  const health    = Math.round((ctrlEff + riskScore) / 2);

  const topRisks  = [...s.risks].sort((a, b) => b.score - a.score).slice(0, 5);
  const recentInc = s.incidents ? [...s.incidents].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 4) : [];
  const statusCol = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--accent)';
  const statusTxt = pct === 100 ? 'Complete' : pct >= 50 ? 'In Progress' : 'Started';

  setTimeout(() => {
    const rc = document.getElementById('proj-risk-chart');
    if (rc && !chartInstances['proj-risk']) {
      const cats = ['Low','Medium','High','Critical'];
      chartInstances['proj-risk'] = new Chart(rc, {
        type:'bar',
        data:{labels:cats,datasets:[{data:cats.map(c=>s.risks.filter(r=>r.category===c).length),backgroundColor:['#2ecc8a','#f5d020','#f5a623','#f05252'],borderRadius:6,borderSkipped:false,maxBarThickness:48}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}},scales:{x:{grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5'}},y:{beginAtZero:true,grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5',stepSize:1,precision:0}}}}
      });
    }
    const cc = document.getElementById('proj-ctrl-chart');
    if (cc && !chartInstances['proj-ctrl']) {
      const statuses = ['Implemented','In Progress','Planned'];
      chartInstances['proj-ctrl'] = new Chart(cc, {
        type:'doughnut',
        data:{labels:statuses,datasets:[{data:statuses.map(st=>s.controls.filter(c=>c.status===st).length),backgroundColor:['#2ecc8a','#4f8ef7','#8b98b5'],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{position:'bottom',labels:{color:'#8b98b5',font:{size:11},padding:12}},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}},cutout:'65%'}
      });
    }
  }, 50);

  return `<div class="content-area" id="dashboard">

    <!-- Project identity banner -->
    <div style="background:linear-gradient(135deg,var(--bg-elevated) 0%,rgba(79,142,247,.08) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px">&#127959; Project Workspace</div>
        <div style="font-size:18px;font-weight:800;color:var(--text-primary);margin-bottom:2px">${title}</div>
        <div style="font-size:12px;color:var(--text-muted)">${company} &nbsp;·&nbsp; ${industry}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        ${fws.map(f => `<span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);color:var(--accent)">${f}</span>`).join('')}
        <span style="font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:2px solid ${statusCol};color:${statusCol}">${statusTxt}</span>
      </div>
    </div>

    <!-- Progress strip -->
    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:var(--text-primary)">Project Task Progress</span>
        <span style="font-size:12px;font-weight:800;color:${statusCol};font-family:var(--font-mono)">${done.length} / ${steps.length} tasks &nbsp;·&nbsp; ${pct}%</span>
      </div>
      <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${pct}%;background:${statusCol};height:10px"></div></div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        ${steps.map((st, i) => {
          const isDone = done.indexOf(i) !== -1;
          return `<span title="${st.label}" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:${isDone?'var(--green)':'var(--bg-surface)'};color:${isDone?'#fff':'var(--text-muted)'};border:1px solid ${isDone?'var(--green)':'var(--border)'}">${isDone?'✓':(i+1)}</span>`;
        }).join('')}
      </div>
    </div>

    <!-- KPI strip -->
    <div class="grid grid-5" style="margin-bottom:18px">
      <div class="metric-card" onclick="navigate('assets')" style="cursor:pointer">
        <div class="metric-top"><div class="metric-icon blue">🖥️</div><span class="metric-trend flat">Project</span></div>
        <div class="metric-value">${s.assets.length}</div><div class="metric-label">Assets Logged</div>
      </div>
      <div class="metric-card" onclick="navigate('risks')" style="cursor:pointer">
        <div class="metric-top"><div class="metric-icon red">⚠️</div><span class="metric-trend ${critRisks>0?'up':'flat'}">${critRisks} critical</span></div>
        <div class="metric-value">${s.risks.length}</div><div class="metric-label">Risks Identified</div>
      </div>
      <div class="metric-card" onclick="navigate('controls')" style="cursor:pointer">
        <div class="metric-top"><div class="metric-icon green">🔒</div><span class="metric-trend down">${ctrlEff}% impl.</span></div>
        <div class="metric-value">${s.controls.length}</div><div class="metric-label">Controls</div>
      </div>
      <div class="metric-card" onclick="navigate('evidence')" style="cursor:pointer">
        <div class="metric-top"><div class="metric-icon purple">📎</div><span class="metric-trend flat">Collected</span></div>
        <div class="metric-value">${s.evidence.length}</div><div class="metric-label">Evidence Items</div>
      </div>
      <div class="metric-card" onclick="navigate('vendors')" style="cursor:pointer">
        <div class="metric-top"><div class="metric-icon orange">🏢</div><span class="metric-trend ${highRiskVendors>0?'up':'flat'}">${highRiskVendors} high risk</span></div>
        <div class="metric-value">${s.vendors.length}</div><div class="metric-label">Vendors</div>
      </div>

    <!-- Health + Charts -->

        <div class="card-header"><div class="card-title">📊 Risk Distribution</div></div>
        <div style="height:160px"><canvas id="proj-risk-chart"></canvas></div>

      <!-- Control status -->

        <div class="card-header"><div class="card-title">🔒 Control Status</div></div>
        <div style="height:160px"><canvas id="proj-ctrl-chart"></canvas></div>

    <!-- Top risks + checklist -->
    <div class="dashboard-bento">

        ${topRisks.length > 0 ? topRisks.map(r => {
          const asset = s.assets.find(a => a.id === r.assetId);
          return `<div class="risk-row-item">
            <span class="severity-dot dot-${r.category.toLowerCase()}"></span>
            <span class="risk-name">${esc(r.description)}</span>
            ${asset ? `<span style="font-size:11px;color:var(--text-muted);margin-right:6px">${asset.name}</span>` : ''}
