  + '.cover-badge{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#93c5fd;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:14px}'
  + '.cover h1{font-size:26px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.15}'
  + '.cover-sub{font-size:13px;color:#94a3b8;margin-bottom:20px}'
  + '.cover-meta{display:flex;flex-wrap:wrap;gap:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1)}'
  + '.cover-meta-item strong{color:#fff;display:block;font-size:12px;margin-bottom:2px}'
  + '.cover-meta-item{font-size:11px;color:#94a3b8}'
  + '.section{background:#fff;border-radius:12px;padding:22px 26px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}'
  + '.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1e40af;margin-bottom:16px;display:flex;align-items:center;gap:8px}'
  + '.section-title::after{content:"";flex:1;height:1px;background:#e2e8f0}'
  + '.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:4px}'
  + '.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center}'
  + '.stat-val{font-size:26px;font-weight:800;color:#1e40af;line-height:1}'
  + '.stat-lbl{font-size:10px;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}'
  + '.stat.green .stat-val{color:#16a34a}.stat.orange .stat-val{color:#d97706}.stat.red .stat-val{color:#dc2626}'
  + '.prog-wrap{margin:12px 0 4px}'
  + '.prog-label{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:6px}'
  + '.prog-track{background:#e2e8f0;border-radius:8px;height:12px}'
  + '.prog-fill{border-radius:8px;height:12px}'
  + 'table{width:100%;border-collapse:collapse;font-size:12px}'
  + 'th{background:#1e3a5f;color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.04em}'
  + 'td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top;color:#334155}'
  + 'tr:last-child td{border-bottom:none}'
  + 'tr:hover td{background:#f8fafc}'
  + '.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}'
  + '.b-green{background:#dcfce7;color:#16a34a}.b-yellow{background:#fef9c3;color:#ca8a04}'
  + '.b-gray{background:#f1f5f9;color:#475569}.b-red{background:#fee2e2;color:#dc2626}'
  + '.b-blue{background:#dbeafe;color:#1d4ed8}.b-orange{background:#ffedd5;color:#ea580c}'
  + '.finding{background:#fff7ed;border-left:3px solid #f97316;border-radius:0 8px 8px 0;padding:14px 18px;font-size:13px;color:#9a3412;line-height:1.7;margin-bottom:12px}'
  + '.readiness{border-radius:12px;padding:18px 22px;margin-bottom:4px;display:flex;align-items:center;gap:16px}'
  + '.report-footer{margin-top:28px;padding-top:14px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#94a3b8}'
  + '.print-btn{padding:9px 22px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}'
  + '@media print{body{background:#fff}.shell{padding:20px}.print-btn{display:none}}'
  + '</style></head><body><div class="shell">'

  // ── COVER ──────────────────────────────────────────────────
  + '<div class="cover">'
  + '<div class="cover-badge">&#x1F9F0; Compliance Audit Report</div>'
  + '<h1>📋 ' + esc(a.name) + '</h1>'
  + '<div class="cover-sub">Audit-ready documentation generated from the GRC Platform — ' + esc(a.framework) + ' framework</div>'
  + '<div class="cover-meta">'
  + '<div class="cover-meta-item"><strong>' + esc(a.framework) + '</strong>Framework</div>'
  + '<div class="cover-meta-item"><strong>' + esc(a.lead || '—') + '</strong>Audit Lead</div>'
  + '<div class="cover-meta-item"><strong>' + (a.startDate || '—') + '</strong>Start Date</div>'
  + '<div class="cover-meta-item"><strong>' + (a.endDate || '—') + '</strong>End Date</div>'
  + '<div class="cover-meta-item"><strong style="color:' + statusCol + '">' + esc(a.status) + '</strong>Status</div>'
  + '<div class="cover-meta-item"><strong>' + now + '</strong>Generated</div>'
  + '</div>'
  + '</div>'

  // ── READINESS RATING ───────────────────────────────────────
  + '<div class="section">'
  + '<div class="section-title">Audit Readiness Assessment</div>'
  + '<div class="readiness" style="background:' + readinessCol + '18;border:1px solid ' + readinessCol + '44">'
  + '<div style="width:48px;height:48px;border-radius:50%;background:' + readinessCol + '22;border:2px solid ' + readinessCol + ';display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'
  + (ctrlEff >= 80 ? '✅' : ctrlEff >= 50 ? '⚠️' : '❌') + '</div>'
  + '<div>'
  + '<div style="font-size:16px;font-weight:800;color:' + readinessCol + '">' + readiness + '</div>'
  + '<div style="font-size:12px;color:#64748b;margin-top:2px">' + ctrlEff + '% of linked controls implemented &nbsp;·&nbsp; ' + linkedEvidence.length + ' evidence items collected &nbsp;·&nbsp; ' + linkedControls.length + ' controls in scope</div>'
  + '</div>'
  + '</div>'
  + '<div class="prog-wrap">'
  + '<div class="prog-label"><span>Control Implementation Rate</span><span>' + implCtrl + ' of ' + linkedControls.length + ' controls implemented (' + ctrlEff + '%)</span></div>'
  + '<div class="prog-track"><div class="prog-fill" style="width:' + ctrlEff + '%;background:' + readinessCol + '"></div></div>'
  + '</div>'
  + '</div>'

  // ── STATS ──────────────────────────────────────────────────
  + '<div class="section">'
  + '<div class="section-title">Audit Summary</div>'
  + '<div class="stat-grid">'
  + '<div class="stat ' + (linkedControls.length > 0 ? 'green' : '') + '"><div class="stat-val">' + linkedControls.length + '</div><div class="stat-lbl">Controls in Scope</div></div>'
  + '<div class="stat green"><div class="stat-val">' + implCtrl + '</div><div class="stat-lbl">Implemented</div></div>'
  + '<div class="stat orange"><div class="stat-val">' + inProgCtrl + '</div><div class="stat-lbl">In Progress</div></div>'
  + '<div class="stat"><div class="stat-val">' + plannedCtrl + '</div><div class="stat-lbl">Planned</div></div>'
  + '<div class="stat ' + (highEff > 0 ? 'green' : '') + '"><div class="stat-val">' + highEff + '</div><div class="stat-lbl">High Effectiveness</div></div>'
  + '<div class="stat ' + (linkedEvidence.length > 0 ? 'green' : 'red') + '"><div class="stat-val">' + linkedEvidence.length + '</div><div class="stat-lbl">Evidence Items</div></div>'
  + '</div>'
  + '</div>'

  // ── FINDINGS ───────────────────────────────────────────────
  + (a.findings
    ? '<div class="section"><div class="section-title">Audit Findings</div>'
      + '<div class="finding"><strong>⚠ Findings:</strong><br/>' + esc(a.findings) + '</div>'
      + '</div>'
    : '')

  // ── CONTROLS IN SCOPE ──────────────────────────────────────
  + '<div class="section">'
  + '<div class="section-title">Controls in Scope (' + linkedControls.length + ')</div>'
  + (linkedControls.length > 0
    ? '<table><thead><tr><th>ID</th><th>Control Name</th><th>Framework</th><th>Status</th><th>Effectiveness</th><th>Last Tested</th><th>Owner</th></tr></thead><tbody>'
      + linkedControls.map(function(c){
          var sb = {Implemented:'b-green','In Progress':'b-yellow',Planned:'b-gray'}[c.status]||'b-gray';
          var eb = {High:'b-green',Medium:'b-yellow',Low:'b-red',Untested:'b-gray'}[c.effectiveness||'Untested']||'b-gray';
          return '<tr><td style="font-family:monospace;font-size:11px">' + esc(c.id) + '</td>'
            + '<td style="font-weight:500">' + esc(c.name) + '</td>'
            + '<td>' + esc(c.framework) + '</td>'
            + '<td><span class="badge ' + sb + '">' + esc(c.status) + '</span></td>'
            + '<td><span class="badge ' + eb + '">' + esc(c.effectiveness||'Untested') + '</span></td>'

            + '<td>' + esc(c.owner) + '</td></tr>';
        }).join('')
      + '</tbody></table>'
    : '<div style="color:#64748b;font-size:13px;padding:8px 0">No controls linked to this audit yet. Edit the audit to link controls.</div>')
  + '</div>'

  // ── EVIDENCE INVENTORY ─────────────────────────────────────
  + '<div class="section">'
  + '<div class="section-title">Evidence Collected (' + linkedEvidence.length + ')</div>'
  + (linkedEvidence.length > 0
    ? '<table><thead><tr><th>ID</th><th>Evidence Name</th><th>Type</th><th>Linked Control</th><th>Date Collected</th></tr></thead><tbody>'
      + linkedEvidence.map(function(e){
          var ctrl = s.controls.find(function(c){ return c.id === e.controlId; });
          return '<tr><td style="font-family:monospace;font-size:11px">' + esc(e.id) + '</td>'
            + '<td style="font-weight:500">📄 ' + esc(e.name) + '</td>'
            + '<td>' + esc(e.type) + '</td>'
            + '<td>' + esc(ctrl ? ctrl.name : (e.controlId||'—')) + '</td>'
            + '<td style="color:#64748b">' + esc(e.date||e.uploadedAt||'—') + '</td></tr>';
        }).join('')
      + '</tbody></table>'
    : '<div style="color:#64748b;font-size:13px;padding:8px 0">No evidence linked to this audit yet. Go to Evidence to upload and link files to controls.</div>')
  + '</div>'

  // ── RECOMMENDATIONS ────────────────────────────────────────
  + '<div class="section">'
  + '<div class="section-title">Recommendations</div>'
  + (inProgCtrl > 0 ? '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9"><span style="color:#d97706;font-size:14px;margin-top:1px">⚠</span><div style="font-size:12px;color:#334155"><strong>' + inProgCtrl + ' control' + (inProgCtrl>1?'s are':' is') + ' in progress</strong> — complete implementation before final audit submission to improve readiness score.</div></div>' : '')
  + (plannedCtrl > 0 ? '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9"><span style="color:#dc2626;font-size:14px;margin-top:1px">❌</span><div style="font-size:12px;color:#334155"><strong>' + plannedCtrl + ' control' + (plannedCtrl>1?'s are':' is') + ' still planned</strong> — these represent gaps in the control environment and should be prioritised.</div></div>' : '')
  + (linkedEvidence.length === 0 ? '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9"><span style="color:#dc2626;font-size:14px;margin-top:1px">❌</span><div style="font-size:12px;color:#334155"><strong>No evidence collected</strong> — upload evidence files and link them to controls before submitting for audit review.</div></div>' : '')
  + (linkedEvidence.length > 0 && linkedEvidence.length < linkedControls.length ? '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9"><span style="color:#d97706;font-size:14px;margin-top:1px">⚠</span><div style="font-size:12px;color:#334155"><strong>Evidence gaps detected</strong> — ' + (linkedControls.length - linkedEvidence.length) + ' control' + (linkedControls.length - linkedEvidence.length > 1 ? 's have' : ' has') + ' no linked evidence. Ensure every in-scope control has supporting documentation.</div></div>' : '')
  + (ctrlEff >= 80 && linkedEvidence.length >= linkedControls.length ? '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0"><span style="color:#16a34a;font-size:14px;margin-top:1px">✅</span><div style="font-size:12px;color:#334155"><strong>Audit ready</strong> — all in-scope controls are implemented and evidence is collected. This audit package is ready for submission.</div></div>' : '')
  + '</div>'

  + '<div class="report-footer">'
  + '<span>Chris Olowo GRC Platform &nbsp;·&nbsp; ' + esc(a.name) + ' &nbsp;·&nbsp; ' + now + '</span>'
  + '<button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button>'
  + '</div>'
  + '</div></body></html>';

  openReport(html);
}

// =============================================
// GENERIC ASSESSMENT ENGINE
// =============================================
const ASSESSMENT_KEY_PREFIX = 'grcAssessment_v1_';

function getAssessment(id) {
  try { var r = localStorage.getItem(ASSESSMENT_KEY_PREFIX + id); return r ? JSON.parse(r) : {responses:{}, activeSection:'All', activeSubcat:'All'}; }
  catch(e) { return {responses:{}, activeSection:'All', activeSubcat:'All'}; }
}
function saveAssessment(id, d) { localStorage.setItem(ASSESSMENT_KEY_PREFIX + id, JSON.stringify(d)); }
function setAssessmentResponse(assessId, ctrlId, field, value) {
  var d = getAssessment(assessId);
  if (!d.responses[ctrlId]) d.responses[ctrlId] = {status:'Not Assessed', notes:''};
  d.responses[ctrlId][field] = value;
  saveAssessment(assessId, d);
  markVisitorActivity();
  render();
}
function setAssessmentFilter(assessId, field, value) {
  var d = getAssessment(assessId); d[field] = value; saveAssessment(assessId, d); render();
}

  {id:'ISO-5.34', fn:'Organizational', sub:'Compliance', desc:'The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII in accordance with applicable legislation and regulations.',
   q:['Is there a privacy policy aligned to applicable data protection laws?','Is personal data mapped and classified?','Is there a lawful basis for all personal data processing activities?']},
  {id:'ISO-5.35', fn:'Organizational', sub:'Compliance', desc:'An independent review of the organization\'s approach to managing information security and its implementation shall be carried out at planned intervals or when significant changes occur.',
   q:['Is an independent audit of the ISMS conducted at least annually?','Are audit findings tracked and remediated?']},
  {id:'ISO-5.36', fn:'Organizational', sub:'Compliance', desc:'The organization\'s approach to managing information security and its implementation shall be reviewed independently.',
   q:['Do managers regularly review compliance with security policies and procedures within their area?','Are non-conformities escalated and corrective actions assigned?']},
  {id:'ISO-5.37', fn:'Organizational', sub:'Operations', desc:'Operating procedures for information processing facilities shall be documented and made available to personnel who need them.',
   q:['Are operating procedures documented for all critical information processing activities?','Are procedures kept up to date and accessible to relevant personnel?']},
  // Clause 6 — People Controls
  {id:'ISO-6.1', fn:'People', sub:'HR Security', desc:'Background verification checks on all candidates for employment shall be carried out prior to joining the organization, taking into account applicable laws, regulations and ethics.',
   q:['Are pre-employment background checks conducted for all new hires?','Are background checks scaled to the sensitivity of the role?','Are checks legally compliant in all operating jurisdictions?']},
  {id:'ISO-6.2', fn:'People', sub:'HR Security', desc:'Employment agreements with personnel and contractors shall state their and the organization\'s responsibilities for information security.',
   q:['Do employment contracts include information security responsibilities?','Do contractor agreements include confidentiality and security obligations?']},
  {id:'ISO-6.3', fn:'People', sub:'Awareness & Training', desc:'Personnel of the organization and, where relevant, interested parties shall receive appropriate information security awareness, education and training.',
   q:['Is a security awareness training programme in place for all staff?','Is training completed at onboarding and refreshed annually?','Is training effectiveness measured?']},
  {id:'ISO-6.4', fn:'People', sub:'HR Security', desc:'A formal disciplinary process shall be defined and communicated to take action against personnel who have committed an information security policy violation.',
   q:['Is there a documented disciplinary process for security policy violations?','Is the process communicated to all staff?']},
  {id:'ISO-6.5', fn:'People', sub:'HR Security', desc:'Information security responsibilities and duties that remain valid after termination or change of employment shall be defined, enforced and communicated to relevant personnel and interested parties.',
   q:['Are post-termination security obligations (e.g., NDA) defined and enforced?','Is access revoked immediately upon termination?']},
  {id:'ISO-6.6', fn:'People', sub:'HR Security', desc:'Personnel and other interested parties shall be required to apply information security in accordance with the established policies and procedures of the organization.',
   q:['Are confidentiality agreements signed by all staff and relevant third parties?','Are NDAs reviewed and renewed as required?']},
  {id:'ISO-6.7', fn:'People', sub:'Operations', desc:'Security measures for personnel working remotely shall be implemented to protect information accessed, processed or stored outside the organization\'s premises.',
   q:['Is there a remote working policy?','Are remote workers required to use VPN and MFA?','Is data on remote devices protected by encryption?']},
  {id:'ISO-6.8', fn:'People', sub:'Incident Management', desc:'The organization shall provide a mechanism for personnel to report observed or suspected information security events through appropriate channels in a timely, accurate and reliable manner.',
   q:['Is there a clear, simple process for staff to report security events?','Are staff trained on how and when to report incidents?','Are all reports acknowledged and followed up?']},
  // Clause 7 — Physical Controls
  {id:'ISO-7.1', fn:'Physical', sub:'Physical Security', desc:'Security perimeters shall be defined and used to protect areas that contain information and other associated assets.',
   q:['Are physical security perimeters defined for sensitive areas?','Are perimeters enforced with barriers, card access, or biometrics?']},
  {id:'ISO-7.2', fn:'Physical', sub:'Physical Security', desc:'Secure areas shall be protected by appropriate entry controls and access points to ensure that only authorized personnel are allowed access.',
   q:['Are entry controls in place for all secure areas?','Is visitor access logged and escorted?','Is access reviewed and revoked when no longer required?']},
  {id:'ISO-7.3', fn:'Physical', sub:'Physical Security', desc:'Physical security for offices, rooms and facilities shall be designed and implemented.',
   q:['Are server rooms and data centres physically secured?','Is CCTV or equivalent monitoring deployed in sensitive areas?']},
  {id:'ISO-7.4', fn:'Physical', sub:'Physical Security', desc:'Premises shall be monitored continuously for unauthorized physical access.',
   q:['Is physical monitoring (CCTV, alarms, guards) active 24/7 in critical areas?','Are monitoring logs reviewed regularly?']},
  {id:'ISO-7.5', fn:'Physical', sub:'Physical Security', desc:'Physical protection against natural disasters, deliberate attacks or accidents shall be designed and applied.',
   q:['Are data centres and offices protected against fire, flood, and power failure?','Are environmental controls (HVAC, fire suppression) in place?']},
  {id:'ISO-7.6', fn:'Physical', sub:'Physical Security', desc:'Procedures for working in secure areas shall be designed and applied.',
   q:['Are procedures in place for working in secure areas (e.g., no photography, no unescorted visitors)?','Are secure area procedures communicated to all relevant staff?']},
  {id:'ISO-7.7', fn:'Physical', sub:'Physical Security', desc:'Clear desk rules for papers and removable storage media and clear screen rules for information processing facilities shall be defined and appropriately enforced.',
   q:['Is a clear desk policy in place and enforced?','Are automatic screen lock timeouts configured on all endpoints?']},
  {id:'ISO-7.8', fn:'Physical', sub:'Asset Management', desc:'Items of equipment shall be sited and protected to reduce the risks from environmental threats and hazards, and unauthorized access.',
   q:['Is equipment located to minimize risk of unauthorized access and environmental hazard?','Are power and cabling protected from interference and damage?']},
  {id:'ISO-7.9', fn:'Physical', sub:'Asset Management', desc:'Assets off-premises shall be protected.',
   q:['Is there a policy for taking equipment off-site?','Are off-site assets tracked and security controls maintained?']},
  {id:'ISO-7.10', fn:'Physical', sub:'Asset Management', desc:'Storage media shall be managed through its lifecycle of acquisition, use, transportation and disposal in accordance with the organization\'s classification scheme and handling requirements.',
   q:['Is removable media managed and restricted by policy?','Are secure disposal procedures followed for media containing sensitive data?']},
  {id:'ISO-7.11', fn:'Physical', sub:'Infrastructure', desc:'Facilities supporting the organization\'s information and other associated assets shall have continuity of power supply to prevent failures and disruptions.',
   q:['Are UPS and generator backup power in place for critical systems?','Are power systems tested regularly?']},
  {id:'ISO-7.12', fn:'Physical', sub:'Infrastructure', desc:'Cabling carrying power or telecommunications shall be protected from interception, interference or damage.',
   q:['Is cabling installed to minimize exposure to interception or damage?','Is cable management documented?']},
  {id:'ISO-7.13', fn:'Physical', sub:'Asset Management', desc:'Equipment shall be maintained correctly to ensure availability, integrity and confidentiality of information.',
   q:['Is a preventive maintenance schedule in place for all critical equipment?','Are maintenance activities logged?']},
  {id:'ISO-7.14', fn:'Physical', sub:'Asset Management', desc:'Items of equipment containing storage media shall be verified to ensure that any sensitive data and licensed software has been removed or securely overwritten prior to disposal or re-use.',
   q:['Is data securely erased from devices before disposal or reuse?','Is a certificate of destruction obtained for sensitive media?']},
  // Clause 8 — Technological Controls
  {id:'ISO-8.1', fn:'Technological', sub:'Endpoint Security', desc:'Information stored on, processed by or accessible via user endpoint devices shall be protected.',
   q:['Is endpoint protection (AV, EDR) deployed on all user devices?','Is full disk encryption enforced on all mobile devices and laptops?','Are endpoints centrally managed and patched?']},
  {id:'ISO-8.2', fn:'Technological', sub:'Access Control', desc:'Privileged access rights shall be restricted and managed, following the principles of least privilege and need-to-know, through a formal authorization process.',
   q:['Is privileged access managed through a PAM (Privileged Access Management) solution?','Are privileged accounts separate from standard user accounts?','Is privileged access reviewed regularly?']},
  {id:'ISO-8.3', fn:'Technological', sub:'Access Control', desc:'Access to information and other associated assets shall be restricted in accordance with the established topic-specific policy on access control.',
   q:['Is access restricted based on business need and least privilege?','Are access rights enforced at the application and system level?']},
  {id:'ISO-8.4', fn:'Technological', sub:'Access Control', desc:'Access to source code, development tools and software libraries shall be managed appropriately to prevent introduction of unauthorized functionality and avoid unintentional changes.',
   q:['Is access to source code repositories restricted to authorized developers?','Is multi-factor authentication required for source code access?']},
  {id:'ISO-8.5', fn:'Technological', sub:'Access Control', desc:'Secure authentication technologies and procedures shall be implemented based on information access restrictions and the topic-specific policy on access control.',
   q:['Is MFA enforced for all remote access, privileged accounts, and cloud services?','Are authentication logs monitored?','Are failed authentication attempts alerted?']},
  {id:'ISO-8.6', fn:'Technological', sub:'Operations', desc:'The use of resources shall be monitored and adjusted in line with current and expected capacity requirements.',
   q:['Is resource capacity (CPU, storage, bandwidth) monitored?','Are capacity thresholds defined and alerts configured?']},
  {id:'ISO-8.7', fn:'Technological', sub:'Malware Protection', desc:'Protection against malware shall be implemented and supported by appropriate user awareness.',
   q:['Is anti-malware software deployed and kept up to date?','Are users trained to recognize malware threats such as phishing?','Is malware protection centrally managed?']},
  {id:'ISO-8.8', fn:'Technological', sub:'Vulnerability Management', desc:'Information about technical vulnerabilities of information systems in use shall be obtained in a timely fashion; the organization\'s exposure shall be evaluated and appropriate measures taken.',
   q:['Are vulnerability scans conducted regularly (at least quarterly)?','Are critical vulnerabilities patched within defined SLAs?','Is a vulnerability management process formally documented?']},
  {id:'ISO-8.9', fn:'Technological', sub:'Operations', desc:'Configurations, including security configurations, of hardware, software, services and networks shall be established, documented, implemented, monitored and reviewed.',
   q:['Are secure baseline configurations defined for all systems?','Are configuration changes managed through a formal change process?','Is configuration compliance monitored continuously?']},
  {id:'ISO-8.10', fn:'Technological', sub:'Data Protection', desc:'Information stored in information systems, devices or in any other storage media shall be deleted when no longer required.',
   q:['Is a data retention and deletion policy in place?','Is data deleted securely when retention periods expire?']},
  {id:'ISO-8.11', fn:'Technological', sub:'Data Protection', desc:'Data masking shall be used in accordance with the organization\'s topic-specific policy on access control and other related topic-specific policies, and business requirements, taking applicable legislation into consideration.',
   q:['Is data masking applied to sensitive data in non-production environments?','Is PII masked or anonymised in test datasets?']},
  {id:'ISO-8.12', fn:'Technological', sub:'Data Protection', desc:'Data leakage prevention measures shall be applied to systems, networks and any other devices that process, store or transmit sensitive information.',
   q:['Is a DLP solution deployed to prevent unauthorized data exfiltration?','Are DLP policies enforced on email, cloud, and removable media?']},
  {id:'ISO-8.13', fn:'Technological', sub:'Business Continuity', desc:'Backup copies of information, software and systems shall be maintained and regularly tested in accordance with the agreed topic-specific policy on backup.',
   q:['Are backups taken regularly and aligned to defined RPOs?','Are backups stored off-site or in a separate cloud region?','Are backup restores tested at least annually?']},
  {id:'ISO-8.14', fn:'Technological', sub:'Business Continuity', desc:'Information processing facilities shall be implemented with redundancy sufficient to meet availability requirements.',
   q:['Are critical systems deployed with high-availability (HA) configurations?','Are single points of failure identified and mitigated?']},
  {id:'ISO-8.15', fn:'Technological', sub:'Logging & Monitoring', desc:'Logs that record activities, exceptions, faults and other relevant events shall be produced, stored, protected and analysed.',
   q:['Are logs collected from all critical systems and applications?','Are logs centralised in a SIEM or log management platform?','Are log retention periods defined and enforced?']},
  {id:'ISO-8.16', fn:'Technological', sub:'Logging & Monitoring', desc:'Networks, systems and applications shall be monitored for anomalous behaviour and appropriate actions taken to evaluate potential information security incidents.',
   q:['Is continuous security monitoring in place?','Are alerts generated for anomalous activity?','Is there a defined process to triage and respond to alerts?']},
  {id:'ISO-8.17', fn:'Technological', sub:'Logging & Monitoring', desc:'Clock synchronisation shall be used to ensure accuracy and consistency of time recorded in logs.',
   q:['Are all systems synchronized to an authoritative NTP source?','Is time consistency validated across all log sources?']},
  {id:'ISO-8.18', fn:'Technological', sub:'Operations', desc:'Use of privileged utility programs that might be capable of overriding system and application controls shall be restricted and tightly controlled.',
   q:['Is the use of privileged admin tools (e.g. sysinternals, rootkit tools) restricted and logged?','Is usage monitored and reviewed?']},
  {id:'ISO-8.19', fn:'Technological', sub:'Operations', desc:'Procedures and measures shall be implemented to securely manage the installation of software on operational systems.',
   q:['Is a software installation policy in place restricting unauthorized installs?','Are application allow-lists or MDM controls enforced?']},
  {id:'ISO-8.20', fn:'Technological', sub:'Network Security', desc:'Networks and network devices shall be secured, managed and controlled to protect information in systems and applications.',
   q:['Are firewalls and network segmentation in place?','Is network traffic monitored for anomalies and threats?','Are network access controls enforced?']},
  {id:'ISO-8.21', fn:'Technological', sub:'Network Security', desc:'Services, protocols and ports that are not required for business or operational functions shall be disabled.',
   q:['Is a network services review conducted to disable unnecessary ports and services?','Are firewall rules reviewed periodically?']},
  {id:'ISO-8.22', fn:'Technological', sub:'Network Security', desc:'Groups of information services, users and information systems shall be segregated in the organization\'s networks.',
   q:['Is network segmentation in place (e.g. VLANs, DMZ)?','Are production environments isolated from development and test?']},
  {id:'ISO-8.23', fn:'Technological', sub:'Network Security', desc:'Access to external websites shall be managed to reduce exposure to malicious content.',
   q:['Is web filtering deployed to block malicious or unauthorized websites?','Are web filtering policies regularly reviewed?']},
  {id:'ISO-8.24', fn:'Technological', sub:'Cryptography', desc:'Rules for the effective use of cryptography, including cryptographic key management, shall be defined and implemented.',
   q:['Is there a cryptographic policy defining approved algorithms and key lengths?','Is encryption enforced for sensitive data at rest and in transit?','Is key management documented and secure?']},
  {id:'ISO-8.25', fn:'Technological', sub:'Secure Development', desc:'Rules for the secure development of software and systems shall be established and applied.',
   q:['Is a secure development lifecycle (SDLC) in place?','Are security requirements defined at the start of development projects?','Are developers trained in secure coding practices?']},
  {id:'ISO-8.26', fn:'Technological', sub:'Secure Development', desc:'Information security requirements shall be identified, specified and approved when developing or acquiring applications.',
   q:['Are security requirements formally documented for all applications?','Is a security review conducted prior to application deployment?']},
  {id:'ISO-8.27', fn:'Technological', sub:'Secure Development', desc:'Principles for engineering secure systems shall be established, documented, maintained and applied to any information system implementation efforts.',
   q:['Are secure architecture principles (e.g. defence in depth, zero trust) applied?','Are security architecture decisions documented?']},
  {id:'ISO-8.28', fn:'Technological', sub:'Secure Development', desc:'Coding practices shall be documented, applied and reviewed.',
   q:['Are secure coding standards defined and enforced?','Is static application security testing (SAST) integrated into the CI/CD pipeline?']},
  {id:'ISO-8.29', fn:'Technological', sub:'Secure Development', desc:'Security testing processes shall be defined and implemented in the development lifecycle.',
   q:['Are security tests (DAST, penetration testing) conducted before major releases?','Are security test results tracked and remediated?']},
  {id:'ISO-8.30', fn:'Technological', sub:'Secure Development', desc:'Outsourced development shall be supervised and monitored by the organization.',
   q:['Are security requirements included in contracts with outsourced development partners?','Are outsourced systems subject to security testing before acceptance?']},
  {id:'ISO-8.31', fn:'Technological', sub:'Operations', desc:'Development, testing and operational environments shall be separated and secured.',
   q:['Are development, test and production environments strictly separated?','Is production data prohibited from use in lower environments?']},
  {id:'ISO-8.32', fn:'Technological', sub:'Operations', desc:'Changes to information processing facilities and information systems shall be subject to change management procedures.',
   q:['Is a formal change management process in place?','Are changes tested in a non-production environment before deployment?','Is emergency change process defined and controlled?']},
  {id:'ISO-8.33', fn:'Technological', sub:'Secure Development', desc:'Test information shall be appropriately selected, protected and managed.',
   q:['Is test data managed and protected?','Is production data anonymised or masked before use in testing?']},
  {id:'ISO-8.34', fn:'Technological', sub:'Compliance', desc:'Audit tests involving operational systems shall be carefully planned and agreed between the tester and appropriate management to minimize disruptions to business processes.',
   q:['Are audit activities planned and co-ordinated with operational teams?','Are audit tools restricted to authorized auditors?']},
];

  {id:'CC3.3', fn:'Common Criteria', sub:'Risk Assessment', desc:'COSO Principle 8: The entity considers the potential for fraud in assessing risks to the achievement of objectives.',

  // CC4 — Monitoring Activities
  {id:'CC4.1', fn:'Common Criteria', sub:'Monitoring', desc:'COSO Principle 16: The entity selects, develops, and performs ongoing and/or separate evaluations to ascertain whether the components of internal control are present and functioning.',
   q:['Are control monitoring activities (continuous or periodic) designed and performed?','Is control effectiveness monitored and reported?']},
  {id:'CC4.2', fn:'Common Criteria', sub:'Monitoring', desc:'COSO Principle 17: The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action.',
   q:['Are control deficiencies communicated to accountable parties promptly?','Are corrective action plans tracked through to closure?']},
  // CC5 — Control Activities
  {id:'CC5.1', fn:'Common Criteria', sub:'Control Activities', desc:'COSO Principle 10: The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels.',

  {id:'CC5.2', fn:'Common Criteria', sub:'Control Activities', desc:'COSO Principle 11: The entity also selects and develops general control activities over technology to support the achievement of objectives.',
   q:['Are general IT controls designed and operating effectively?','Do technology controls support business control objectives?']},
  {id:'CC5.3', fn:'Common Criteria', sub:'Control Activities', desc:'COSO Principle 12: The entity deploys control activities through policies that establish what is expected and in procedures that put policies into action.',

  // CC6 — Logical and Physical Access Controls
  {id:'CC6.1', fn:'Common Criteria', sub:'Access Control', desc:'The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events to meet the entity\'s objectives.',

  {id:'CC6.2', fn:'Common Criteria', sub:'Access Control', desc:'Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users whose access is administered by the entity.',

  {id:'CC6.3', fn:'Common Criteria', sub:'Access Control', desc:'The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles, responsibilities, or the system design and changes, giving consideration to the concepts of least privilege and segregation of duties.',
   q:['Are access rights modified promptly when roles change?','Are access reviews conducted at least annually?','Is access removed immediately upon termination?']},
  {id:'CC6.4', fn:'Common Criteria', sub:'Physical Security', desc:'The entity restricts physical access to facilities and protected information assets to authorized personnel to meet the entity\'s objectives.',
   q:['Is physical access to data centres and server rooms restricted?','Is physical access logged and reviewed?']},
  {id:'CC6.5', fn:'Common Criteria', sub:'Asset Management', desc:'The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data and software from those assets has been diminished and is no longer required to meet the entity\'s objectives.',
   q:['Is data securely wiped from assets before disposal?','Is a formal asset decommissioning process in place?']},
  {id:'CC6.6', fn:'Common Criteria', sub:'Network Security', desc:'The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software.',
   q:['Is anti-malware software deployed across all endpoints?','Are software installation controls enforced?','Is threat detection monitoring active?']},
  {id:'CC6.7', fn:'Common Criteria', sub:'Data Protection', desc:'The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes, and protects it during transmission, movement, or removal to meet the entity\'s objectives.',

  {id:'CC6.8', fn:'Common Criteria', sub:'Malware Protection', desc:'The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software to meet the entity\'s objectives.',
   q:['Are controls in place to detect malicious software at the perimeter and endpoint?','Are malware incidents reviewed and remediated?']},
  // CC7 — System Operations
  {id:'CC7.1', fn:'Common Criteria', sub:'Monitoring', desc:'To meet its objectives, the entity uses detection and monitoring procedures to identify changes to configurations that result in the introduction of new vulnerabilities, and susceptibilities to newly discovered vulnerabilities.',
   q:['Is configuration monitoring in place to detect unauthorized changes?','Are new vulnerabilities identified and assessed promptly?']},
  {id:'CC7.2', fn:'Common Criteria', sub:'Monitoring', desc:'The entity monitors system components and the operation of those controls on an ongoing basis to detect anomalies that are indicative of malicious acts, natural disasters, and errors.',
   q:['Is continuous monitoring via SIEM or equivalent in place?','Are anomalies detected and escalated through a defined process?']},
  {id:'CC7.3', fn:'Common Criteria', sub:'Incident Management', desc:'The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives and, if so, takes actions to prevent or address such failures.',
   q:['Is there a security event evaluation process?','Are events correlated and prioritized for response?']},
  {id:'CC7.4', fn:'Common Criteria', sub:'Incident Management', desc:'The entity responds to identified security incidents by executing a defined incident response program to understand, contain and remediate the threat; and communicate about the incident.',
   q:['Is an incident response plan in place and actively used?','Are incidents contained and remediated within defined SLAs?','Are relevant parties notified as required?']},
  {id:'CC7.5', fn:'Common Criteria', sub:'Incident Management', desc:'The entity identifies, develops, and implements activities to recover from identified security incidents and communicates information about the incident and recovery activities.',
   q:['Are recovery activities defined in the incident response plan?','Are lessons learned documented and incorporated after incidents?']},
  // CC8 — Change Management
  {id:'CC8.1', fn:'Common Criteria', sub:'Change Management', desc:'The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its change management objectives.',
   q:['Is there a formal change management process?','Are changes tested and approved before deployment to production?','Are emergency changes tracked and reviewed?']},
  // CC9 — Risk Mitigation
  {id:'CC9.1', fn:'Common Criteria', sub:'Risk Management', desc:'The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions.',
   q:['Are business disruption risks identified and mitigation activities defined?','Are business continuity plans aligned to identified risks?']},
  {id:'CC9.2', fn:'Common Criteria', sub:'Supplier Relations', desc:'The entity assesses and manages risks associated with vendors and business partners.',

  {id:'A1.2', fn:'Availability', sub:'Availability', desc:'The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data back-up processes, and recovery infrastructure.',

  {id:'A1.3', fn:'Availability', sub:'Availability', desc:'The entity tests recovery plan procedures supporting system recovery to meet its objectives.',
   q:['Are DR tests conducted at least annually?','Are test results documented and findings remediated?']},

  {id:'C1.1', fn:'Confidentiality', sub:'Confidentiality', desc:'The entity identifies and maintains confidential information to meet the entity\'s objectives related to confidentiality.',

  {id:'C1.2', fn:'Confidentiality', sub:'Confidentiality', desc:'The entity disposes of confidential information to meet the entity\'s objectives related to confidentiality.',
   q:['Is confidential information securely disposed of when no longer needed?','Are disposal activities logged?']},
  // Privacy

// ── Generic Assessment Renderer ───────────────────────────────────────────────
var ASSESSMENT_REGISTRY = {
  nist:    { label:'NIST CSF', icon:'🛡️', color:'#3b82f6', controls: null /* set below */ },
  iso27001:{ label:'ISO 27001', icon:'🔐', color:'#10b981', controls: ISO27001_CONTROLS,
             sections: ['All','Organizational','People','Physical','Technological'] },
  soc2:    { label:'SOC 2', icon:'☁️', color:'#8b5cf6', controls: SOC2_CONTROLS,
             sections: ['All','Common Criteria','Availability','Confidentiality','Privacy'] },
  gdpr:    { label:'GDPR', icon:'🇪🇺', color:'#f59e0b', controls: GDPR_CONTROLS,
             sections: ['All','Principles','Data Subject Rights','Controller Obligations','International Transfers'] },
  cis:     { label:'CIS Controls v8', icon:'🔬', color:'#ef4444', controls: CIS_CONTROLS,
             sections: ['All','Basic','Foundational','Organizational'] },
  hipaa:   { label:'HIPAA', icon:'🏥', color:'#06b6d4', controls: HIPAA_CONTROLS,
             sections: ['All','Administrative','Physical','Technical','Breach Notification'] },
  iso42001:{ label:'ISO/IEC 42001', icon:'🤖', color:'#8b5cf6', controls: ISO42001_CONTROLS,
             sections: ['All','Context','Leadership','Planning','Support','Operation','Evaluation','Improvement','Annex A'] },
};

function renderGenericAssessment(id) {
  var cfg  = ASSESSMENT_REGISTRY[id];
  if (!cfg) return '<div class="content-area"><div class="page-header"><h2>Assessment not found</h2></div></div>';
  var ctrls = cfg.controls;
  var d    = getAssessment(id);
  var activeSec    = d.activeSection  || 'All';
  var activeSubcat = d.activeSubcat   || 'All';
  var col  = cfg.color;

  // Filter
  var shown = ctrls;
  if (activeSec !== 'All') shown = shown.filter(function(c){ return c.fn === activeSec; });
  var subcats = ['All'].concat(Object.keys(
    ctrls.filter(function(c){ return activeSec==='All'||c.fn===activeSec; })
         .reduce(function(acc,c){ acc[c.sub]=1; return acc; }, {})
  ));
  if (activeSubcat !== 'All') shown = shown.filter(function(c){ return c.sub === activeSubcat; });

  // Stats
  var total=ctrls.length, passed=0, failed=0, partial=0, notAssessed=0;
  ctrls.forEach(function(c){
    var st=(d.responses[c.id]||{}).status||'Not Assessed';
    if(st==='Pass')passed++;else if(st==='Fail')failed++;else if(st==='Partial')partial++;else notAssessed++;
  });
  var pct = total ? Math.round((passed+partial*0.5)/total*100) : 0;
  var ratingCol = pct>=80?'var(--green)':pct>=60?'var(--yellow)':pct>=40?'var(--orange)':'var(--red)';
  var ratingLabel = pct>=80?'Strong':pct>=60?'Developing':pct>=40?'Basic':'Insufficient';

  // Section bars
  var sections = cfg.sections ? cfg.sections.slice(1) : [];
  var sectionBars = sections.map(function(sec){
    var sctrls = ctrls.filter(function(c){return c.fn===sec;});
    var p=0,f=0,pa=0;
    sctrls.forEach(function(c){var st=(d.responses[c.id]||{}).status||'Not Assessed';if(st==='Pass')p++;else if(st==='Fail')f++;else if(st==='Partial')pa++;});
    var score=sctrls.length?Math.round((p+pa*0.5)/sctrls.length*100):0;
    var scoreCol=score>=80?'var(--green)':score>=60?'var(--yellow)':'var(--red)';
    return '<div style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:6px" onclick="setAssessmentFilter(\''+id+'\',\'activeSection\',\''+(activeSec===sec?'All':sec)+'\')">'
      +'<div style="font-size:11px;font-weight:600;color:'+col+';min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+sec+'</div>'
      +'<div style="flex:1;height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden">'
        +'<div style="height:100%;width:'+score+'%;background:'+scoreCol+';border-radius:3px"></div>'
      +'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+scoreCol+';min-width:32px;text-align:right">'+score+'%</div>'
      +'<div style="font-size:10px;color:var(--text-muted);min-width:70px">'+p+' pass · '+f+' fail</div>'
    +'</div>';
  }).join('');

  // Cards
  var cards = shown.map(function(c){
    var r=d.responses[c.id]||{};
    var status=r.status||'Not Assessed';
    var notes=r.notes||'';
    var stCol=status==='Pass'?'var(--green)':status==='Fail'?'var(--red)':status==='Partial'?'var(--yellow)':'var(--text-muted)';
    var stBg =status==='Pass'?'var(--green-dim)':status==='Fail'?'var(--red-dim)':status==='Partial'?'var(--yellow-dim)':'var(--bg-surface)';
    var qHtml=c.q.map(function(q,i){return '<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text-secondary)"><span style="color:'+col+';font-weight:600;flex-shrink:0">'+(i+1)+'.</span><span>'+q+'</span></div>';}).join('');
    return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;border-left:3px solid '+stCol+'">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
        +'<div style="flex:1">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
            +'<span style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted)">'+c.id+'</span>'
            +'<span style="font-size:10px;font-weight:700;color:'+col+';background:'+col+'22;padding:1px 8px;border-radius:10px">'+c.fn+'</span>'
            +'<span style="font-size:10px;color:var(--text-muted)">'+c.sub+'</span>'
          +'</div>'
          +'<div style="font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.5">'+c.desc+'</div>'
        +'</div>'
        +'<div style="flex-shrink:0">'
          +'<select style="background:'+stBg+';color:'+stCol+';border:1px solid '+stCol+'55;border-radius:6px;padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer" onchange="setAssessmentResponse(\''+id+'\',\''+c.id+'\',\'status\',this.value)">'
            +['Not Assessed','Pass','Partial','Fail'].map(function(s){return '<option value="'+s+'"'+(status===s?' selected':'')+'>'+s+'</option>';}).join('')
          +'</select>'
        +'</div>'
      +'</div>'
      +(qHtml?'<details style="cursor:pointer"><summary style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);list-style:none">&#9656; Assessment Questions ('+c.q.length+')</summary><div style="margin-top:10px;padding:12px;background:var(--bg-surface);border-radius:6px">'+qHtml+'</div></details>':'')
      +'<textarea placeholder="Notes / findings…" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text-secondary);resize:vertical;min-height:36px;font-family:inherit;line-height:1.5" rows="1" onchange="setAssessmentResponse(\''+id+'\',\''+c.id+'\',\'notes\',this.value)">'+esc(notes)+'</textarea>'
    +'</div>';
  }).join('');

  return '<div class="content-area">'
    // Header
    +'<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">'
      +'<div>'
        +'<h2>'+cfg.icon+' '+cfg.label+' Assessment</h2>'
        +'<p>'+passed+' pass &nbsp;·&nbsp; '+failed+' fail &nbsp;·&nbsp; '+partial+' partial &nbsp;·&nbsp; '+notAssessed+' not assessed &nbsp;·&nbsp; <strong style="color:'+ratingCol+'">'+pct+'% — '+ratingLabel+'</strong></p>'
      +'</div>'
      +'<button class="btn btn-primary" onclick="exportGenericReport(\''+id+'\')">&#128438; Export Report</button>'
    +'</div>'
    // Scorecard
    +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:24px">'
      +'<div>'
        +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:12px">Score by Section <span style="font-weight:400;text-transform:none;letter-spacing:0">(click to filter)</span></div>'
        +sectionBars
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-content:start">'
        +[['✅','Pass',passed,'var(--green)'],['❌','Fail',failed,'var(--red)'],['⚠️','Partial',partial,'var(--yellow)'],['⬜','Not Assessed',notAssessed,'var(--text-muted)']].map(function(s){
          return '<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">'
            +'<div style="font-size:20px;margin-bottom:2px">'+s[0]+'</div>'
            +'<div style="font-size:22px;font-weight:800;color:'+s[3]+'">'+s[2]+'</div>'
            +'<div style="font-size:11px;color:var(--text-muted)">'+s[1]+'</div>'
          +'</div>';
        }).join('')
      +'</div>'
    +'</div>'
    // Filters
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;padding:14px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:72px">Section</span>'
        +'<div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">'
          +(cfg.sections||['All']).map(function(f){
            var style=activeSec===f&&f!=='All'?'background:'+col+'22;border-color:'+col+';color:'+col:'';
            return '<div class="filter-chip '+(activeSec===f?'active':'')+'" style="'+style+'" onclick="setAssessmentFilter(\''+id+'\',\'activeSection\',\''+f+'\')">'+f+'</div>';
          }).join('')
        +'</div>'
      +'</div>'
      +'<div style="height:1px;background:var(--border)"></div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:72px">Category</span>'
        +'<div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">'
          +subcats.map(function(s){return '<div class="filter-chip '+(activeSubcat===s?'active':'')+'" onclick="setAssessmentFilter(\''+id+'\',\'activeSubcat\',\''+s+'\')">'+s+'</div>';}).join('')
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Showing '+shown.length+' of '+total+' controls</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'+cards+'</div>'
  +'</div>';
}

function renderIso27001Assessment(){ return renderGenericAssessment('iso27001'); }

}

    var exportLog = JSON.parse(localStorage.getItem('grc_export_log') || '[]');

  var ratingLabel=pct>=80?'Strong':pct>=60?'Developing':pct>=40?'Basic':'Insufficient';

// NIST CSF ASSESSMENT VIEW
// =============================================
const NIST_ASSESSMENT_KEY = 'grcNistAssessment_v1';
function getNistAssessment() {
  try { var r=localStorage.getItem(NIST_ASSESSMENT_KEY); return r?JSON.parse(r):{responses:{},activeFunction:'All',activeSubcat:'All'}; }
  catch(e) { return {responses:{},activeFunction:'All',activeSubcat:'All'}; }
}
function saveNistAssessment(d){ localStorage.setItem(NIST_ASSESSMENT_KEY, JSON.stringify(d)); }
function setNistResponse(id, field, value) {
  var d=getNistAssessment();
  if(!d.responses[id]) d.responses[id]={status:'Not Assessed',score:null,notes:''};
  d.responses[id][field]=value;
  saveNistAssessment(d);
  markVisitorActivity();
  render();
}
function setNistFilter(field, value) {
  var d=getNistAssessment(); d[field]=value; saveNistAssessment(d); render();
}
function exportNistReport() {
  requireOwnerOrModified(function() { _doExportNistReport(); });
}
function _doExportNistReport() {
  if (!checkExportRateLimit()) return;
  // SECURITY: Report generated from user assessment responses only.
  try {
    var exportLog = JSON.parse(localStorage.getItem('grc_export_log') || '[]');
    exportLog.push({ action: 'export_nist_report', ts: new Date().toISOString() });
    if (exportLog.length > 50) exportLog = exportLog.slice(-50);
    localStorage.setItem('grc_export_log', JSON.stringify(exportLog));
  } catch(e) {}
  var d = getNistAssessment();
  var fns = ['Identify','Protect','Detect','Respond','Recover'];
  var fnColors  = {Identify:'#3b82f6',Protect:'#10b981',Detect:'#f59e0b',Respond:'#ef4444',Recover:'#8b5cf6'};
  var fnIcons   = {Identify:'🔍',Protect:'🛡️',Detect:'📡',Respond:'🚨',Recover:'🔄'};
  var fnDesc    = {
    Identify: 'Develop an organizational understanding to manage cybersecurity risk to systems, people, assets, data, and capabilities.',
    Protect:  'Develop and implement appropriate safeguards to ensure delivery of critical services.',
    Detect:   'Develop and implement appropriate activities to identify the occurrence of a cybersecurity event.',
    Respond:  'Develop and implement appropriate activities to take action regarding a detected cybersecurity incident.',
    Recover:  'Develop and implement appropriate activities to maintain plans for resilience and to restore capabilities impaired due to a cybersecurity incident.'
  };
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'});

  // ── Compute scores ──────────────────────────────────────────────────────────
  var total=NIST_ASSESSMENT_CONTROLS.length, passed=0, failed=0, partial=0, notAssessed=0;
  NIST_ASSESSMENT_CONTROLS.forEach(function(c){
    var st=(d.responses[c.id]||{}).status||'Not Assessed';
    if(st==='Pass')passed++;else if(st==='Fail')failed++;else if(st==='Partial')partial++;else notAssessed++;
  });
  var pct = total ? Math.round((passed+partial*0.5)/total*100) : 0;
  var ratingLabel = pct>=80?'Strong':pct>=60?'Developing':pct>=40?'Basic':'Insufficient';
  var ratingCol   = pct>=80?'#10b981':pct>=60?'#f59e0b':pct>=40?'#f97316':'#ef4444';
  var assessed    = passed+failed+partial;
  var completeness = total ? Math.round(assessed/total*100) : 0;

  // ── Per-function stats ──────────────────────────────────────────────────────
  var fnStats={};
  fns.forEach(function(fn){
    var ctrls=NIST_ASSESSMENT_CONTROLS.filter(function(c){return c.fn===fn;});
    var p=0,f=0,pa=0,n=0;
    ctrls.forEach(function(c){var st=(d.responses[c.id]||{}).status||'Not Assessed';if(st==='Pass')p++;else if(st==='Fail')f++;else if(st==='Partial')pa++;else n++;});
    var score=ctrls.length?Math.round((p+pa*0.5)/ctrls.length*100):0;
    fnStats[fn]={pass:p,fail:f,partial:pa,notAssessed:n,total:ctrls.length,score:score,
      col:fnColors[fn],scoreCol:score>=80?'#10b981':score>=60?'#f59e0b':score>=40?'#f97316':'#ef4444'};
  });

  // ── Key findings: all fails + partials ──────────────────────────────────────
  var keyFindings = NIST_ASSESSMENT_CONTROLS.filter(function(c){
    var st=(d.responses[c.id]||{}).status||'Not Assessed';
    return st==='Fail'||st==='Partial';
  });

  // ── Strengths: all passes ───────────────────────────────────────────────────
  var strengths = NIST_ASSESSMENT_CONTROLS.filter(function(c){
    return (d.responses[c.id]||{}).status==='Pass';
  });

  // ── Radar SVG (pentagon) ────────────────────────────────────────────────────
  function makeRadar() {
    var cx=160,cy=160,r=120;
    var labels=['Identify','Protect','Detect','Respond','Recover'];
    var angles=labels.map(function(_,i){return(i*72-90)*Math.PI/180;});
    var scores=labels.map(function(fn){return fnStats[fn].score/100;});
    var pts=scores.map(function(s,i){return[cx+s*r*Math.cos(angles[i]),cy+s*r*Math.sin(angles[i])];});
    var polyPts=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    // grid
    var grid='';
    [0.25,0.5,0.75,1].forEach(function(frac){
      var gp=angles.map(function(a){return[(cx+frac*r*Math.cos(a)).toFixed(1),(cy+frac*r*Math.sin(a)).toFixed(1)];});
      grid+='<polygon points="'+gp.map(function(p){return p.join(',');}).join(' ')+'" fill="none" stroke="#1e3a5f" stroke-width="1"/>';
    });
    // spokes
    var spokes=angles.map(function(a){return'<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#1e3a5f" stroke-width="1"/>';}).join('');
    // label positions
    var labelHtml=labels.map(function(lbl,i){
      var lx=(cx+(r+28)*Math.cos(angles[i])).toFixed(1);
      var ly=(cy+(r+28)*Math.sin(angles[i])).toFixed(1);
      var score=fnStats[lbl].score;
      var col=fnColors[lbl];
      return'<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="'+col+'">'+lbl+'</text>'
            +'<text x="'+lx+'" y="'+(parseFloat(ly)+14)+'" text-anchor="middle" font-size="10" fill="'+fnStats[lbl].scoreCol+'">'+score+'%</text>';
    }).join('');
    return'<svg viewBox="0 0 320 320" width="320" height="320">'+grid+spokes
      +'<polygon points="'+polyPts+'" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>'
      +labelHtml+'</svg>';
  }

  // ── Build per-function findings sections ────────────────────────────────────
  function findingsSection(fn) {
    var ctrls=NIST_ASSESSMENT_CONTROLS.filter(function(c){return c.fn===fn;});
    var st=fnStats[fn];
    var col=fnColors[fn];
    var scoreCol=st.scoreCol;
    var rows=ctrls.map(function(c){
      var r=d.responses[c.id]||{};
      var status=r.status||'Not Assessed';

      +'<button onclick="window.print()" style="padding:12px 22px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,.4);display:flex;align-items:center;gap:8px">🖨 Print / Save PDF</button>'
      +'<button onclick="window.close()" style="padding:12px 18px;background:#0d1b35;color:#94a3b8;border:1px solid #334155;border-radius:10px;font-size:13px;cursor:pointer">✕ Close</button>'
    +'</div>'

    +'</body></html>';

  var win = window.open('','_blank','width=1200,height=900');
  if (win) { win.document.write(html); win.document.close(); }
  else { showToast('Pop-up blocked — please allow pop-ups for this page'); }
}



function renderNistAssessment() {
  var d = getNistAssessment();
  var activeFunction = d.activeFunction || 'All';
  var activeSubcat   = d.activeSubcat   || 'All';

  var functions = ['All','Identify','Protect','Detect','Respond','Recover'];
  var fnColors = {Identify:'var(--accent)',Protect:'var(--green)',Detect:'var(--yellow)',Respond:'var(--red)',Recover:'#a78bfa'};

  var controls = NIST_ASSESSMENT_CONTROLS;
  if (activeFunction !== 'All') controls = controls.filter(function(c){return c.fn===activeFunction;});

  // Subcats for the selected function
  var subcats = ['All'].concat(Object.keys(
    NIST_ASSESSMENT_CONTROLS
      .filter(function(c){return activeFunction==='All'||c.fn===activeFunction;})
      .reduce(function(acc,c){acc[c.sub]=1;return acc;},{})
  ));
  if (activeSubcat !== 'All') controls = controls.filter(function(c){return c.sub===activeSubcat;});

  // Stats
  var total = NIST_ASSESSMENT_CONTROLS.length;
  var passed=0, failed=0, partial=0, notAssessed=0;
  NIST_ASSESSMENT_CONTROLS.forEach(function(c) {
    var st=(d.responses[c.id]||{}).status||'Not Assessed';
    if(st==='Pass')passed++;else if(st==='Fail')failed++;else if(st==='Partial')partial++;else notAssessed++;
  });
  var pct = Math.round((passed + partial*0.5) / total * 100);
  var ratingCol = pct>=80?'var(--green)':pct>=60?'var(--yellow)':pct>=40?'var(--orange)':'var(--red)';
  var ratingLabel = pct>=80?'Strong':pct>=60?'Developing':pct>=40?'Basic':'Insufficient';

  // Per-function mini-bars
  var fnBars = ['Identify','Protect','Detect','Respond','Recover'].map(function(fn) {
    var ctrls = NIST_ASSESSMENT_CONTROLS.filter(function(c){return c.fn===fn;});
    var p=0,f=0,pa=0;
    ctrls.forEach(function(c){var st=(d.responses[c.id]||{}).status||'Not Assessed';if(st==='Pass')p++;else if(st==='Fail')f++;else if(st==='Partial')pa++;});
    var score = ctrls.length ? Math.round((p+pa*0.5)/ctrls.length*100) : 0;
    var col = fnColors[fn]||'var(--accent)';
    var scoreCol = score>=80?'var(--green)':score>=60?'var(--yellow)':'var(--red)';
    return '<div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="setNistFilter(\'activeFunction\',\''+(activeFunction===fn?'All':fn)+'\')">'
      +'<div style="width:70px;font-size:11px;font-weight:600;color:'+col+'">'+fn+'</div>'
      +'<div style="flex:1;height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden">'
        +'<div style="height:100%;width:'+score+'%;background:'+scoreCol+';border-radius:3px"></div>'
      +'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+scoreCol+';min-width:32px;text-align:right">'+score+'%</div>'
      +'<div style="font-size:10px;color:var(--text-muted);min-width:60px">'+p+' pass · '+f+' fail</div>'
    +'</div>';
  }).join('');

  // Control cards
  var cards = controls.map(function(c) {
    var r = d.responses[c.id]||{};
    var status = r.status||'Not Assessed';
    var notes  = r.notes||'';
    var stCol  = status==='Pass'?'var(--green)':status==='Fail'?'var(--red)':status==='Partial'?'var(--yellow)':'var(--text-muted)';
    var stBg   = status==='Pass'?'var(--green-dim)':status==='Fail'?'var(--red-dim)':status==='Partial'?'var(--yellow-dim)':'var(--bg-surface)';
    var fnCol  = fnColors[c.fn]||'var(--accent)';
    var qHtml  = c.q.map(function(q,i){return '<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text-secondary)"><span style="color:var(--accent);font-weight:600;flex-shrink:0">'+(i+1)+'.</span><span>'+q+'</span></div>';}).join('');

    return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;border-left:3px solid '+stCol+'">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
        +'<div style="flex:1">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
            +'<span style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted)">'+c.id+'</span>'
            +'<span style="font-size:10px;font-weight:700;color:'+fnCol+';background:'+fnCol+'22;padding:1px 8px;border-radius:10px">'+c.fn+'</span>'
            +'<span style="font-size:10px;color:var(--text-muted)">'+c.sub+'</span>'
          +'</div>'
          +'<div style="font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.5">'+c.desc+'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px;flex-shrink:0;align-items:center">'
          +'<select style="background:'+stBg+';color:'+stCol+';border:1px solid '+stCol+'55;border-radius:6px;padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer" onchange="setNistResponse(\''+c.id+'\',\'status\',this.value)">'
            +['Not Assessed','Pass','Partial','Fail'].map(function(s){return '<option value="'+s+'"'+(status===s?' selected':'')+'>'+s+'</option>';}).join('')
          +'</select>'
        +'</div>'
      +'</div>'
      +(qHtml ? '<details style="cursor:pointer"><summary style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);list-style:none">&#9656; Assessment Questions ('+c.q.length+')</summary><div style="margin-top:10px;padding:12px;background:var(--bg-surface);border-radius:6px">'+qHtml+'</div></details>' : '')
      +'<textarea placeholder="Notes / findings…" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text-secondary);resize:vertical;min-height:36px;font-family:inherit;line-height:1.5" rows="1" onchange="setNistResponse(\''+c.id+'\',\'notes\',this.value)">'+notes+'</textarea>'
    +'</div>';
  }).join('');

  return '<div class="content-area">'
    // Header
    +'<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">'
      +'<div>'
        +'<h2>NIST CSF Assessment</h2>'
        +'<p>'+passed+' pass &nbsp;·&nbsp; '+failed+' fail &nbsp;·&nbsp; '+partial+' partial &nbsp;·&nbsp; '+notAssessed+' not assessed &nbsp;·&nbsp; <strong style="color:'+ratingCol+'">'+pct+'% — '+ratingLabel+'</strong></p>'
      +'</div>'
      +'<button class="btn btn-primary" onclick="exportNistReport()">&#128438; Export Report</button>'
    +'</div>'

    // Scorecard
    +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:24px">'
      +'<div>'
        +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:12px">Score by Function <span style="font-weight:400;text-transform:none;letter-spacing:0">(click to filter)</span></div>'
        +fnBars
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-content:start">'
        +[['✅','Pass',passed,'var(--green)'],['❌','Fail',failed,'var(--red)'],['⚠️','Partial',partial,'var(--yellow)'],['⬜','Not Assessed',notAssessed,'var(--text-muted)']].map(function(s){
          return '<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">'
            +'<div style="font-size:20px;margin-bottom:2px">'+s[0]+'</div>'
            +'<div style="font-size:22px;font-weight:800;color:'+s[3]+'">'+s[2]+'</div>'
            +'<div style="font-size:11px;color:var(--text-muted)">'+s[1]+'</div>'
          +'</div>';
        }).join('')
      +'</div>'
    +'</div>'

    // Function + sub-cat filters
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;padding:14px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:72px">Function</span>'
        +'<div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">'
          +functions.map(function(f){var col=fnColors[f]||'';var style=activeFunction===f&&f!=='All'?'background:'+col+'22;border-color:'+col+';color:'+col:'';return '<div class="filter-chip '+(activeFunction===f?'active':'')+'" style="'+style+'" onclick="setNistFilter(\'activeFunction\',\''+f+'\')">'+f+'</div>';}).join('')
        +'</div>'
      +'</div>'
      +'<div style="height:1px;background:var(--border)"></div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:72px">Category</span>'
        +'<div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">'
          +subcats.map(function(s){return '<div class="filter-chip '+(activeSubcat===s?'active':'')+'" onclick="setNistFilter(\'activeSubcat\',\''+s+'\')">'+s+'</div>';}).join('')
        +'</div>'
      +'</div>'
    +'</div>'

    // Controls count
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Showing '+controls.length+' of '+total+' controls</div>'

    // Cards grid
    +'<div style="display:flex;flex-direction:column;gap:10px">'
      +cards
    +'</div>'
  +'</div>';
}
