var PROJECT_WORKSPACE_KEY = 'grcProjectWorkspaces_v1';
var activeProjectId = null; // null = main platform, 'PJ-001' etc = project mode

function getWorkspaces() {
  try { var r = localStorage.getItem(PROJECT_WORKSPACE_KEY); return r ? JSON.parse(r) : {}; }
  catch(e) { return {}; }
}

function saveWorkspaces(ws) {
  localStorage.setItem(PROJECT_WORKSPACE_KEY, JSON.stringify(ws));
  markVisitorActivity();
}

function getProjectStore(pid) {
  var ws = getWorkspaces();
  if (!ws[pid]) return null;
  return ws[pid].store || null;
}

function saveProjectStore(pid, data) {
  var ws = getWorkspaces();
  if (!ws[pid]) ws[pid] = {};
  ws[pid].store = data;
  ws[pid].lastModified = new Date().toISOString();
  saveWorkspaces(ws);
}

function initProjectWorkspace(pid) {
  var ws = getWorkspaces();
  if (ws[pid] && ws[pid].store && (ws[pid].store.assets||[]).length > 0) return; // already seeded
  // Seed with empty project store (no pre-existing main store data)
  var projectDef = [].concat(LEARNING_DATA.projects).find(function(p){ return p.id === pid; });
  var empty = {
    assets:[], risks:[], controls:[], evidence:[], audits:[], soa:[],
    incidents:[], vendors:[], resilience:[], policies:[], treatmentPlans:[],
    _projectId: pid,
    _projectTitle: projectDef ? projectDef.title : pid,
    _projectCompany: projectDef ? projectDef.company : '',
    _startedAt: new Date().toISOString()
  };
  ws[pid] = ws[pid] || {};
  ws[pid].store = empty;
  ws[pid].startedAt = ws[pid].startedAt || new Date().toISOString();
  ws[pid].lastModified = new Date().toISOString();
  saveWorkspaces(ws);
}

function enterProjectMode(pid) {
  initProjectWorkspace(pid);
  activeProjectId = pid;
  // Do NOT persist to localStorage — project mode is session-only
  // so main platform data is always accessible on reload
  launchGuide(pid);
}

function exitProjectMode() {
  activeProjectId = null;
  localStorage.removeItem('grcActiveProject_v1');
  guideState.active = false; saveGuideState();
  currentView = 'learning';
  render();
}

// Override store/saveStore when in project mode
// Override store/updateStore to support project workspaces
var _origStore = store;
var _origUpdateStore = updateStore;

store = function() {
  if (activeProjectId) {
    return getProjectStore(activeProjectId) || JSON.parse(JSON.stringify(SEED_DATA));
  }
  return getStore() || JSON.parse(JSON.stringify(SEED_DATA));
};

updateStore = function(fn) {
  if (activeProjectId) {
    var s = store();
    fn(s);
    saveProjectStore(activeProjectId, s);
    render();
    checkGuideStepValidation();
  } else {
    var s = getStore() || JSON.parse(JSON.stringify(SEED_DATA));
    fn(s);
    saveStore(s);
    render();
    checkGuideStepValidation();
  }
};

// Always start on main platform — project mode must be entered explicitly
(function() {
  localStorage.removeItem('grcActiveProject_v1');
  activeProjectId = null;
})();

// PROJECT EXPORT (JSON)
// ============================================================
function exportProject(pid) {
  var ws = getWorkspaces();
  if (!ws[pid] || !ws[pid].store) {
    showToast('\u26a0 No project data to export. Complete some tasks first.');
    return;
  }
  if (!checkExportRateLimit()) return;
  // SECURITY: Only exports workspace data entered by the user in this project session.
  // Internal project definitions (LEARNING_DATA) are not included beyond basic metadata.
  var ws = getWorkspaces();
  if (!ws[pid]) { showToast('No project data to export'); return; }
  var projectDef = LEARNING_DATA.projects.find(function(p){ return p.id === pid; });
  var l = getLearning();
  // Audit log
  try {
    var exportLog = JSON.parse(localStorage.getItem('grc_export_log') || '[]');
    exportLog.push({ action: 'export_project', projectId: pid, ts: new Date().toISOString() });
    if (exportLog.length > 50) exportLog = exportLog.slice(-50);
    localStorage.setItem('grc_export_log', JSON.stringify(exportLog));
  } catch(e) {}
  var payload = {
    _exportVersion: '1.0',
    _exportedAt: new Date().toISOString(),
    _exportedBy: 'Chris Olowo GRC Platform',
    _notice: 'This file contains only user-entered project workspace data.',
    projectId: pid,
    projectTitle: projectDef ? projectDef.title : pid,
    projectCompany: projectDef ? projectDef.company : '',
    projectFrameworks: projectDef ? projectDef.frameworks : [],
    progress: l.progress[pid] || {},
    store: ws[pid].store || {},
    startedAt: ws[pid].startedAt,
    lastModified: ws[pid].lastModified
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (projectDef ? projectDef.company.replace(/[^a-z0-9]/gi,'_') : pid) + '_GRC_Project.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Project exported successfully');
}

// ============================================================
// PROJECT IMPORT (JSON)
// ============================================================
function importProject() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var payload = JSON.parse(ev.target.result);
        if (!payload.projectId || !payload.store) { showToast('Invalid project file'); return; }
        var ws = getWorkspaces();
        ws[payload.projectId] = {
          store: payload.store,
          startedAt: payload.startedAt || new Date().toISOString(),
          lastModified: new Date().toISOString()
        };
        saveWorkspaces(ws);
        // Import progress
        var l = getLearning();
        if (payload.progress) { l.progress[payload.projectId] = payload.progress; saveLearning(l); }
        showToast('Project imported: ' + payload.projectTitle);
        currentView = 'learning'; render();
      } catch(err) { showToast('Could not read file — check it is a valid GRC project export'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click(); document.body.removeChild(input);
}

        + '<div class="cl-num">' + (i+1) + '</div>'

    }).join('')

function resetProjectWorkspace(pid) {
  var TEMPLATE_IDS = ['PJ-001','PJ-002','PJ-003','PJ-004','PJ-005'];
  var isTemplate = TEMPLATE_IDS.indexOf(pid) !== -1;
  var msg = isTemplate
    ? 'Start this project fresh? Your saved progress will be cleared and you\'ll begin from the start — the project template stays intact and cannot be deleted.'
    : 'Start this project fresh? All saved progress will be cleared. This cannot be undone.';
  if (!confirm(msg)) return;
  var ws = getWorkspaces();
  delete ws[pid];
  saveWorkspaces(ws);
  var l = getLearning();
  if (l.progress[pid]) { delete l.progress[pid]; saveLearning(l); }
  if (activeProjectId === pid) { exitProjectMode(); return; }
  showToast('Project reset');
  render();
}

  const triggerRows = RISK_TRIGGERS.map(t => `

      <td style="padding:10px 12px;font-size:12px;color:var(--text-secondary)">${t.riskType}</td>

      <td style="padding:10px 12px;"><span class="badge badge-secondary" style="font-family:var(--font-mono);font-size:10px">${t.riskId}</span></td>

  return `<div class="content-area">
    <div class="page-header">
      <h2>Data Governance</h2>
      <p class="page-desc">Data classification, lifecycle management, and risk triggers. SIEM alerts and vendor events that impact data risk flow directly into the Risk Register.</p>

    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">System Flow:</div>
      ${['Data Classification','Data Lifecycle','⚠ Risk Trigger','Risk Register','Dashboard'].map((s,i,arr)=>`<span style="font-size:12px;color:var(--text-secondary)">${s}</span>${i<arr.length-1?'<span style="color:var(--text-muted)">→</span>':''}`).join('')}
    </div>

    <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Data Classification Matrix</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:28px;">
      ${classCards}
    </div>

    <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Data Lifecycle</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:28px;">
      ${lifecycleCards}
    </div>

    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;font-weight:600;color:var(--text-primary)">Data Risk Triggers → Risk Register</span>
        <button class="btn btn-secondary btn-sm" onclick="navigate('risks')">View Risk Register →</button>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:var(--bg-surface);border-bottom:1px solid var(--border);">
            <th style="padding:8px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase">Trigger Event</th>
            <th style="padding:8px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase">Classification</th>
            <th style="padding:8px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;white-space:nowrap">Risk Type</th>

}

// ============================================================
// CONTROL UNIVERSE MAP — End-to-end GRC traceability
// Policy → Control → Risk → Asset → Evidence → Audit
// ============================================================
function renderTraceability() {
  const s = store();

  // Build a lookup map for each entity type
  const policyMap  = Object.fromEntries((s.policies||[]).map(p=>[p.id,p]));
  const ctrlMap    = Object.fromEntries((s.controls||[]).map(c=>[c.id,c]));
  const riskMap    = Object.fromEntries((s.risks||[]).map(r=>[r.id,r]));
  const assetMap   = Object.fromEntries((s.assets||[]).map(a=>[a.id,a]));
  const evidenceMap= Object.fromEntries((s.evidence||[]).map(e=>[e.id,e]));
  const auditMap   = Object.fromEntries((s.audits||[]).map(a=>[a.id,a]));

  // Build chains: Policy → Controls (via linkedControls) → Risks (via ctrl.risks) → Asset → Evidence → Audits
  const chains = (s.policies||[]).map(pol => {
    const ctrls = (pol.linkedControls||[]).map(cid => {
      const ctrl = ctrlMap[cid];
      if (!ctrl) return null;
      const risks = (ctrl.risks||[]).map(rid => {
        const risk = riskMap[rid];
        if (!risk) return null;
        const asset = assetMap[risk.assetId] || null;
        return { risk, asset };
      }).filter(Boolean);
      const evIds = (ctrl.evidence||[]);
      const audits = Object.values(auditMap).filter(a=>(a.controls||[]).includes(ctrl.id));
      return { ctrl, risks, evIds, audits };
    }).filter(Boolean);
    return { pol, ctrls };
  });

  // Coverage stats
  const totalPolicies  = (s.policies||[]).length;
  const totalCtrls     = (s.controls||[]).length;
  const totalRisks     = (s.risks||[]).length;
  const linkedCtrls    = (s.controls||[]).filter(c=>(c.risks||[]).length>0).length;
  const evidencedCtrls = (s.controls||[]).filter(c=>(c.evidence||[]).length>0).length;
  const auditedCtrls   = (s.controls||[]).filter(c=>Object.values(auditMap).some(a=>(a.controls||[]).includes(c.id))).length;

  const ctrlColor = { Implemented:'#22c55e', 'In Progress':'#f59e0b', Planned:'#3b82f6', 'Not Implemented':'#ef4444' };
  const riskColor = { Critical:'#ef4444', High:'#f59e0b', Medium:'#3b82f6', Low:'#22c55e' };

  // Build the chain rows HTML
  const chainRows = chains.flatMap(({pol, ctrls}) => {
    if (ctrls.length === 0) {
      return [`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 12px;vertical-align:top">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${pol.name}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${pol.id}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${pol.category}</div>
        </td>
        <td colspan="5" style="padding:10px 12px;font-size:12px;color:var(--text-muted);font-style:italic">No controls linked to this policy</td>
      </tr>`];
    }
    return ctrls.map((c, ci) => {
      const riskCells = c.risks.length > 0
        ? c.risks.map(({risk,asset}) =>
            `<div style="margin-bottom:6px;padding:6px 8px;background:var(--bg-surface);border-radius:5px;border-left:2px solid ${riskColor[risk.category]||'var(--border)'}">
              <div style="font-size:11px;font-weight:600;color:var(--text-primary)">${risk.description}</div>
              <div style="display:flex;gap:6px;align-items:center;margin-top:2px;flex-wrap:wrap">
                <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${risk.id}</span>
                <span style="font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.2);color:${riskColor[risk.category]}">${risk.category}</span>
              </div>
              ${asset ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">📦 ${asset.name}</div>` : ''}
            </div>`).join('')
        : `<span style="font-size:11px;color:var(--text-muted);font-style:italic">No risks mapped</span>`;

      const evCell = c.evIds.length > 0
        ? c.evIds.map(eid => {
            const ev = evidenceMap[eid];
            if (!ev) return '';
            const ico = {Policy:'📄',Screenshot:'🖼️',Report:'📊',Config:'⚙️',Certificate:'🏅'}[ev.type]||'📎';
            return `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:3px">${ico} ${ev.name}</div>`;
          }).join('')
        : `<span style="font-size:11px;color:var(--text-muted);font-style:italic">No evidence</span>`;

      const audCell = c.audits.length > 0
        ? c.audits.map(a =>
            `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:3px">
              <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${a.id}</span> ${a.name}
              <span style="margin-left:4px;padding:1px 5px;border-radius:3px;font-size:10px;background:${a.status==='Completed'?'rgba(34,197,94,.1)':a.status==='In Progress'?'rgba(245,158,11,.1)':'rgba(59,130,246,.1)'};color:${a.status==='Completed'?'#22c55e':a.status==='In Progress'?'#f59e0b':'#3b82f6'}">${a.status}</span>
            </div>`).join('')
        : `<span style="font-size:11px;color:var(--text-muted);font-style:italic">Not audited</span>`;

      return `<tr style="border-bottom:1px solid var(--border)${ci>0?';background:rgba(255,255,255,.01)':''}">
        ${ci===0 ? `<td style="padding:10px 12px;vertical-align:top;border-right:1px solid var(--border)" rowspan="${ctrls.length}">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${pol.name}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${pol.id} · v${pol.version}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${pol.category}</div>
          <div style="margin-top:5px;padding:2px 7px;border-radius:3px;display:inline-block;font-size:10px;background:${pol.status==='Active'?'rgba(34,197,94,.1)':'rgba(245,158,11,.1)'};color:${pol.status==='Active'?'#22c55e':'#f59e0b'}">${pol.status}</div>
        </td>` : ''}
        <td style="padding:10px 12px;vertical-align:top;border-right:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${c.ctrl.name}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${c.ctrl.id}</div>
          <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
            <span style="padding:1px 6px;border-radius:3px;font-size:10px;background:rgba(0,0,0,.2);color:${ctrlColor[c.ctrl.status]||'var(--text-muted)'}">${c.ctrl.status}</span>
            <span style="padding:1px 6px;border-radius:3px;font-size:10px;background:var(--bg-surface);color:var(--text-muted)">${c.ctrl.framework}</span>
          </div>
        </td>
        <td style="padding:10px 12px;vertical-align:top;border-right:1px solid var(--border)">${riskCells}</td>
        <td style="padding:10px 12px;vertical-align:top;border-right:1px solid var(--border)">${evCell}</td>
        <td style="padding:10px 12px;vertical-align:top">${audCell}</td>
      </tr>`;
    });
  }).join('');

  // Gap analysis
  const gapPoliciesNoControls = (s.policies||[]).filter(p=>(p.linkedControls||[]).length===0);
  const gapControlsNoRisks    = (s.controls||[]).filter(c=>(c.risks||[]).length===0);
  const gapControlsNoEvidence = (s.controls||[]).filter(c=>(c.evidence||[]).length===0);
  const gapRisksNoControl     = (s.risks||[]).filter(r=>!(s.controls||[]).some(c=>(c.risks||[]).includes(r.id)));

  const gapRows = [
    { label:'Policies with no linked controls', items: gapPoliciesNoControls, color:'#f59e0b', icon:'📄', nav:'policies' },
    { label:'Controls with no mapped risks',    items: gapControlsNoRisks,    color:'#ef4444', icon:'🔒', nav:'controls' },
    { label:'Controls with no evidence',        items: gapControlsNoEvidence, color:'#f59e0b', icon:'📁', nav:'evidence' },
    { label:'Risks with no mitigating control', items: gapRisksNoControl,     color:'#ef4444', icon:'⚠️', nav:'risks' },
  ].filter(g => g.items.length > 0);

  return `<div class="content-area">
    <div class="page-header">
      <h2>Control Universe Map</h2>
      <p class="page-desc">End-to-end traceability across every GRC object. Trace any policy through its controls, the risks they mitigate, the assets at risk, the evidence collected, and the audits performed.</p>
    </div>

    <!-- System flow bar -->
    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px;overflow-x:auto">
      <div style="display:flex;align-items:center;gap:0;min-width:500px">
        ${[['📄','Policy','Defines requirements'],['→','',''],['🔒','Control','Implements requirements'],['→','',''],['⚠️','Risk','What the control mitigates'],['→','',''],['📦','Asset','What is being protected'],['→','',''],['📁','Evidence','Proof of implementation'],['→','',''],['📋','Audit','Independent verification']].map(([icon,label,desc])=>
          label ? `<div style="text-align:center;padding:8px 12px;flex:1;min-width:80px">
            <div style="font-size:18px">${icon}</div>
            <div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-top:3px">${label}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:1px">${desc}</div>
          </div>` : `<div style="color:var(--text-muted);font-size:14px;padding:0 2px">${icon}</div>`
        ).join('')}
      </div>
    </div>

    <!-- Coverage stats -->
    <div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:20px">
      ${[
        [totalPolicies, 'Policies', '#3b82f6'],
        [totalCtrls,    'Controls', '#3b82f6'],
        [totalRisks,    'Risks', '#ef4444'],
        [linkedCtrls,   'Controls → Risks', '#22c55e'],
        [evidencedCtrls,'Controls evidenced', '#22c55e'],
        [auditedCtrls,  'Controls audited', '#22c55e'],
      ].map(([n,l,c])=>`<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:${c}">${n}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:3px">${l}</div>
      </div>`).join('')}
    </div>

    <!-- Traceability table -->
    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span style="font-size:13px;font-weight:600;color:var(--text-primary)">Full Traceability Matrix</span>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text-muted)">${(s.policies||[]).length} policies · ${(s.controls||[]).length} controls · ${(s.risks||[]).length} risks</span>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:800px">
          <thead>
            <tr style="background:var(--bg-surface);border-bottom:1px solid var(--border)">
              <th style="padding:9px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;border-right:1px solid var(--border);width:16%">📄 Policy</th>
              <th style="padding:9px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;border-right:1px solid var(--border);width:18%">🔒 Control</th>
              <th style="padding:9px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;border-right:1px solid var(--border);width:28%">⚠️ Risk + 📦 Asset</th>
              <th style="padding:9px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;border-right:1px solid var(--border);width:20%">📁 Evidence</th>
              <th style="padding:9px 12px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;width:18%">📋 Audit</th>
            </tr>
          </thead>
          <tbody>${chainRows}</tbody>
        </table>
      </div>
    </div>

    ${gapRows.length > 0 ? `
    <!-- Gap analysis -->
    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:600;color:var(--text-primary)">Traceability Gaps</span>
        <span style="margin-left:8px;font-size:12px;color:var(--text-muted)">Objects with broken or missing links in the chain</span>
      </div>
      <div style="padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px">
        ${gapRows.map(g=>`
          <div style="background:var(--bg-surface);border:1px solid var(--border);border-left:3px solid ${g.color};border-radius:8px;padding:12px 14px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:12px;font-weight:600;color:var(--text-primary)">${g.icon} ${g.label}</span>
              <span style="font-size:18px;font-weight:700;color:${g.color}">${g.items.length}</span>
            </div>
            ${g.items.slice(0,3).map(item=>`<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px">· ${item.name||item.description}</div>`).join('')}
            ${g.items.length > 3 ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">+ ${g.items.length-3} more</div>` : ''}
            <button class="btn btn-secondary btn-xs" style="margin-top:8px" onclick="navigate('${g.nav}')">Review →</button>
          </div>`).join('')}
      </div>
    </div>` : `
    <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#22c55e">
      ✓ No traceability gaps detected — all policies, controls, risks, and evidence are linked.
    </div>`}
  </div>`;
}

          <a href="terms.html" target="_blank" style="font-size:10px;color:var(--text-muted);text-decoration:none;white-space:nowrap" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'" rel="noopener noreferrer">Terms &amp; Disclaimer</a>

// Apply sidebar state after every render (class must survive innerHTML replacement)
// Also preserves scroll position so assessment fills / control interactions don't jump to top.
const _origRender = render;
render = function() {
  // Save scroll position of the scrollable content area before re-render
  var contentArea = document.querySelector('.content-area');
  var savedScroll = contentArea ? contentArea.scrollTop : 0;
  var savedView = currentView;

  _origRender();
  applySidebarState();

  // Only restore scroll if the view hasn't changed (i.e. this was a data-only re-render,
  // not a navigation event). If the view changed, scroll to top is the correct behaviour.
  if (currentView === savedView) {
    var newContentArea = document.querySelector('.content-area');
    if (newContentArea && savedScroll > 0) {
      newContentArea.scrollTop = savedScroll;
    }
  }
};

// ── KEYBOARD SHORTCUTS (single consolidated listener) ──────────────────────
document.addEventListener('keydown', e => {
  // Only intercept shortcuts when focus is NOT inside an input/textarea/contenteditable
  var tag = document.activeElement ? document.activeElement.tagName : '';
  var isEditable = (tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement.isContentEditable);

  // Escape — close modal or mobile sidebar
  if (e.key === 'Escape') {
    if (modalState) closeModal();
    if (sidebarMobileOpen) { sidebarMobileOpen = false; applySidebarState(); }
    return;
  }
  // Secret admin shortcut: Ctrl + Shift + Alt + G (all held together)
  // Tab is reserved by browsers/OS and cannot be reliably captured
  if (e.ctrlKey && e.shiftKey && e.altKey && e.key === 'G') {
    e.preventDefault();
    if (!ADMIN_MODE) {
      activateAdminMode();
      var menu = document.getElementById('profile-menu');
      if (menu && menu.style.display === 'none') toggleProfileMenu();
    }
  }
});

function visitorResetSession() {
  if (!confirm('Reset your session? This will restore the demo data and clear any changes you made in this browser. This only affects your own session — no one else is impacted.')) return;
  // Clear ALL platform localStorage keys so assessment scores, KPIs, trends and guide state also reset
  var keysToRemove = [
    'grc_store_v3', 'grcLearningProgress_v1', 'grcGuideState_v1',
    'grcKpiRoi_v1', 'grcRiskTrends_v1', 'grcNistAssessment_v1',
    'grcProjectWorkspaces_v1', 'grcActiveProject_v1', 'grcPlatSidebarCollapsed',
    'grcSidebarAssessOpen', 'grcRiskTrendPeriod', 'grcRiskTrendTab'
  ];
  // Also clear all framework assessment keys
  ['iso27001','soc2','gdpr','cis','hipaa'].forEach(function(id) {
    keysToRemove.push('grcAssessment_v1_' + id);
  });
  keysToRemove.forEach(function(k) {
    try { localStorage.removeItem(k); } catch(e) {}
  });
  saveStore(JSON.parse(JSON.stringify(SEED_DATA)));
  render();
  showToast('Your session has been reset to demo data');
}
