function renderLearning() {
  var l      = getLearning();
  var tab    = l.activeTab    || 'missions';
  var filter = l.activeFilter || 'All';
  var ws     = getWorkspaces();

  // ── Counts for header stats ──────────────────────────────
  var allMods = LEARNING_DATA.missions.concat(LEARNING_DATA.scenarios).concat(LEARNING_DATA.projects);
  var completedCount = allMods.filter(function(m){
    var steps = m.steps || m.tasks || [];
    var prog  = getModuleProgress(m.id);
    return steps.length > 0 && prog.completedSteps.length >= steps.length;
  }).length;
  var startedCount = Object.keys(l.progress).filter(function(id){ return l.progress[id].started; }).length;
  var totalModules  = allMods.length;
  var activeProjects = LEARNING_DATA.projects.filter(function(p){
    return ws[p.id] && ws[p.id].store;
  }).length;

  // ── Tab helpers ──────────────────────────────────────────
  function fwTag(fw) {
    var cls = fw.toLowerCase().indexOf('iso')  !== -1 ? 'iso'
            : fw.toLowerCase().indexOf('soc')  !== -1 ? 'soc'
            : fw.toLowerCase().indexOf('pci')  !== -1 ? 'pci'
            : fw.toLowerCase().indexOf('nist') !== -1 ? 'nist' : '';
    return '<span class="lframework-tag ' + cls + '">' + fw + '</span>';
  }
  function diffClass(d) {
    return d === 'Beginner' ? 'badge-success' : d === 'Intermediate' ? 'badge-warning' : 'badge-critical';
  }

  // ── Standard card (missions + scenarios) ─────────────────
  function card(item) {
    var steps = item.steps || item.tasks || [];
    var prog  = getModuleProgress(item.id);
    var rawDone = prog.completedSteps || [];
    var done  = rawDone.slice(0, steps.length); // cap at defined steps
    var pct   = steps.length ? Math.min(100, Math.round(done.length / steps.length * 100)) : 0;
    var complete = steps.length > 0 && done.length >= steps.length;
    var started  = prog.started || done.length > 0;
    var linkTarget = item.links ? item.links[0] : 'dashboard';
    var mid  = item.id;

    var stepsHtml = steps.map(function(s) {
      var isDone = done.indexOf(s.id) !== -1;
      var markFn = "toggleLearningStep('" + mid + "'," + s.id + ")";
      return '<div class="lstep' + (isDone ? ' done' : '') + '">'
           + '<div class="lstep-num" onclick="' + markFn + '" style="cursor:pointer" title="Toggle step">'
           + (isDone ? '&#10003;' : s.id)
           + '</div>'
           + '<span style="cursor:pointer" onclick="' + markFn + '">' + s.label + '</span>'
           + '</div>';
    }).join('');

    var fwHtml    = item.frameworks ? '<div class="lproject-frameworks">' + item.frameworks.map(fwTag).join('') + '</div>' : '';
    var resetFn   = "resetModuleProgress('" + mid + "')";
    var hasGuideDefs = typeof STEP_DEFS !== 'undefined' && STEP_DEFS[mid] && STEP_DEFS[mid].length > 0;
    var startFn   = complete ? ("reviewLearningItem('" + mid + "')") : started ? ("openMissionDashboard('" + mid + "')") : ("openMissionDashboard('" + mid + "')");
    var resetBtn  = started ? '<button class="btn btn-xs btn-secondary" onclick="' + resetFn + '" title="Reset progress">&#8635;</button>' : '';
    var startLbl  = complete ? '&#128257; Review' : started ? '&#9654; Continue' : '&#128640; Start';
    var startBtn  = '<button class="btn btn-sm ' + (complete ? 'btn-secondary' : 'btn-primary') + '" onclick="' + startFn + '">' + startLbl + '</button>';

    return '<div class="lcard' + (complete ? ' is-complete' : '') + '" data-diff="' + item.difficulty + '">'
         + '<div class="lcard-header">'
           + '<div class="lcard-icon">' + item.icon + '</div>'
           + '<div class="lcard-meta">'
             + '<div class="lcard-title">' + item.title + '</div>'
             + '<div class="lcard-badges">'
               + '<span class="badge ' + diffClass(item.difficulty) + '">' + item.difficulty + '</span>'
               + '<span class="badge badge-info">' + item.category + '</span>'
               + (complete ? '<span class="lcomplete-badge">&#10003; Complete</span>' : '')
             + '</div>'
           + '</div>'
         + '</div>'
         + '<p class="lcard-desc">' + item.description + '</p>'
         + fwHtml
         + '<div class="lsteps">' + stepsHtml + '</div>'
         + '<div class="lprogress">'
           + '<div class="lprogress-row">'
             + '<span class="lprogress-label">' + done.length + ' / ' + steps.length + ' steps complete</span>'
             + '<span class="lprogress-pct">' + pct + '%</span>'
           + '</div>'
           + '<div class="lprogress-track"><div class="lprogress-fill' + (complete ? ' green' : '') + '" style="width:' + pct + '%"></div></div>'
         + '</div>'
         + '<div class="lcard-footer">'
           + '<div class="lcard-footer-meta"><span>&#9201; ' + item.estimatedTime + '</span></div>'
           + '<div style="display:flex;gap:6px;align-items:center">' + resetBtn + startBtn + '</div>'
         + '</div>'
         + '</div>';
  }

  // ── Project Workspace Card ───────────────────────────────
  function projectCard(item) {
    var steps    = item.tasks || [];
    var prog     = getModuleProgress(item.id);
    var done     = prog.completedSteps || [];
    var pct      = steps.length ? Math.round(done.length / steps.length * 100) : 0;
    var complete = steps.length > 0 && done.length >= steps.length;
    var wsData   = ws[item.id];
    var hasData  = wsData && wsData.store;
    var started  = hasData || done.length > 0;
    var s        = hasData ? wsData.store : null;

    // Stats from project store
    var statBar = '';
    if (s) {
      var stats = [
        {label:'Assets',    val:s.assets.length},
        {label:'Risks',     val:s.risks.length},
        {label:'Controls',  val:s.controls.length},
        {label:'Evidence',  val:s.evidence.length},
      ];
      statBar = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0">'
        + stats.map(function(st){
            return '<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center">'
              + '<div style="font-size:18px;font-weight:800;color:var(--accent);font-family:var(--font-mono)">' + st.val + '</div>'
              + '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">' + st.label + '</div>'
              + '</div>';
          }).join('')
        + '</div>';
    }

    // Last modified
    var lastMod = wsData && wsData.lastModified
      ? '<span style="font-size:11px;color:var(--text-muted)">Last saved: ' + new Date(wsData.lastModified).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) + '</span>'
      : '';

    // Framework tags
    var fwHtml = item.frameworks ? '<div class="lproject-frameworks" style="margin-bottom:12px">' + item.frameworks.map(fwTag).join('') + '</div>' : '';

    // Buttons
    var TEMPLATE_IDS = ['PJ-001','PJ-002','PJ-003','PJ-004','PJ-005'];
    var isTemplate = TEMPLATE_IDS.indexOf(item.id) !== -1;
    var enterBtn   = '<button class="btn btn-sm btn-primary" onclick="enterProjectMode(\'' + item.id + '\')">'
                   + (started ? '&#9654; Continue Project' : '&#128640; Start Project') + '</button>';
    var exportBtn  = hasData ? '<button class="btn btn-sm btn-secondary" onclick="exportProject(\'' + item.id + '\')" title="Export project as JSON">&#128229; Export</button>' : '';
    var reportBtn  = hasData && done.length > 0 ? '<button class="btn btn-sm btn-secondary" onclick="generateProjectReport(\'' + item.id + '\')" title="Generate completion report">&#128196; Report</button>' : '';
    var resetBtn   = hasData ? '<button class="btn btn-xs btn-secondary" onclick="resetProjectWorkspace(\'' + item.id + '\')" title="Clear progress and start this project fresh" style="color:var(--red)">&#8635; Start Fresh</button>' : '';
    var lockBadge  = isTemplate ? '<span title="Built-in template — cannot be deleted" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-surface)">&#128274; Template</span>' : '';

    // Status badge
    var statusBadge = complete
      ? '<span class="badge badge-success">&#10003; Complete</span>'
      : started
      ? '<span class="badge badge-warning">In Progress</span>'
      : '<span class="badge badge-gray">Not Started</span>';

    return '<div class="lcard project-workspace-card' + (complete ? ' is-complete' : '') + '" style="border-top:3px solid var(--accent)">'
      + '<div class="lcard-header">'
        + '<div class="lcard-icon">' + item.icon + '</div>'
        + '<div class="lcard-meta" style="flex:1">'
          + '<div class="lcard-title">' + item.title + '</div>'
          + '<div class="lcard-badges">'
            + '<span class="badge ' + diffClass(item.difficulty) + '">' + item.difficulty + '</span>'
            + '<span class="badge badge-info">' + item.category + '</span>'
            + statusBadge
            + (complete ? '<span class="lcomplete-badge">&#10003; Complete</span>' : '')
          + '</div>'
        + '</div>'
      + '</div>'
      + '<div style="font-size:12px;color:var(--text-muted);margin:4px 0 10px;font-style:italic">'
        + item.company + ' &nbsp;·&nbsp; ' + (item.employees||'') + ' &nbsp;·&nbsp; ' + item.industry
      + '</div>'
      + '<p class="lcard-desc">' + item.description + '</p>'
      + fwHtml
      + statBar

      // Task checklist (compact)
      + '<div style="margin:10px 0;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px">'
        + '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px">Project Tasks</div>'
        + steps.map(function(st,i){
            var isDone = done.indexOf(i) !== -1;
            return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-subtle,rgba(255,255,255,.04))">'
              + '<div style="width:16px;height:16px;border-radius:50%;flex-shrink:0;background:' + (isDone?'var(--green)':'var(--border)') + ';display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">'
              + (isDone?'&#10003;':'') + '</div>'
              + '<span style="font-size:12px;color:' + (isDone?'var(--text-primary)':'var(--text-muted)') + '">' + st.label + '</span>'
              + '</div>';
          }).join('')
      + '</div>'

      // Progress bar
      + '<div class="lprogress">'
        + '<div class="lprogress-row">'
          + '<span class="lprogress-label">' + done.length + ' / ' + steps.length + ' tasks complete</span>'
          + '<span class="lprogress-pct">' + pct + '%</span>'
        + '</div>'
        + '<div class="lprogress-track"><div class="lprogress-fill' + (complete?' green':'') + '" style="width:' + pct + '%"></div></div>'
      + '</div>'

      + '<div class="lcard-footer">'
        + '<div class="lcard-footer-meta">'
          + '<span>&#9201; ' + item.estimatedTime + '</span>'
          + lastMod
        + '</div>'
        + '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'
          + lockBadge + resetBtn + reportBtn + exportBtn + enterBtn
        + '</div>'
      + '</div>'
      + '</div>';
  }

  // ── Tab content ──────────────────────────────────────────
  var tabDesc = tab === 'missions'
    ? '<strong style="color:var(--text-primary)">&#128214; Guided Missions</strong> &mdash; Step-by-step walkthroughs teaching core GRC workflows. The guide panel walks you through each step inside the live platform.'
    : tab === 'scenarios'
    ? '<strong style="color:var(--text-primary)">&#127919; Practice Scenarios</strong> &mdash; Simulated real-world GRC situations. Work through each step using the live platform features.'
    : '<strong style="color:var(--text-primary)">&#127959; GRC Practice Projects</strong> &mdash; Enterprise-scale simulations. Each project runs in its own <strong>isolated workspace</strong> — your data is kept separate from the main platform. Complete projects end-to-end, export your work as JSON, import it to share with others, and generate a PDF completion report.';

  var tabBar = ['missions','scenarios','projects'].map(function(t){
    var labels = { missions:'&#128450;&#65039; Guided Missions', scenarios:'&#127919; Practice Scenarios', projects:'&#127959; GRC Practice Projects' };
    var badge  = t === 'projects' && activeProjects > 0 ? ' <span class="nav-badge" style="margin-left:4px">'+activeProjects+'</span>' : '';
    return '<button class="ltab' + (tab===t?' active':'') + '" role="tab" aria-selected="' + (tab===t) + '" onclick="setLearningTab(\'' + t + '\')">' + labels[t] + badge + '</button>';
  }).join('');

  // ── Filter bar (missions/scenarios only) ─────────────────
  var allItems = tab === 'missions'  ? LEARNING_DATA.missions
               : tab === 'scenarios' ? LEARNING_DATA.scenarios
               :                       LEARNING_DATA.projects;
  var allCategories = ['All'].concat(
    Object.keys(allItems.reduce(function(acc,m){ acc[m.category]=1; return acc; }, {}))
  );
  var filtered = filter === 'All' ? allItems : allItems.filter(function(m){ return m.category === filter; });
  var filterBar = tab !== 'projects'
    ? '<div class="lfilter-bar"><span style="font-size:12px;color:var(--text-muted);margin-right:4px">Filter:</span>'
      + allCategories.map(function(cat){
          return '<span class="filter-chip' + (filter===cat?' active':'') + '" onclick="setLearningFilter(\'' + cat + '\')">' + cat + '</span>';
        }).join('')
      + '</div>'
    : '';

  // ── Import button (projects tab only) ────────────────────
  var importBtn = tab === 'projects'
    ? '<button class="btn btn-secondary btn-sm" onclick="importProject()" style="margin-left:auto">&#128228; Import Project</button>'
    : '';

  // ── Cards HTML ───────────────────────────────────────────
  var cardsHtml = filtered.length === 0
    ? '<div class="lcard-empty"><div class="empty-icon">&#128269;</div><p>No modules match this filter.</p></div>'
    : tab === 'projects'
    ? filtered.map(projectCard).join('')
    : filtered.map(card).join('');

  return '<div class="content-area">'
    + '<div class="learning-hero">'
      + '<div>'
        + '<h2>&#127891; Learning Mode</h2>'
        + '<p>Practice real-world GRC workflows in a safe sandbox. Work through guided missions, simulate operational scenarios, and tackle enterprise-scale projects &mdash; all inside the live platform.</p>'
      + '</div>'
      + '<div class="learning-hero-stats">'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + completedCount   + '</div><div class="lhero-stat-label">Completed</div></div>'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + startedCount     + '</div><div class="lhero-stat-label">In Progress</div></div>'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + totalModules     + '</div><div class="lhero-stat-label">Total Modules</div></div>'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + activeProjects   + '</div><div class="lhero-stat-label">Active Projects</div></div>'
      + '</div>'
    + '</div>'
    + '<div class="ltab-bar" role="tablist" aria-label="Learning sections" style="display:flex;align-items:center">'
      + tabBar
      + importBtn
    + '</div>'
    + '<div style="margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;color:var(--text-secondary)">' + tabDesc + '</div>'
    + filterBar
    + '<div class="lcard-grid">' + cardsHtml + '</div>'

    // Active project banner (if in project mode)
    + (activeProjectId ? ''
      + '<div id="project-mode-banner" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;gap:14px">'
      + '&#127959; Project Mode: ' + activeProjectId
      + '<button onclick="exitProjectMode()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:700">&#x2715; Exit</button>'
      + '</div>'
      : '')
    + '</div>';
}

function toggleProfileMenu() {
  const menu = document.getElementById('profile-menu');
  if (!menu) return;
  const isOpen = menu.style.display !== 'none';
  if (isOpen) {
    menu.style.display = 'none';
    const av = document.getElementById('profile-avatar');
    if (av) av.classList.remove('active');
  } else {
    // Populate live stats
    const s = store();
    const psC = document.getElementById('ps-controls');
    const psR = document.getElementById('ps-risks');
    const psA = document.getElementById('ps-audits');
    if (psC) psC.textContent = s.controls ? s.controls.length : 0;
    if (psR) psR.textContent = s.risks ? s.risks.length : 0;
    if (psA) psA.textContent = s.audits ? s.audits.length : 0;
    menu.style.display = 'block';
    const av = document.getElementById('profile-avatar');
    if (av) av.classList.add('active');
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', function _close(e) {
        const av2 = document.getElementById('profile-avatar');
        if (!menu.contains(e.target) && e.target !== av2 && !menu.querySelector('*') === false) {
          menu.style.display = 'none';
          if (av2) av2.classList.remove('active');
          document.removeEventListener('click', _close);
        }
      });
    }, 50);
  }
}


// ── EXPORT ACCESS ───────────────────────────────────────────────────────────
// All exports are open — no passphrase gate. Client-side passphrases stored
// in source code are not a security control (trivially bypassed via DevTools).
// Export access is unrestricted; rate limiting still applies.

function isOwner() { return true; }

// requireOwnerOrModified — allows export only when the visitor has entered their own data.
// Prevents downloading the platform's seed/template data before the user has added anything.
// No passphrase gate — client-side passphrases are not a security control.
function requireOwnerOrModified(exportFn) {
  if (visitorHasOwnData()) {
    exportFn();
    return;
  }
  // Visitor hasn't entered any data yet — exporting would just download seed/template data
  showToast('⚠ Add your own data first — enter risks, controls or assets before exporting.');
}

// ── Universal visitor activity flag ─────────────────────────────────────────
// Set from EVERY path where a visitor saves their own data:
// updateStore, setAssessmentResponse, setNistResponse, saveKpiStore, project workspaces.
// Stored in sessionStorage so it resets when the tab closes (fresh visitors start clean).
var _VISITOR_ACTIVITY_KEY = 'grc_visitor_has_own_data';

function markVisitorActivity() {
  try { sessionStorage.setItem(_VISITOR_ACTIVITY_KEY, '1'); } catch(e) {}
}

function visitorHasOwnData() {
  try { return sessionStorage.getItem(_VISITOR_ACTIVITY_KEY) === '1'; } catch(e) { return false; }
}

// ── EXPORT RATE LIMITER (SOC2 / OWASP aligned) ─────────────────────────────
// Prevents automated scraping / rapid successive exports.
var _exportRateLimit = { count: 0, windowStart: 0, MAX: 5, WINDOW_MS: 60000 };
function checkExportRateLimit() {
  var now = Date.now();
  if (now - _exportRateLimit.windowStart > _exportRateLimit.WINDOW_MS) {
    _exportRateLimit.count = 0;
    _exportRateLimit.windowStart = now;
  }
  _exportRateLimit.count++;
  if (_exportRateLimit.count > _exportRateLimit.MAX) {
    showToast('Export limit reached. Please wait a moment before exporting again.');
    try {
      var exportLog = JSON.parse(localStorage.getItem('grc_export_log') || '[]');
      exportLog.push({ action: 'export_rate_limited', ts: new Date().toISOString() });
      localStorage.setItem('grc_export_log', JSON.stringify(exportLog));
    } catch(e) {}
    return false;
  }
  return true;
}

function exportAllData() {
  requireOwnerOrModified(function() { _doExportAllData(); });
}
function _doExportAllData() {
  if (!checkExportRateLimit()) return;
  const s = store();
  // SECURITY: Export only user-inputted session data (risks, controls, assets, evidence, incidents, vendors).
  // Internal seed/platform datasets (SEED_DATA, framework libraries, learning modules) are excluded from exports.
  // Users may only download data they have personally entered into this session.
  const userPayload = {
    exportedAt: new Date().toISOString(),
    platform: 'Chris Olowo GRC Platform v3',
    exportType: 'user-session-data',
    notice: 'This export contains only data entered by the user in this session. Internal platform datasets and proprietary templates are excluded.',
    data: {
      risks: s.risks || [],
      controls: s.controls || [],
      assets: s.assets || [],
      evidence: s.evidence || [],
      incidents: s.incidents || [],
      vendors: s.vendors || []
    }
  };
  // Audit log (client-side — in a real backend, log server-side)
  try {
    var exportLog = JSON.parse(localStorage.getItem('grc_export_log') || '[]');
    exportLog.push({ action: 'export_all', ts: new Date().toISOString(), recordCount: Object.values(userPayload.data).reduce(function(acc,arr){return acc+(arr.length||0);},0) });
    if (exportLog.length > 50) exportLog = exportLog.slice(-50); // keep last 50
    localStorage.setItem('grc_export_log', JSON.stringify(exportLog));
  } catch(e) {}
  const blob = new Blob([JSON.stringify(userPayload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'GRC_My_Data_Export_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Your data exported successfully. Only your session data is included.');
}

function importAllData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        // Support both raw store and wrapped export format
        const data = parsed.data || parsed;
        const required = ['assets','risks','controls','evidence','vendors'];
        const valid = required.every(k => Array.isArray(data[k]));
        if (!valid) { showError('Invalid GRC export file — missing required data sections.'); return; }
        if (!confirm('This will replace ALL current data with the imported file. Continue?')) return;
        saveStore(data);
        render();
        showToast('Data imported successfully');
      } catch(err) {
        showError('Could not read file — make sure it is a valid GRC Platform JSON export.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── FAIR Calculations ────────────────────────────────────────────────────────
function calcFair(f) {
  var lef    = f.tef * (f.susceptibility/100);
  var totalLoss = f.primaryLoss + f.secondaryLoss;
  var ale    = totalLoss * lef;
  var newSusc = (f.susceptibility/100) * (1 - f.controlReduction/100);
  var newLef  = f.tef * newSusc;
  var newAle  = totalLoss * newLef;
  var totalCostWithControl = newAle + f.controlCost;
  var savings = ale - totalCostWithControl;
  var rosi    = f.controlCost > 0 ? Math.round((savings / f.controlCost) * 100) : 0;
  var breakeven = savings > 0 ? Math.round(f.controlCost / (ale - newAle) * 12) : null;
  return { lef, totalLoss, ale, newLef, newAle, totalCostWithControl, savings, rosi, breakeven };
}

function fmt(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000)    return '$' + Math.round(n/1000) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function fmtRaw(n) { return n >= 1000 ? Math.round(n/1000)+'K' : String(Math.round(n)); }

// ── Auto-calculate MTTD/MTTR from incident records ─────────────────────────
function calcAutoMttd(incidents) {
  // MTTD: avg hours between incident date and first response (use closedDate if available)
  const resolved = incidents.filter(i=>i.date&&i.closedDate&&i.closedDate!=='');
  if (!resolved.length) return null;
  const hours = resolved.map(i=>{
    const ms = new Date(i.closedDate) - new Date(i.date);
    return Math.max(0, ms/3600000);
  });
  return Math.round(hours.reduce((a,b)=>a+b,0)/hours.length * 10) / 10;
}
function calcAutoMttr(incidents) {
  const resolved = incidents.filter(i=>i.status==='Resolved'&&i.date&&i.closedDate&&i.closedDate!=='');
  if (!resolved.length) return null;
  const hours = resolved.map(i=>Math.max(0,(new Date(i.closedDate)-new Date(i.date))/3600000));
  return Math.round(hours.reduce((a,b)=>a+b,0)/hours.length * 10) / 10;
}

function renderKpiRoi() {
  var d   = getKpiStore();
  var f   = d.fair;
  var k   = d.kpis;
  var tab = d.activeTab || 'fair';
  var fc  = calcFair(f);

  var tabs = [
    { id:'fair',       label:'FAIR Calculator',     icon:'⚖️'  },
    { id:'operational',label:'Operational KPIs',    icon:'⚙️'  },
    { id:'financial',  label:'Financial ROI',       icon:'💰'  },
    { id:'compliance', label:'Compliance KPIs',     icon:'📋'  },
    { id:'resilience', label:'Resilience KPIs',     icon:'🔄'  },
    { id:'dashboard',  label:'KPI Dashboard',       icon:'📊'  },
  ];

  // ── FAIR Tab ────────────────────────────────────────────────────────────
  function fairTab() {
    var rosiCol = fc.rosi>=200?'#10b981':fc.rosi>=100?'#f59e0b':fc.rosi>=0?'#f97316':'#ef4444';
    var rosiLabel = fc.rosi>=200?'Excellent':fc.rosi>=100?'Strong':fc.rosi>=0?'Moderate':'Negative';
    var savingsCol = fc.savings>0?'#10b981':'#ef4444';

    function fairInput(label, field, val, type, hint) {
      var isPercent = type==='percent';
      var isDollar  = type==='dollar';
      return '<div style="display:flex;flex-direction:column;gap:4px">'
        +'<label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">'+label+'</label>'
        +'<div style="display:flex;align-items:center;gap:6px">'
          +(isDollar?'<span style="font-size:13px;color:var(--text-muted);padding:0 2px">$</span>':'')
          +'<input type="number" value="'+val+'" min="0" '+(isPercent?'max="100"':'')+' '
            +'style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--text-primary);width:100%;font-family:var(--font-mono)" '
            +'oninput="updateFairField(\''+field+'\',parseFloat(this.value)||0);"/>'
          +(isPercent?'<span style="font-size:13px;color:var(--text-muted)">%</span>':'')
        +'</div>'
        +(hint?'<div style="font-size:11px;color:var(--text-muted)">'+hint+'</div>':'')
      +'</div>';
    }

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">'

      // ── Left: Inputs ──────────────────────────────────────────────────────
      +'<div style="display:flex;flex-direction:column;gap:20px">'

        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px">'
          +'<div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:4px">📌 Risk Scenario</div>'
          +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Define the threat event you are analysing</div>'
          +'<div style="display:flex;flex-direction:column;gap:10px">'
            +'<div>'
              +'<label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Scenario Name</label>'
              +'<input type="text" value="'+f.scenarioName+'" style="width:100%;margin-top:4px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--text-primary);font-family:inherit" oninput="updateFairField(\'scenarioName\',this.value)"/>'
            +'</div>'
            +'<div>'
              +'<label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Description</label>'
              +'<textarea style="width:100%;margin-top:4px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text-secondary);font-family:inherit;resize:vertical" rows="2" oninput="updateFairField(\'scenarioDesc\',this.value)">'+f.scenarioDesc+'</textarea>'
            +'</div>'
          +'</div>'
        +'</div>'

        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px">'
          +'<div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:4px">🎯 Threat Frequency & Susceptibility</div>'
          +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:14px">How often does the threat occur and succeed?</div>'

  // ── Operational KPIs ─────────────────────────────────────────────────────
  function kpiInput(label, field, val, unit, hint, goodDir) {
    var prev = k['prev_'+field];
    var diff = prev !== undefined ? val - prev : null;
    var trendHtml = '';
    if (diff !== null) {
      var isGood = (goodDir==='down'&&diff<0)||(goodDir==='up'&&diff>0);
      var col = isGood?'#10b981':'#ef4444';
      var sign = diff>0?'+':'';
      trendHtml = '<span style="font-size:11px;font-weight:700;color:'+col+'"> '+(diff>0?'▲':'▼')+' '+sign+Math.round(diff*10)/10+(unit==='%'?'%':'')+' vs prev</span>';
    }
    return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
        +'<div>'
          +'<div style="font-size:12px;font-weight:600;color:var(--text-primary)">'+label+'</div>'
          +(hint?'<div style="font-size:11px;color:var(--text-muted);margin-top:1px">'+hint+'</div>':'')
        +'</div>'
        +'<div style="text-align:right">'+trendHtml+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
        +'<input type="number" value="'+val+'" min="0" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:14px;font-weight:700;color:var(--accent);font-family:var(--font-mono);width:90px" oninput="updateKpiField(\''+field+'\',parseFloat(this.value)||0)"/>'
        +'<span style="font-size:13px;color:var(--text-muted)">'+unit+'</span>'
      +'</div>'
    +'</div>';
  }

  // ── Financial ROI Tab ─────────────────────────────────────────────────────
  function financialTab() {
    var totalAvoidance = (k.breachCostAvoided||0) + (k.finesCostAvoided||0) + (k.downtimeAvoided||0);
    var netRoi = k.totalSecBudget > 0 ? Math.round((totalAvoidance - k.totalSecBudget) / k.totalSecBudget * 100) : 0;
    var roiCol = netRoi>=0?'var(--green)':'var(--red)';
    var perDollar = k.totalSecBudget > 0 ? (totalAvoidance / k.totalSecBudget).toFixed(2) : '0.00';

    function finInput(label, field, val, hint) {
      return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">'
        +'<label style="font-size:12px;font-weight:600;color:var(--text-primary)">'+label+'</label>'
        +(hint?'<div style="font-size:11px;color:var(--text-muted);margin-top:2px;margin-bottom:8px">'+hint+'</div>':'<div style="margin-bottom:8px"></div>')
        +'<div style="display:flex;align-items:center;gap:6px">'
          +'<span style="font-size:14px;color:var(--text-muted)">$</span>'
          +'<input type="number" value="'+val+'" min="0" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;font-weight:700;color:var(--accent);font-family:var(--font-mono);width:160px" oninput="updateKpiField(\''+field+'\',parseFloat(this.value)||0)"/>'
          +'<span style="font-size:12px;color:var(--text-muted)">per year</span>'
        +'</div>'
      +'</div>';
    }

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">'
      +'<div style="display:flex;flex-direction:column;gap:12px">'
        +'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-bottom:6px;border-bottom:1px solid var(--border)">Security Budget & Cost Avoidance</div>'
        +finInput('Annual Security Budget','totalSecBudget',k.totalSecBudget,'Total spend on security tools, people, and programmes')
        +finInput('Breach Costs Avoided','breachCostAvoided',k.breachCostAvoided,'Estimated breach/incident costs prevented by controls (use FAIR ALE as reference)')
        +finInput('Regulatory Fines Avoided','finesCostAvoided',k.finesCostAvoided,'Fines, penalties, or settlements avoided through compliance (e.g. GDPR, HIPAA)')
        +finInput('Downtime Costs Avoided','downtimeAvoided',k.downtimeAvoided,'Business downtime prevented by resilience & continuity controls')

        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">'
          +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px">💡 How to estimate these values</div>'
          +'<div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text-secondary);line-height:1.6">'
            +'<div>• <strong>Breach costs:</strong> Use your FAIR ALE calculator above</div>'
            +'<div>• <strong>Regulatory fines:</strong> GDPR max = 4% global turnover or €20M; HIPAA max = $1.9M per category</div>'
            +'<div>• <strong>Downtime:</strong> Gartner estimates avg downtime costs $5,600/min for enterprise</div>'
            +'<div>• <strong>Reputational:</strong> IBM Cost of a Data Breach (2024) avg = $4.88M globally — verify current year</div>'
          +'</div>'
        +'</div>'
      +'</div>'

      +'<div style="display:flex;flex-direction:column;gap:12px">'
        +'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-bottom:6px;border-bottom:1px solid var(--border)">ROI Summary</div>'

        +'<div style="background:var(--bg-elevated);border:1px solid '+roiCol+'44;border-radius:var(--radius);padding:24px;text-align:center">'
          +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px">Security Programme ROI</div>'
          +'<div style="font-size:52px;font-weight:900;color:'+roiCol+';line-height:1">'+(netRoi>=0?'+':'')+netRoi+'%</div>'
          +'<div style="font-size:13px;color:var(--text-muted);margin-top:8px">$'+perDollar+' returned for every $1 invested</div>'
        +'</div>'

        +[
          ['💰 Total Cost Avoidance', fmt(totalAvoidance), 'var(--green)', 'Sum of all avoided costs'],
          ['📉 Security Budget',      fmt(k.totalSecBudget), 'var(--accent)', 'Annual security spend'],
          ['📈 Net Value Delivered',  fmt(Math.abs(totalAvoidance-k.totalSecBudget)), netRoi>=0?'var(--green)':'var(--red)', netRoi>=0?'Positive return':'Budget exceeds avoided costs'],

            +'</div>';
          }).join('')
        +'</div>'
      +'</div>'
    +'</div>';

      var met = goodDir==='up' ? val>=target : val<=target;
      var col = met ? 'var(--green)' : 'var(--yellow)';
      var pct = unit==='%' ? val : Math.min(100, Math.round(val/target*100));
      return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid '+col+';border-radius:var(--radius);padding:14px 16px">'

            +'<div style="font-size:11px;color:var(--text-muted)">'+desc+'</div>'
          +'</div>'
          +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:'+col+'22;color:'+col+'">'+( met?'✓ On target':'⚠ Below target' )+'</span>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:12px">'
          +'<input type="number" value="'+val+'" min="0" '+(unit==='%'?'max="100"':'')+' style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:14px;font-weight:700;color:'+col+';font-family:var(--font-mono);width:80px" oninput="updateKpiField(\''+field+'\',parseFloat(this.value)||0)"/>'
          +'<div style="flex:1">'
            +'<div style="height:8px;background:var(--bg-surface);border-radius:4px;overflow:hidden">'
              +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:4px"></div>'
            +'</div>'
            +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:3px"><span>Current: '+val+unit+'</span><span>Target: '+target+unit+'</span></div>'
          +'</div>'
        +'</div>'
      +'</div>';
    }
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'

        +'<div style="display:flex;flex-direction:column;gap:10px">'

          +compKpi('Policy Acknowledgement','policyCompliance',k.policyCompliance,95,'%','policyCompliance','up','% staff who acknowledged security policies')

        +'</div>'
      +'</div>'
      +'<div>'
        +'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">Vendor & Third Party</div>'
        +'<div style="display:flex;flex-direction:column;gap:10px">'
          +compKpi('Vendors Assessed','vendorAssessed',k.vendorAssessed,90,'%','vendorAssessed','up','% of active vendors with completed risk assessments')

          +'<div style="display:flex;flex-direction:column;gap:6px">'
            +[
              ['Control Coverage',    k.controlCoverage+'%',  k.controlCoverage>=80],
              ['Training Completion', k.trainingCompletion+'%', k.trainingCompletion>=90],
              ['Policy Sign-off',     k.policyCompliance+'%',  k.policyCompliance>=95],

              ['Open Findings',       k.auditFindings,          k.auditFindings<=5],

                +'<span style="font-size:12px;color:var(--text-secondary)">'+row[0]+'</span>'
                +'<div style="display:flex;align-items:center;gap:8px">'
                  +'<span style="font-size:12px;font-weight:700;color:'+(row[2]?'var(--green)':'var(--yellow)')+'">'+row[1]+'</span>'
                  +'<span style="font-size:14px">'+(row[2]?'✅':'⚠️')+'</span>'
                +'</div>'
              +'</div>';
            }).join('')
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }

  // ── Resilience KPIs Tab ───────────────────────────────────────────────────
  function resilienceTab() {
    var rtoMet = k.rto <= k.rtoTarget;
    var rpoMet = k.rpo <= k.rpoTarget;
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
      +'<div style="display:flex;flex-direction:column;gap:12px">'
        +'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-bottom:6px;border-bottom:1px solid var(--border)">Recovery Objectives</div>'
        +['rto','rpo'].map(function(type){
          var isRto = type==='rto';
          var achieved = isRto ? k.rto : k.rpo;
          var target   = isRto ? k.rtoTarget : k.rpoTarget;
          var met      = achieved <= target;
          var col      = met ? 'var(--green)' : 'var(--red)';
          return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px">'
            +'<div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:12px">'+(isRto?'⏱ Recovery Time Objective (RTO)':'💾 Recovery Point Objective (RPO)')+'</div>'
            +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
              +'<div>'
                +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Achieved</div>'
                +'<input type="number" value="'+achieved+'" min="0" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;font-weight:700;color:'+col+';font-family:var(--font-mono);width:90px" oninput="updateKpiField(\''+type+'\',parseFloat(this.value)||0)"/>'
                +'<span style="font-size:12px;color:var(--text-muted);margin-left:4px">hrs</span>'
              +'</div>'
              +'<div>'
                +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Target</div>'
                +'<input type="number" value="'+target+'" min="0" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;font-weight:700;color:var(--text-primary);font-family:var(--font-mono);width:90px" oninput="updateKpiField(\''+type+'Target\',parseFloat(this.value)||0)"/>'
                +'<span style="font-size:12px;color:var(--text-muted);margin-left:4px">hrs</span>'
              +'</div>'
            +'</div>'
            +'<div style="margin-top:10px;padding:8px 12px;background:'+col+'18;border-radius:6px;font-size:12px;font-weight:600;color:'+col+'">'+( met?'✅ Objective met':'❌ Objective not met — achieved '+achieved+'h vs target '+target+'h' )+'</div>'
          +'</div>';
        }).join('')

        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px">'
          +'<div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:10px">🔄 DR Test Frequency</div>'
          +'<div style="display:flex;align-items:center;gap:10px">'
            +'<input type="number" value="'+k.drTestFreq+'" min="0" max="12" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;font-weight:700;color:var(--accent);font-family:var(--font-mono);width:80px" oninput="updateKpiField(\'drTestFreq\',parseFloat(this.value)||0)"/>'
            +'<span style="font-size:13px;color:var(--text-muted)">tests/year</span>'
            +'<span style="font-size:13px;font-weight:600;color:'+(k.drTestFreq>=2?'var(--green)':'var(--red)')+'">'+(k.drTestFreq>=2?'✅ Meets annual minimum':'⚠ Below recommended minimum (2/yr)')+'</span>'
          +'</div>'
        +'</div>'
      +'</div>'

      +'<div style="display:flex;flex-direction:column;gap:12px">'
        +'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-bottom:6px;border-bottom:1px solid var(--border)">Resilience Intelligence</div>'
        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px">'
          +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px">Industry Benchmarks</div>'
          +'<div style="display:flex;flex-direction:column;gap:6px;font-size:12px">'
            +[
              ['RTO (financial services)',  '< 4 hours',   rtoMet],
              ['RTO (healthcare)',          '< 8 hours',   rtoMet],
              ['RTO (general enterprise)',  '< 24 hours',  rtoMet],
              ['RPO (financial services)',  '< 1 hour',    rpoMet],
              ['DR Test frequency',         '≥ 2×/year',  k.drTestFreq>=2],
              ['NIST 800-34 recommended',  'Test annually', k.drTestFreq>=1],
            ].map(function(row){
              return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">'
                +'<span style="color:var(--text-secondary)">'+row[0]+'</span>'
                +'<span style="font-weight:600;color:'+(row[2]?'var(--green)':'var(--text-muted)')+'">'+row[1]+'</span>'
              +'</div>';
            }).join('')

        +'</div>'

        +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px">'
          +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px">Downtime Cost Calculator</div>'
          +'<div style="font-size:12px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">'
            +'Estimated cost of <strong style="color:var(--text-primary)">1 hour downtime</strong> at industry averages:<br>'
            +'• SME (50–500 staff): <strong style="color:var(--yellow)">$8,000–$74,000</strong><br>'
            +'• Enterprise (500+ staff): <strong style="color:var(--orange)">$74,000–$700,000</strong><br>'
            +'• Financial services: <strong style="color:var(--red)">$5.6M+/hour</strong> (Gartner)'
          +'</div>'
          +'<div style="padding:10px;background:var(--bg-surface);border-radius:6px;font-size:12px;color:var(--text-muted)">'
            +'Your current RTO of <strong style="color:var(--accent)">'+k.rto+'h</strong> × estimated hourly downtime cost = maximum exposure per incident.'
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }

  // ── KPI Dashboard Tab ─────────────────────────────────────────────────────
  function dashboardTab() {
    var fairResult = calcFair(f);
    var kpiCards = [
      { label:'ROSI (FAIR)',      val:fairResult.rosi+'%',    col:fairResult.rosi>=100?'var(--green)':fairResult.rosi>=0?'var(--yellow)':'var(--red)', icon:'⚖️',  desc:'Return on security investment' },
      { label:'ALE (no control)', val:fmt(fairResult.ale),   col:'var(--red)',    icon:'🔥', desc:'Annual loss exposure without controls' },
      { label:'MTTD',             val:k.mttd+'h',            col:k.mttd<=7?'var(--green)':'var(--red)', icon:'🔍', desc:'Mean time to detect threats' },
      { label:'MTTR',             val:k.mttr+'h',            col:k.mttr<=24?'var(--green)':'var(--yellow)', icon:'🚨', desc:'Mean time to respond to incidents' },
      { label:'Patch SLA',        val:k.patchSLA+'%',        col:k.patchSLA>=90?'var(--green)':k.patchSLA>=70?'var(--yellow)':'var(--red)', icon:'🔧', desc:'Critical patch SLA compliance' },
      { label:'Training',         val:k.trainingCompletion+'%', col:k.trainingCompletion>=90?'var(--green)':'var(--yellow)', icon:'🎓', desc:'Security training completion' },
      { label:'Ctrl Coverage',    val:k.controlCoverage+'%', col:k.controlCoverage>=80?'var(--green)':'var(--yellow)', icon:'🛡️', desc:'Risks with linked controls' },
      { label:'RTO',              val:k.rto+'h',             col:k.rto<=k.rtoTarget?'var(--green)':'var(--red)', icon:'⏱',  desc:'Recovery time objective achieved' },
    ];
    var gridHtml = kpiCards.map(function(c){
      return '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">'
        +'<div style="font-size:22px;margin-bottom:6px">'+c.icon+'</div>'
        +'<div style="font-size:24px;font-weight:800;color:'+c.col+'">'+c.val+'</div>'
        +'<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-top:4px">'+c.label+'</div>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+c.desc+'</div>'
      +'</div>';
    }).join('');

    return '<div style="display:flex;flex-direction:column;gap:20px">'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">'+gridHtml+'</div>'
      +'<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px">'
        +'<div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:16px">📣 Board-Ready KPI Summary</div>'
        +'<div style="font-size:12px;color:var(--text-secondary);line-height:2;padding:16px;background:var(--bg-surface);border-radius:8px;font-family:var(--font-mono)">'
          +'Security Programme Performance — '+new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'<br>'
          +'─────────────────────────────────────────────<br>'
          +'ROSI (FAIR Model):          <strong style="color:'+(fairResult.rosi>=0?'var(--green)':'var(--red)')+'">'+fairResult.rosi+'%</strong><br>'
          +'Annual Loss Exposure (ALE): <strong style="color:var(--red)">'+fmt(fairResult.ale)+'</strong> without controls<br>'
          +'ALE with controls:          <strong style="color:var(--green)">'+fmt(fairResult.newAle)+'</strong> (savings: '+fmt(fairResult.savings)+')<br>'
          +'Mean Time to Detect:        <strong>'+k.mttd+'h</strong><br>'
          +'Mean Time to Respond:       <strong>'+k.mttr+'h</strong><br>'
          +'Critical Patch SLA:         <strong>'+k.patchSLA+'%</strong><br>'
          +'Training Completion:        <strong>'+k.trainingCompletion+'%</strong><br>'
          +'Control Coverage:           <strong>'+k.controlCoverage+'%</strong><br>'
          +'Vendor Assessment:          <strong>'+k.vendorAssessed+'%</strong><br>'
          +'Open Audit Findings:        <strong>'+k.auditFindings+'</strong><br>'
          +'RTO Achieved:               <strong>'+k.rto+'h</strong> (target: '+k.rtoTarget+'h)'
        +'</div>'
      +'</div>'
    +'</div>';
  }

  var content = tab==='fair'       ? fairTab()
              : tab==='operational'? operationalTab()
              : tab==='financial'  ? financialTab()
              : tab==='compliance' ? complianceTab()
              : tab==='resilience' ? resilienceTab()
              :                     dashboardTab();

  return '<div class="content-area">'
    +'<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">'
      +'<div>'
        +'<h2>💰 Security KPIs & ROI</h2>'
        +'<p>FAIR risk quantification · Operational KPIs · Financial ROI · Compliance & Resilience metrics</p>'
      +'</div>'
      +'<button class="btn btn-primary" onclick="exportKpiReport()">&#128438; Export Report</button>'
    +'</div>'
    +'<div style="display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap">'
      +tabs.map(function(t){
        var active = tab===t.id;
        return '<button onclick="setKpiTab(\''+t.id+'\')" style="padding:8px 14px;background:none;border:none;border-bottom:2px solid '+(active?'var(--accent)':'transparent')+';color:'+(active?'var(--accent)':'var(--text-muted)')+';font-size:12px;font-weight:'+(active?'700':'500')+';cursor:pointer;transition:color .15s;white-space:nowrap;margin-bottom:-1px">'+t.icon+' '+t.label+'</button>';
      }).join('')
    +'</div>'
    +content
  +'</div>';
}

// POLICY REGISTER VIEW
// =============================================
function renderPolicies() {
  const s = store();
  if (!s.policies || s.policies.length===0) return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div><h2>Policy Register</h2><p>Manage all security and compliance policies</p></div>
      <button class="btn btn-primary" onclick="showModal({type:'add-policy'})">+ New Policy</button>
    </div>
    <div class="empty-state"><div class="empty-icon">📄</div><h3>No policies yet</h3><p>Create your first policy to get started.</p></div>
  </div>`;

  const filterCat = filterStates.policyCat || 'All';
  const filterSt  = filterStates.policySt  || 'All';
  let policies = s.policies;
  if (filterCat !== 'All') policies = policies.filter(p=>p.category===filterCat);
  if (filterSt  !== 'All') policies = policies.filter(p=>p.status===filterSt);

  const cats    = ['All',...[...new Set(s.policies.map(p=>p.category))]];
  const overdue = s.policies.filter(p=>p.reviewDate&&new Date(p.reviewDate)<new Date()&&p.status!=='Archived').length;
  const active  = s.policies.filter(p=>p.status==='Active').length;
  const review  = s.policies.filter(p=>p.status==='Under Review').length;

  function reviewStatus(d) {
    if (!d) return null;
    const days=Math.floor((new Date(d)-new Date())/86400000);
    if (days<0)    return {label:'Review overdue',     col:'var(--red)'};
    if (days<=30)  return {label:'Review in '+days+'d',col:'var(--orange)'};
    if (days<=90)  return {label:'Review in '+days+'d',col:'var(--yellow)'};
    return {label:new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),col:'var(--text-muted)'};
  }

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h2>Policy Register</h2>
        <p>${s.policies.length} policies · ${active} active · ${review} under review · ${overdue>0?`<strong style="color:var(--red)">${overdue} review overdue</strong>`:'all reviews current'}</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-policy'})">+ New Policy</button>
    </div>

    ${overdue>0?`<div style="background:var(--red-dim);border:1px solid rgba(239,68,68,.4);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span>🚨</span><div style="font-size:13px;font-weight:700;color:var(--red)">${overdue} polic${overdue>1?'ies':'y'} require immediate review — check Privacy & Data Protection Policy</div>
    </div>`:''}

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Category</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${cats.map(t=>`<div class="filter-chip ${filterCat===t?'active':''}" onclick="filterStates.policyCat='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Status</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Active','Under Review','Archived'].map(t=>`<div class="filter-chip ${filterSt===t?'active':''}" onclick="filterStates.policySt='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      ${policies.map(p=>{
        const rs=reviewStatus(p.reviewDate);
        const stCol=p.status==='Active'?'var(--green)':p.status==='Under Review'?'var(--yellow)':'var(--text-muted)';
        const stBg =p.status==='Active'?'var(--green-dim)':p.status==='Under Review'?'var(--yellow-dim)':'var(--bg-surface)';
        return `<div class="card" style="padding:16px 20px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
                <span style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted)">${p.id}</span>
                <div style="font-size:14px;font-weight:700;color:var(--text-primary)">${esc(p.name)}</div>
                <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;background:${stBg};color:${stCol}">${p.status}</span>
                <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--bg-surface);color:var(--text-muted)">v${p.version}</span>
              </div>
              <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6">${esc(p.description)}</div>
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px;margin-bottom:10px">
                <div><span style="color:var(--text-muted)">Owner:</span> <strong>${esc(p.owner)}</strong></div>
                <div><span style="color:var(--text-muted)">Approved by:</span> <strong>${p.approvedBy||'Pending'}</strong></div>
                <div><span style="color:var(--text-muted)">Approved:</span> ${p.approvedDate||'—'}</div>
                <div><span style="color:var(--text-muted)">Review:</span> ${rs?`<span style="font-weight:600;color:${rs.col}">${rs.label}</span>`:'—'}</div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                ${p.frameworks.map(fw=>`<span class="badge badge-info">${fw}</span>`).join('')}
                <span style="font-size:11px;color:var(--text-muted)">📂 ${p.fileRef||'—'}</span>
              </div>
            </div>
            <div class="action-row" style="flex-direction:column;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="showModal({type:'edit-policy',id:'${p.id}'})">Edit</button>
              <button class="btn btn-secondary btn-sm" onclick="deleteRecord('policies','${p.id}')">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderTreatmentPlans() {
  const s = store();
  const risks = s.risks.filter(r=>r.treatmentDecision);
  const filterDec = filterStates.treatDec || 'All';
  const filterCat = filterStates.treatCat || 'All';
  let filtered = risks;
  if (filterDec !== 'All') filtered = filtered.filter(r=>r.treatmentDecision===filterDec);
  if (filterCat !== 'All') filtered = filtered.filter(r=>r.category===filterCat);

  const catBadge = c => ({Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[c]||'badge-gray');
  const stBadge  = st => ({Open:'badge-critical','In Mitigation':'badge-warning',Mitigated:'badge-success'}[st]||'badge-gray');
  const treatCols= {Mitigate:['var(--accent)','rgba(79,142,247,0.1)'],Transfer:['var(--green)','var(--green-dim)'],Accept:['var(--yellow)','var(--yellow-dim)'],Avoid:['#8b5cf6','rgba(139,92,246,0.1)']};
  const treatIcon= t => ({Mitigate:'🛡️',Transfer:'🤝',Accept:'✅',Avoid:'🚫'}[t]||'—');

  const byDec = ['Mitigate','Transfer','Accept','Avoid'].map(d=>({d,r:risks.filter(r=>r.treatmentDecision===d),col:(treatCols[d]||['var(--accent)'])[0]}));

  function remDue(due) {
    if (!due) return null;
    const days=Math.floor((new Date(due)-new Date())/86400000);
    if (days<0)   return {label:'Overdue '+Math.abs(days)+'d',col:'var(--red)'};
    if (days<=7)  return {label:'Due in '+days+'d',           col:'var(--orange)'};
    if (days<=30) return {label:'Due in '+days+'d',           col:'var(--yellow)'};
    return {label:new Date(due).toLocaleDateString('en-GB',{day:'numeric',month:'short'}),col:'var(--text-muted)'};
  }

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h2>Risk Treatment Plans</h2>
        <p>${risks.length} risks with treatment decisions · ${risks.filter(r=>r.status==='Open').length} open · ${risks.filter(r=>r.remediationDue&&new Date(r.remediationDue)<new Date()&&r.status!=='Mitigated').length} overdue</p>
      </div>
      <button class="btn btn-secondary" onclick="navigate('risks')">← Back to Register</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      ${byDec.map(({d,r,col})=>`
      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;border-top:3px solid ${col}" onclick="filterStates.treatDec='${filterDec===d?'All':d}';render()">
        <div style="font-size:28px;margin-bottom:6px">${treatIcon(d)}</div>
        <div style="font-size:26px;font-weight:800;color:${col}">${r.length}</div>
        <div style="font-size:12px;font-weight:600;color:${col}">${d}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${r.filter(x=>x.status==='Open').length} open · ${r.filter(x=>x.status==='Mitigated').length} closed</div>
      </div>`).join('')}
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Decision</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Mitigate','Transfer','Accept','Avoid'].map(t=>`<div class="filter-chip ${filterDec===t?'active':''}" onclick="filterStates.treatDec='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Severity</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Critical','High','Medium','Low'].map(t=>`<div class="filter-chip ${filterCat===t?'active':''}" onclick="filterStates.treatCat='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      ${filtered.map(r=>{
        const rem=remDue(r.remediationDue);
        const cols=treatCols[r.treatmentDecision]||['var(--accent)','var(--bg-surface)'];
        const asset=s.assets.find(a=>a.id===r.assetId);
        const ctrls=s.controls.filter(c=>r.controlIds&&r.controlIds.includes(c.frameworkRef));
        return `<div style="background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid ${cols[0]};border-radius:var(--radius);padding:16px 20px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
                <span style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted)">${r.id}</span>
                <span class="badge ${catBadge(r.category)}">${r.category}</span>
                <span class="badge ${stBadge(r.status)}">${r.status}</span>
                <span style="font-size:12px;font-weight:700;color:${cols[0]};background:${cols[1]};padding:2px 10px;border-radius:10px">${treatIcon(r.treatmentDecision)} ${r.treatmentDecision}</span>
              </div>
              <div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:8px">${esc(r.description)}</div>
              ${r.treatmentJustification?`<div style="font-size:12px;color:var(--text-secondary);background:var(--bg-surface);padding:8px 12px;border-radius:6px;margin-bottom:10px;border-left:2px solid ${cols[0]}"><strong>Justification:</strong> ${r.treatmentJustification}</div>`:''}
              ${r.mitigationPlan?`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px"><strong style="color:var(--text-muted)">Treatment Plan:</strong> ${esc(r.mitigationPlan)}</div>`:''}
              <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px">
                <span><span style="color:var(--text-muted)">Owner:</span> <strong>${esc(r.owner)}</strong></span>
                ${asset?`<span><span style="color:var(--text-muted)">Asset:</span> <strong>${asset.name}</strong></span>`:''}
                ${rem?`<span style="font-weight:600;color:${rem.col}">🗓 ${rem.label}</span>`:''}
                ${r.lastReviewDate?`<span><span style="color:var(--text-muted)">Reviewed:</span> ${r.lastReviewDate}</span>`:''}
              </div>
              ${ctrls.length>0?`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">${ctrls.map(c=>`<span class="badge badge-info">🔒 ${esc(c.name)}</span>`).join('')}</div>`:''}
            </div>
            <div style="text-align:center;padding:10px 16px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border);min-width:64px">
              <div style="font-size:24px;font-weight:800;color:var(--accent)">${r.score}</div>
              <div style="font-size:10px;color:var(--text-muted)">Score</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderAssessmentsHub() {
  const assessDefs = [
    {id:'nist',     label:'NIST CSF',    icon:'🛡️', color:'var(--green)',  key:'grcNistAssessment_v1',     total:98},
    {id:'iso27001', label:'ISO 27001',   icon:'🔐', color:'var(--accent)', key:'grcAssessment_v1_iso27001', total:93},
    {id:'soc2',     label:'SOC 2',       icon:'☁️',  color:'#8b5cf6',       key:'grcAssessment_v1_soc2',     total:47},
    {id:'gdpr',     label:'GDPR',        icon:'🇪🇺', color:'var(--yellow)', key:'grcAssessment_v1_gdpr',     total:23},
    {id:'cis',      label:'CIS Controls',icon:'🔬', color:'var(--orange)', key:'grcAssessment_v1_cis',      total:18},
    {id:'hipaa',    label:'HIPAA',       icon:'🏥', color:'#ec4899',       key:'grcAssessment_v1_hipaa',    total:39},
  ];

  const scores = assessDefs.map(def=>{
    try {
      const d = JSON.parse(localStorage.getItem(def.key)||'{}');
      const responses = d.responses || {};
      const vals = Object.values(responses).filter(r=>r&&r.status);
      const passed = vals.filter(r=>r.status==='Pass').length;
      const answered = vals.length;
      const score = answered > 0 ? Math.round(passed/answered*100) : null;
      return {...def, score, passed, answered, total: def.total};
    } catch(e) { return {...def, score:null, passed:0, answered:0}; }
  });

  const withScores = scores.filter(s=>s.score!==null);
  const composite  = withScores.length > 0 ? Math.round(withScores.reduce((a,s)=>a+s.score,0)/withScores.length) : null;
  const matLabel   = composite===null?'No assessments run':composite>=80?'Advanced':composite>=60?'Managed':composite>=40?'Defined':'Initial';
  const matCol     = composite===null?'var(--text-muted)':composite>=80?'var(--green)':composite>=60?'var(--accent)':composite>=40?'var(--yellow)':'var(--red)';

  return `<div class="content-area">
    <div class="page-header">
      <div><h2>Assessments</h2><p>Compliance assessments across all frameworks · ${withScores.length} of ${assessDefs.length} completed</p></div>
    </div>

    ${composite!==null?`
    <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:24px">
      <div style="text-align:center;min-width:100px">
        <div style="font-size:48px;font-weight:900;color:${matCol};font-family:var(--font-mono)">${composite}%</div>
        <div style="font-size:12px;font-weight:700;color:${matCol}">${matLabel}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Composite maturity</div>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Overall Compliance Maturity</div>
        <div class="progress-bar" style="height:12px;margin-bottom:16px"><div class="progress-fill" style="width:${composite}%;background:${matCol}"></div></div>
        <div style="display:flex;gap:24px;font-size:12px;color:var(--text-muted)">
          <span>🟢 Advanced: ≥80%</span><span>🟡 Managed: 60–79%</span><span>🟠 Defined: 40–59%</span><span>🔴 Initial: &lt;40%</span>
        </div>
      </div>
    </div>`:''}

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      ${scores.map(s=>`
      <div class="card" style="cursor:pointer;border-top:3px solid ${s.color}" onclick="navigate('${s.id}')">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="font-size:28px">${s.icon}</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${s.label}</div>
            <div style="font-size:11px;color:var(--text-muted)">${s.total} controls</div>
          </div>
        </div>
        ${s.score!==null?`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
            <span style="color:var(--text-muted)">${s.answered} answered · ${s.passed} passed</span>
            <span style="font-weight:700;color:${s.color}">${s.score}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${s.score}%;background:${s.color}"></div></div>
        </div>
        <div style="font-size:12px;font-weight:600;color:${s.color}">${s.score>=80?'Advanced':s.score>=60?'Managed':s.score>=40?'Defined':'Initial'}</div>`
        :`<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Not started</div>`}
        <div style="margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();navigate('${s.id}')">
            ${s.score!==null?'Continue Assessment':'Start Assessment'}
          </button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderReports() {
  const s = store();
  const now = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  const reports = [
    {
      id:'executive',icon:'📊',title:'Executive Summary',desc:'High-level GRC health score, top risks, ROSI, and compliance maturity for board-level presentation.',color:'var(--accent)',
      action: () => {
        const criticalRisks = s.risks.filter(r=>r.category==='Critical').length;
        const openRisks     = s.risks.filter(r=>r.status==='Open').length;
        const implCtrl      = s.controls.filter(c=>c.status==='Implemented').length;
        const ctrlEff       = s.controls.length>0?Math.round(implCtrl/s.controls.length*100):0;
        const riskScore     = Math.max(0,100-(criticalRisks*20));
        const health        = Math.round((ctrlEff+riskScore)/2);
        const overdueRisks  = s.risks.filter(r=>r.remediationDue&&new Date(r.remediationDue)<new Date()&&r.status!=='Mitigated').length;
        const highRiskV     = s.vendors.filter(v=>v.riskRating==='High').length;
        const polOverdue    = s.policies?s.policies.filter(p=>p.reviewDate&&new Date(p.reviewDate)<new Date()).length:0;
        openReport(execReportHTML(s,health,ctrlEff,criticalRisks,openRisks,overdueRisks,highRiskV,polOverdue,now));
      }
    },
    {
      id:'riskregister',icon:'⚠️',title:'Risk Register Report',desc:'Full risk register with scores, treatment decisions, remediation dates, and aging analysis.',color:'var(--red)',
      action: () => openReport(riskRegisterReportHTML(s,now))

      id:'controls',icon:'🔒',title:'Control Effectiveness Report',desc:'Controls inventory with effectiveness ratings, test dates, and review schedule.',color:'var(--green)',

    {

      action: () => { navigate('kpiroi'); setTimeout(()=>{ if(typeof _doExportKpiReport==='function') _doExportKpiReport(); },300); }
    },
    {
      id:'policy',icon:'📄',title:'Policy Status Report',desc:'Complete policy register with version numbers, owners, review schedules, and framework mapping.',color:'#8b5cf6',
      action: () => openReport(policyReportHTML(s,now))
    },
    {
      id:'audit',icon:'🧰',title:'Compliance Audit Report',desc:'Audit-ready documentation — controls in scope, evidence collected, readiness rating, findings, and recommendations.',color:'#0891b2',

  return `<div class="content-area">

    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px">
      ${reports.map(r=>`
      <div class="card" style="border-top:3px solid ${r.color}">
        <div style="font-size:32px;margin-bottom:12px">${r.icon}</div>
        <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:8px">${r.title}</div>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:16px;min-height:48px">${r.desc}</div>
        <button class="btn btn-primary btn-sm" onclick="requireOwnerOrModified(${r.action.toString()})">📥 Generate Report</button>

// ── Simple tabular report builders ───────────────────────────────────────────
function reportShell(title, subtitle, date, body) {

  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;color:#0f172a;font-size:13px}
    .shell{max-width:1100px;margin:0 auto;padding:40px}
    .cover{border-bottom:3px solid #3b82f6;padding-bottom:28px;margin-bottom:32px}
    h1{font-size:28px;font-weight:800;color:#0f172a;margin-bottom:6px}
    h2{font-size:16px;font-weight:700;color:#1e40af;margin:28px 0 12px;border-bottom:1px solid #e2e8f0;padding-bottom:6px}
    h3{font-size:13px;font-weight:700;color:#334155;margin:16px 0 6px}

    td{padding:8px 12px;border-bottom:1px solid #e2e8f0;vertical-align:top}

    .b-red{background:#fee2e2;color:#dc2626}.b-orange{background:#ffedd5;color:#ea580c}
    .b-yellow{background:#fef9c3;color:#ca8a04}.b-green{background:#dcfce7;color:#16a34a}
    .b-blue{background:#dbeafe;color:#1d4ed8}.b-gray{background:#f1f5f9;color:#475569}
    .stat{display:inline-block;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 20px;margin:0 8px 8px 0;text-align:center}
    .stat-val{font-size:28px;font-weight:800;color:#1e40af}.stat-lbl{font-size:11px;color:#64748b;margin-top:2px}
    .footer{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between}

  </style></head><body>
  <div class="shell">

      <h1>${title}</h1>
      <p style="color:#64748b">${subtitle} · ${date}</p>
    </div>
    ${body}
    <div class="footer"><span>Chris Olowo GRC Platform · ${title}</span><span>${date}</span></div>
    <div style="margin-top:16px;text-align:right"><button onclick="window.print()" style="padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600">🖨 Print / Save PDF</button></div>
  </div></body></html>`;
}

function catBadge(c) { return {Critical:'b-red',High:'b-orange',Medium:'b-yellow',Low:'b-green'}[c]||'b-gray'; }
function sevBadge(sv) { return {Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[sv]||'badge-gray'; }
function reportStBadge(st) { return {Implemented:'b-green','In Progress':'b-yellow',Planned:'b-gray',Active:'b-green',Archived:'b-gray',Compliant:'b-green','Under Review':'b-yellow','Remediation Required':'b-red','Non-Compliant':'b-red'}[st]||'b-gray'; }
function effBadge(e) { return {High:'b-green',Medium:'b-yellow',Low:'b-red',Untested:'b-gray'}[e]||'b-gray'; }
function scoreClass(sc) { if(sc>=17)return 'score-25'; if(sc>=10)return 'score-16'; if(sc>=5)return 'score-9'; return 'score-4'; }

  return reportShell('Executive GRC Summary', 'Management Briefing', date,
    `<div style="margin-bottom:24px">
      ${[['GRC Health',health+'%'],['Open Risks',openRisks],['Critical Risks',criticalRisks],['Active Incidents',openInc],['Control Impl.',ctrlEff+'%'],['Overdue Remediations',overdueRisks],['High-Risk Vendors',highRiskV],['Policies Overdue',polOverdue]].map(([l,v])=>`<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
    </div>
    <h2>Top Risks by Score</h2>
    <table><thead><tr><th>ID</th><th>Risk</th><th>Severity</th><th>Score</th><th>Status</th><th>Treatment</th><th>Remediation Due</th></tr></thead><tbody>
      ${[...s.risks].sort((a,b)=>b.score-a.score).slice(0,10).map(r=>`<tr>
        <td>${r.id}</td><td>${esc(r.description)}</td>
        <td><span class="badge ${catBadge(r.category)}">${r.category}</span></td>
        <td style="font-weight:800;text-align:center">${r.score}</td>
        <td>${r.status}</td><td>${r.treatmentDecision||'—'}</td>
        <td>${r.remediationDue?new Date(r.remediationDue).toLocaleDateString('en-GB'):'—'}</td>
      </tr>`).join('')}
    </tbody></table>
    <h2>Incident Summary</h2>
    <table><thead><tr><th>ID</th><th>Title</th><th>Severity</th><th>Status</th><th>Date</th></tr></thead><tbody>
      ${s.incidents.map(i=>`<tr><td>${i.id}</td><td>${i.title}</td><td><span class="badge ${catBadge(i.severity)}">${i.severity}</span></td><td>${i.status}</td><td>${i.date}</td></tr>`).join('')}
    </tbody></table>`
  );
}

      ${[...s.risks].sort((a,b)=>b.score-a.score).map(r=>{
        const age=Math.floor((new Date()-new Date(r.createdAt||'2026-01-01'))/86400000);
        return `<tr>
          <td style="font-family:monospace">${r.id}</td><td>${esc(r.description)}</td><td>${esc(r.owner)}</td>
