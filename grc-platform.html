      <div class="card">
        <div class="card-header"><div class="card-title">✅ Task Checklist</div></div>
        <div style="display:flex;flex-direction:column;gap:0;max-height:260px;overflow-y:auto">
          ${steps.map((st, i) => {
            const isDone = done.indexOf(i) !== -1;
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle,rgba(255,255,255,.04))">
              <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:${isDone?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700">${isDone?'✓':''}</div>
              <span style="font-size:12px;color:${isDone?'var(--text-primary)':'var(--text-muted)'}">${st.label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function renderDashboard() {
  // ── PROJECT MODE: show project-scoped dashboard ──────────────
  if (activeProjectId) return renderProjectDashboard(activeProjectId);

  const s = store();
  const criticalRisks = s.risks.filter(r=>r.category==='Critical').length;
  const highRisks     = s.risks.filter(r=>r.category==='High').length;
  const openRisks     = s.risks.filter(r=>r.status==='Open').length;
  const implCtrl      = s.controls.filter(c=>c.status==='Implemented').length;
  const ctrlEff       = s.controls.length > 0 ? Math.round(implCtrl/s.controls.length*100) : 0;
  const highEff       = s.controls.filter(c=>c.effectiveness==='High').length;
  const riskScore_calc= Math.max(0, 100-(criticalRisks*20)-(highRisks*10));
  const health        = Math.round((ctrlEff + riskScore_calc)/2);
  const openInc       = (s.incidents||[]).filter(i=>i.status!=='Resolved'&&i.status!=='Mitigated').length;
  const overdueRisks  = s.risks.filter(r=>r.remediationDue&&new Date(r.remediationDue)<new Date()&&r.status!=='Mitigated').length;
  const highRiskVendors = (s.vendors||[]).filter(v=>v.riskRating==='High').length;
  const policyOverdue   = (s.policies||[]).filter(p=>p.reviewDate&&new Date(p.reviewDate)<new Date()&&p.status!=='Archived').length;

  // Assessment composite maturity score
  const assessIds = ['nist','iso27001','soc2','gdpr','cis','hipaa'];
  let assessScores = [];
  assessIds.forEach(id => {
    try {
      const d = JSON.parse(localStorage.getItem('grcAssessment_v1_'+id)||'{}');
      if (d.responses) {
        const vals = Object.values(d.responses).filter(r=>r&&r.status);
        if (vals.length>0) {
          const score = Math.round(vals.filter(r=>r.status==='Pass').length/vals.length*100);
          assessScores.push(score);
        }
      }
    } catch(e){}
  });
  try {
    const nd = JSON.parse(localStorage.getItem('grcNistAssessment_v1')||'{}');
    if (nd.responses) {
      const vals = Object.values(nd.responses).filter(r=>r&&r.status);
      if (vals.length>0) assessScores.push(Math.round(vals.filter(r=>r.status==='Pass').length/vals.length*100));
    }
  } catch(e){}
  const maturityScore = assessScores.length > 0 ? Math.round(assessScores.reduce((a,b)=>a+b,0)/assessScores.length) : null;
  const maturityLabel = maturityScore===null?'No data':maturityScore>=80?'Advanced':maturityScore>=60?'Managed':maturityScore>=40?'Defined':'Initial';
  const maturityCol   = maturityScore===null?'var(--text-muted)':maturityScore>=80?'var(--green)':maturityScore>=60?'var(--accent)':maturityScore>=40?'var(--yellow)':'var(--red)';

  // KPI data
  let kpiMttd='—', kpiRosi='—', kpiMttdCol='var(--text-muted)', kpiRosiCol='var(--text-muted)';
  try {
    const kd = JSON.parse(localStorage.getItem('grcKpiRoi_v1')||'{}');
    if (kd.kpis) { kpiMttd=kd.kpis.mttd+'h'; kpiMttdCol=kd.kpis.mttd<=4?'var(--green)':kd.kpis.mttd<=7?'var(--yellow)':'var(--red)'; }
    if (kd.fair) {
      const fc=calcFair(kd.fair);
      kpiRosi=fc.rosi+'%'; kpiRosiCol=fc.rosi>=100?'var(--green)':fc.rosi>=0?'var(--yellow)':'var(--red)';
    }
  } catch(e){}

  const topRisks  = [...s.risks].sort((a,b)=>b.score-a.score).slice(0,5);
  const recentInc = [...s.incidents].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
  setTimeout(() => {
    const ctx = document.getElementById('health-chart');
    if (ctx && !chartInstances['health']) {
      chartInstances['health'] = new Chart(ctx, {
        type:'doughnut',
        data:{datasets:[{data:[health,100-health],backgroundColor:['#4f8ef7','rgba(99,120,180,0.15)'],borderWidth:0,circumference:270,rotation:225}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},cutout:'80%',plugins:{legend:{display:false},tooltip:{enabled:false}}}
      });
    }
    const rc = document.getElementById('risk-cat-chart');
    if (rc && !chartInstances['risk-cat']) {
      const cats=['Low','Medium','High','Critical'];
      chartInstances['risk-cat'] = new Chart(rc, {
        type:'bar',
        data:{labels:cats,datasets:[{data:cats.map(c=>s.risks.filter(r=>r.category===c).length),backgroundColor:['#2ecc8a','#f5d020','#f5a623','#f05252'],borderRadius:6,borderSkipped:false,maxBarThickness:48}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}},scales:{x:{grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5'}},y:{beginAtZero:true,grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5',stepSize:1,precision:0}}}}
      });
    }
    const csp = document.getElementById('ctrl-chart');
    if (csp && !chartInstances['ctrl']) {
      const statuses=['Implemented','In Progress','Planned'];
      chartInstances['ctrl'] = new Chart(csp, {
        type:'doughnut',
        data:{labels:statuses,datasets:[{data:statuses.map(st=>s.controls.filter(c=>c.status===st).length),backgroundColor:['#2ecc8a','#4f8ef7','#8b98b5'],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{position:'bottom',labels:{color:'#8b98b5',font:{size:11},padding:12}},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}},cutout:'65%'}
      });
    }
  }, 50);

  return `
    <div class="content-area" id="dashboard">

      <!-- Alert banner -->
      ${(overdueRisks>0||policyOverdue>0||highRiskVendors>0) ? `
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        ${overdueRisks>0?`<div style="flex:1;min-width:200px;background:var(--red-dim);border:1px solid rgba(239,68,68,.4);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="navigate('risks')"><span>🚨</span><span style="font-size:12px;font-weight:700;color:var(--red)">${overdueRisks} overdue risk remediation${overdueRisks>1?'s':''}</span></div>`:''}
        ${policyOverdue>0?`<div style="flex:1;min-width:200px;background:var(--yellow-dim);border:1px solid rgba(245,158,11,.4);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="navigate('policies')"><span>📄</span><span style="font-size:12px;font-weight:700;color:var(--yellow)">${policyOverdue} polic${policyOverdue>1?'ies':'y'} overdue for review</span></div>`:''}
        ${highRiskVendors>0?`<div style="flex:1;min-width:200px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="navigate('vendors')"><span>🏢</span><span style="font-size:12px;font-weight:600;color:var(--orange)">${highRiskVendors} high-risk vendor${highRiskVendors>1?'s':''} require attention</span></div>`:''}
      </div>` : ''}

      <!-- Top KPI strip -->
      <div class="grid grid-5" style="margin-bottom:20px">
        <div class="metric-card" onclick="navigate('assets')" style="cursor:pointer">
          <div class="metric-top"><div class="metric-icon blue">🖥️</div><span class="metric-trend flat">Stable</span></div>
          <div class="metric-value">${s.assets.length}</div><div class="metric-label">Total Assets</div>
        </div>
        <div class="metric-card" onclick="navigate('risks')" style="cursor:pointer">
          <div class="metric-top"><div class="metric-icon red">⚠️</div><span class="metric-trend up">+${criticalRisks} critical</span></div>
          <div class="metric-value">${s.risks.length}</div><div class="metric-label">Active Risks</div>
        </div>
        <div class="metric-card" onclick="navigate('controls')" style="cursor:pointer">
          <div class="metric-top"><div class="metric-icon green">🔒</div><span class="metric-trend down">${ctrlEff}% impl.</span></div>
          <div class="metric-value">${s.controls.length}</div><div class="metric-label">Controls</div>
        </div>
        <div class="metric-card" onclick="navigate('incidents')" style="cursor:pointer">
          <div class="metric-top"><div class="metric-icon orange">🚨</div><span class="metric-trend ${openInc>0?'up':'flat'}">${openInc} open</span></div>
          <div class="metric-value">${s.incidents.length}</div><div class="metric-label">Incidents</div>
        </div>
        <div class="metric-card" onclick="navigate('vendors')" style="cursor:pointer">
          <div class="metric-top"><div class="metric-icon purple">🏢</div><span class="metric-trend flat">${highRiskVendors} high risk</span></div>
          <div class="metric-value">${s.vendors.length}</div><div class="metric-label">Vendors</div>
        </div>
      </div>

      <!-- Intelligence strip -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer" onclick="navigate('kpiroi')">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">ROSI (FAIR)</div>
          <div style="font-size:28px;font-weight:800;color:${kpiRosiCol};font-family:var(--font-mono)">${kpiRosi}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Return on security invest.</div>
        </div>
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer" onclick="navigate('kpiroi')">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">MTTD</div>
          <div style="font-size:28px;font-weight:800;color:${kpiMttdCol};font-family:var(--font-mono)">${kpiMttd}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Mean time to detect</div>
        </div>
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer" onclick="navigate('nist')">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">Maturity Score</div>
          <div style="font-size:28px;font-weight:800;color:${maturityCol};font-family:var(--font-mono)">${maturityScore!==null?maturityScore+'%':'—'}</div>
          <div style="font-size:11px;color:${maturityCol};margin-top:4px">${maturityLabel} · ${assessScores.length} assessment${assessScores.length!==1?'s':''}</div>
        </div>
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer" onclick="navigate('controls')">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">Control Effectiveness</div>
          <div style="font-size:28px;font-weight:800;color:${highEff>=7?'var(--green)':'var(--yellow)'};font-family:var(--font-mono)">${highEff}/${s.controls.length}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">High-effectiveness controls</div>
        </div>
      </div>

      <!-- Main bento grid -->
      <div class="dashboard-bento">
        <!-- Health score -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">❤️ GRC Health Score</div>
            <span class="badge ${health>=80?'badge-success':health>=50?'badge-warning':'badge-critical'}">${health>=80?'Healthy':health>=50?'Fair':'Needs Attention'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:20px">
            <div class="health-ring">
              <canvas id="health-chart" width="110" height="110"></canvas>
              <div class="health-ring-label"><span class="score">${health}</span><span class="score-label">Score</span></div>
            </div>
            <div style="flex:1">
              <div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px"><span>Control Implementation</span><span>${ctrlEff}%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${ctrlEff}%;background:var(--green)"></div></div>
              </div>
              <div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px"><span>Risk Score</span><span>${riskScore_calc}</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${riskScore_calc}%;background:var(--accent)"></div></div>
              </div>
              ${maturityScore!==null?`<div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px"><span>Compliance Maturity</span><span>${maturityScore}%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${maturityScore}%;background:${maturityCol}"></div></div>
              </div>`:''}
              <div style="font-size:11px;color:var(--text-muted)">${openRisks} open risks · ${criticalRisks} critical · ${overdueRisks>0?`<strong style="color:var(--red)">${overdueRisks} overdue</strong>`:'none overdue'}</div>
            </div>
          </div>
        </div>

        <!-- Risk distribution -->
        <div class="card">
          <div class="card-header"><div class="card-title">📊 Risk Distribution</div></div>
          <div style="position:relative;height:160px;width:100%;overflow:hidden"><canvas id="risk-cat-chart"></canvas></div>
        </div>

        <!-- Control status -->
        <div class="card">
          <div class="card-header"><div class="card-title">🔒 Control Status</div></div>
          <div style="position:relative;height:160px;width:100%;overflow:hidden"><canvas id="ctrl-chart"></canvas></div>
        </div>

        <!-- Top risks with remediation -->
        <div class="card bento-wide">
          <div class="card-header">
            <div class="card-title">🔥 Top Risks by Score</div>
            <button class="btn btn-secondary btn-sm" onclick="navigate('risks')">View All →</button>
          </div>
          ${topRisks.map(r => {
            const asset = s.assets.find(a=>a.id===r.assetId);
            const due   = r.remediationDue ? (() => {
              const days=Math.floor((new Date(r.remediationDue)-new Date())/86400000);
              return days<0?`<span style="font-size:10px;color:var(--red);font-weight:700">OVERDUE ${Math.abs(days)}d</span>`:days<=7?`<span style="font-size:10px;color:var(--orange);font-weight:700">Due in ${days}d</span>`:`<span style="font-size:10px;color:var(--text-muted)">Due ${new Date(r.remediationDue).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`;
            })() : '';
            const treat = r.treatmentDecision ? `<span style="font-size:10px;color:var(--text-muted);margin-left:4px">${{Mitigate:'🛡️',Transfer:'🤝',Accept:'✅',Avoid:'🚫'}[r.treatmentDecision]||''} ${r.treatmentDecision}</span>` : '';
            return `<div class="risk-row-item">
              <span class="severity-dot dot-${r.category.toLowerCase()}"></span>
              <span class="risk-name">${esc(r.description)}</span>
              ${asset?`<span style="font-size:11px;color:var(--text-muted);margin-right:6px">${asset.name}</span>`:''}
              ${treat}${due?`<span style="margin-left:8px">${due}</span>`:''}
              <span class="score-pill ${scoreClass(r.score)}">${r.score}</span>
            </div>`;
          }).join('')}
        </div>

        <!-- Recent incidents -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">🚨 Recent Incidents</div>
            <button class="btn btn-secondary btn-sm" onclick="navigate('incidents')">View All →</button>
          </div>
          ${recentInc.map(i => `
            <div class="risk-row-item">
              <span class="severity-dot dot-${i.severity.toLowerCase()}"></span>
              <div style="flex:1"><div style="font-size:13px;color:var(--text-primary)">${i.title}</div><div style="font-size:11px;color:var(--text-muted)">${i.date}</div></div>
              <span class="badge ${sevBadge(i.severity)}">${i.severity}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function renderAssets() {
  const s = store();
  let assets = s.assets;
  const filter     = filterStates.assets        || 'All';
  const filterCrit = filterStates.assetCrit     || 'All';
  const filterClass= filterStates.assetClass    || 'All';
  const filterStatus=filterStates.assetStatus   || 'All';

  const types         = ['All', 'Application', 'Infrastructure', 'Data Repository', 'Vendor'];
  const criticalities = ['All', 'Critical', 'High', 'Medium', 'Low'];
  const classifications = ['All', 'Critical', 'Confidential', 'Restricted', 'Internal', 'Public'];
  const statuses      = ['All', 'Active', 'Decommissioning', 'Inactive'];

  if (filter      !== 'All') assets = assets.filter(a => a.type           === filter);
  if (filterCrit  !== 'All') assets = assets.filter(a => a.criticality    === filterCrit);
  if (filterClass !== 'All') assets = assets.filter(a => a.classification === filterClass);
  if (filterStatus!== 'All') assets = assets.filter(a => a.status         === filterStatus);

  const classColor = c => ({Critical:'badge-critical',Confidential:'badge-high',Restricted:'badge-warning',Internal:'badge-info',Public:'badge-success'}[c]||'badge-gray');
  const critColor  = c => ({Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[c]||'badge-gray');

  const activeFilters = [filter,filterCrit,filterClass,filterStatus].filter(f=>f!=='All').length;

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">

        <p>${assets.length} of ${s.assets.length} assets · ${s.assets.filter(a=>a.status==='Active').length} active</p>

      <div style="display:flex;gap:8px;align-items:center">
        ${activeFilters > 0 ? `<button class="btn btn-secondary btn-sm" onclick="filterStates.assets='All';filterStates.assetCrit='All';filterStates.assetClass='All';filterStates.assetStatus='All';render()">✕ Clear filters</button>` : ''}

        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${types.map(t=>`<div class="filter-chip ${filter===t?'active':''}" onclick="filterStates.assets='${t}';render()">${t}</div>`).join('')}

        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${criticalities.map(t=>{
            const color = t==='Critical'?'var(--red)':t==='High'?'var(--orange)':t==='Medium'?'var(--yellow)':t==='Low'?'var(--green)':'';
            const style = filterCrit===t && t!=='All' ? `background:${color}22;border-color:${color};color:${color}` : '';
            return `<div class="filter-chip ${filterCrit===t?'active':''}" style="${style}" onclick="filterStates.assetCrit='${t}';render()">${t}</div>`;

      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">

        </div>

      <div class="table-wrap">

          <tbody>

            assets.map(a => `<tr>
              <td class="td-mono">${a.id}</td>

              <td>${esc(a.owner)}</td>

              <td><span class="badge ${critColor(a.criticality)}">${a.criticality||'—'}</span></td>
              <td><span class="badge ${a.status==='Active'?'badge-success':a.status==='Decommissioning'?'badge-warning':'badge-gray'}">${a.status}</span></td>
              <td><div class="action-row">
                <button class="btn btn-secondary btn-xs" onclick="showModal({type:'edit-asset',id:'${a.id}'})">Edit</button>
                <button class="btn btn-secondary btn-xs" onclick="deleteRecord('assets','${a.id}')">✕</button>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}


// =============================================
// RISK TRENDS — Snapshot Engine
// =============================================
const RISK_TRENDS_KEY = 'grcRiskTrends_v1';

function getRiskTrends() {
  try { var r = localStorage.getItem(RISK_TRENDS_KEY); return r ? JSON.parse(r) : { snapshots: [] }; }
  catch(e) { return { snapshots: [] }; }
}
function saveRiskTrends(d) { localStorage.setItem(RISK_TRENDS_KEY, JSON.stringify(d)); }

// Take a snapshot of current risk posture — called after every saveStore, deduplicated by date
function takeRiskSnapshot() {
  try {
    var s = store();
    var today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    var d = getRiskTrends();
    // Remove any existing snapshot for today (keep latest)
    d.snapshots = d.snapshots.filter(function(sn){ return sn.date !== today; });
    // Build snapshot
    var risks = s.risks || [];
    var snap = {
      date: today,
      total: risks.length,
      open: risks.filter(function(r){ return r.status === 'Open'; }).length,
      inMitigation: risks.filter(function(r){ return r.status === 'In Mitigation'; }).length,
      mitigated: risks.filter(function(r){ return r.status === 'Mitigated' || r.status === 'Closed'; }).length,
      critical: risks.filter(function(r){ return r.category === 'Critical'; }).length,
      high: risks.filter(function(r){ return r.category === 'High'; }).length,
      medium: risks.filter(function(r){ return r.category === 'Medium'; }).length,
      low: risks.filter(function(r){ return r.category === 'Low'; }).length,
      avgScore: risks.length ? Math.round(risks.reduce(function(a,r){ return a + (r.score||0); }, 0) / risks.length * 10) / 10 : 0,
      maxScore: risks.length ? Math.max.apply(null, risks.map(function(r){ return r.score||0; })) : 0,
      // Risk exposure index: weighted sum (critical×4 + high×3 + med×2 + low×1) / max possible
      exposureIdx: risks.length ? Math.round((
        risks.filter(function(r){ return r.category==='Critical'; }).length * 4 +
        risks.filter(function(r){ return r.category==='High'; }).length * 3 +
        risks.filter(function(r){ return r.category==='Medium'; }).length * 2 +
        risks.filter(function(r){ return r.category==='Low'; }).length * 1
      ) / (risks.length * 4) * 100) : 0,
      controlCoverage: (function(){
        var withControls = risks.filter(function(r){ return r.controlIds && r.controlIds.length > 0; }).length;
        return risks.length ? Math.round(withControls / risks.length * 100) : 0;
      })()
    };
    d.snapshots.push(snap);
    // Keep max 730 snapshots (2 years)
    if (d.snapshots.length > 730) d.snapshots = d.snapshots.slice(-730);
    d.snapshots.sort(function(a, b){ return a.date.localeCompare(b.date); });
    saveRiskTrends(d);
  } catch(e) { /* silent — never break save */ }
}

// ── Utility: filter snapshots by period ──────────────────────────────────────
function filterSnapsByPeriod(snapshots, period) {
  var now = new Date();
  var cutoff = new Date(now);
  if      (period === '1M')  cutoff.setMonth(cutoff.getMonth() - 1);
  else if (period === '3M')  cutoff.setMonth(cutoff.getMonth() - 3);
  else if (period === '6M')  cutoff.setMonth(cutoff.getMonth() - 6);
  else if (period === '1Y')  cutoff.setFullYear(cutoff.getFullYear() - 1);
  else if (period === '2Y')  cutoff.setFullYear(cutoff.getFullYear() - 2);
  else return snapshots; // All
  var cutStr = cutoff.toISOString().slice(0,10);
  return snapshots.filter(function(s){ return s.date >= cutStr; });
}

// ── Minimal SVG line chart builder ───────────────────────────────────────────
function buildSparkLine(data, width, height, color, fillColor, label) {
  if (!data || data.length < 2) return '<div style="height:'+height+'px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px">Not enough data</div>';
  var min = Math.min.apply(null, data), max = Math.max.apply(null, data);
  var range = max - min || 1;
  var pad = 8;
  var w = width - pad*2, h = height - pad*2;
  var pts = data.map(function(v, i) {
    var x = pad + (i / (data.length - 1)) * w;
    var y = pad + (1 - (v - min) / range) * h;
    return [x.toFixed(1), y.toFixed(1)];
  });
  var polyline = pts.map(function(p){ return p.join(','); }).join(' ');
  var fillPath = 'M'+pts[0][0]+','+pts[0][1]+' '+pts.map(function(p){return 'L'+p[0]+','+p[1];}).join(' ')
    +' L'+pts[pts.length-1][0]+','+(pad+h)+' L'+pts[0][0]+','+(pad+h)+' Z';
  // Y axis labels
  var yLabels = '';
  [0, 0.5, 1].forEach(function(frac) {
    var val = Math.round(min + frac * range * 10) / 10;
    var y = pad + (1-frac)*h;
    yLabels += '<text x="'+(pad-2)+'" y="'+y.toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#64748b">'+val+'</text>';
  });
  return '<svg viewBox="0 0 '+width+' '+height+'" width="100%" height="'+height+'" preserveAspectRatio="none">'
    +'<defs><linearGradient id="fill_'+label.replace(/\s/g,'_')+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0.03"/></linearGradient></defs>'
    +'<path d="'+fillPath+'" fill="url(#fill_'+label.replace(/\s/g,'_')+')" />'
    +'<polyline points="'+polyline+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+pts[pts.length-1][0]+'" cy="'+pts[pts.length-1][1]+'" r="3.5" fill="'+color+'" />'
    +yLabels
    +'</svg>';
}

// ── Multi-series line chart ───────────────────────────────────────────────────
function buildMultiLine(dates, series, width, height) {
  // series: [{label, color, data:[]}]
  if (!dates || dates.length < 2) return '<div style="height:'+height+'px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px">Not enough data yet — add more data over time</div>';
  var allVals = series.reduce(function(acc, s){ return acc.concat(s.data); }, []);
  var min=0, max=Math.max.apply(null, allVals)||1;
  var padL=32, padR=12, padT=12, padB=28;
  var w=width-padL-padR, h=height-padT-padB;

  function xOf(i){ return (padL + (i/(dates.length-1))*w).toFixed(1); }
  function yOf(v){ return (padT + (1-(v-min)/(max-min))*h).toFixed(1); }

  // Grid lines
  var grid='';
  [0,0.25,0.5,0.75,1].forEach(function(f){
    var v=Math.round(min+f*(max-min));
    var y=yOf(v);
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+w)+'" y2="'+y+'" stroke="#1e293b" stroke-width="1"/>';
    grid+='<text x="'+(padL-4)+'" y="'+y+'" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#64748b">'+v+'</text>';
  });

  // X axis labels — show ~6
  var xLabels='';
  var step = Math.max(1, Math.floor(dates.length/6));
  dates.forEach(function(d, i){
    if (i % step === 0 || i === dates.length-1) {
      var label = d.slice(5); // MM-DD
      xLabels += '<text x="'+xOf(i)+'" y="'+(padT+h+16)+'" text-anchor="middle" font-size="9" fill="#64748b">'+label+'</text>';
    }
  });

  // Series lines
  var lines = series.map(function(s){
    var pts=s.data.map(function(v,i){ return xOf(i)+','+yOf(v); }).join(' ');
    return '<polyline points="'+pts+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
      +'<circle cx="'+xOf(s.data.length-1)+'" cy="'+yOf(s.data[s.data.length-1])+'" r="3.5" fill="'+s.color+'"/>';
  }).join('');

  return '<svg viewBox="0 0 '+width+' '+height+'" width="100%" height="'+height+'">'
    +grid+xLabels+lines+'</svg>';
}

function setRiskTrendTab(t)    { riskTrendTab=t;    localStorage.setItem('grcRiskTrendTab',t);    render(); }

function addManualSnapshot() {
  takeRiskSnapshot();
  showToast('Risk snapshot saved for today');
  render();
}

function deleteAllTrendData() {
  if (!visitorHasOwnData()) {
    showToast('⚠ Add your own data first before clearing template trend history.');
    return;
  }
  if (!confirm('Delete all risk trend history? This cannot be undone.')) return;
  saveRiskTrends({ snapshots: [] });
  showToast('Risk trend history cleared');
  render();

function renderRiskTrends() {
  seedRiskTrendHistory();
  takeRiskSnapshot(); // auto-snapshot on view

  var d = getRiskTrends();
  var snaps = filterSnapsByPeriod(d.snapshots, riskTrendPeriod);
  var allSnaps = d.snapshots;

  var periods = ['1M','3M','6M','1Y','2Y','All'];
  var periodLabel = {'1M':'1 Month','3M':'3 Months','6M':'6 Months','1Y':'1 Year','2Y':'2 Years','All':'All Time'};

  var tabs = [
    { id:'exposure',  label:'Exposure Index',  icon:'📈' },
    { id:'severity',  label:'Severity Breakdown', icon:'🎯' },
    { id:'status',    label:'Status Trends',   icon:'🔄' },
    { id:'coverage',  label:'Control Coverage',icon:'🛡️' },
    { id:'log',       label:'Snapshot Log',    icon:'📋' },
  ];

  // ── Compute trend deltas (vs oldest in period) ────────────────────────────
  var first = snaps[0] || {}, last = snaps[snaps.length-1] || {};
  function delta(key) {
    var v1 = first[key]||0, v2 = last[key]||0;
    var diff = v2 - v1;
    var arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '—';
    return { diff: diff, arrow: arrow, v1: v1, v2: v2 };
  }
  function trendChip(key, goodDir) {
    // goodDir: 'down' means lower is better (risk), 'up' means higher is better (coverage)
    var t = delta(key);
    if (t.diff === 0) return '<span style="font-size:11px;color:var(--text-muted)">— no change</span>';
    var isGood = (goodDir === 'down' && t.diff < 0) || (goodDir === 'up' && t.diff > 0);
    var col = isGood ? '#10b981' : '#ef4444';
    var sign = t.diff > 0 ? '+' : '';
    return '<span style="font-size:11px;font-weight:700;color:'+col+'">'+(t.diff>0?'▲':'▼')+' '+sign+t.diff+'</span>';
  }

  var dates = snaps.map(function(s){ return s.date; });
  var CHART_W = 700, CHART_H = 180;

  // ── KPI summary strip ────────────────────────────────────────────────────
  var currentSnap = allSnaps[allSnaps.length-1] || {};

    { label:'Total Risks',   val: currentSnap.total||0,           trend: trendChip('total','down'),       col:'var(--accent)' },
    { label:'Open',          val: currentSnap.open||0,            trend: trendChip('open','down'),         col:'var(--red)' },
    { label:'Critical',      val: currentSnap.critical||0,        trend: trendChip('critical','down'),     col:'#f97316' },
    { label:'Avg Score',     val: currentSnap.avgScore||0,        trend: trendChip('avgScore','down'),     col:'var(--yellow)' },
    { label:'Exposure Idx',  val: (currentSnap.exposureIdx||0)+'%', trend: trendChip('exposureIdx','down'), col:'var(--red)' },
    { label:'Ctrl Coverage', val: (currentSnap.controlCoverage||0)+'%', trend: trendChip('controlCoverage','up'), col:'var(--green)' },

        +'<thead><tr style="background:var(--bg-surface);border-bottom:2px solid var(--border)">'
          +'<th style="padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Date</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Total</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red)">Crit</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#f97316">High</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow)">Med</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green)">Low</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Open / In-Mit / Done</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Exposure</th>'
          +'<th style="padding:10px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Ctrl Cov</th>'
        +'</tr></thead>'
        +'<tbody>'+logRows+'</tbody>'
      +'</table></div>'
    +'</div>';
  }

  return '<div class="content-area">'
    // Header
    +'<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">'
      +'<div>'
        +'<h2>📈 Risk Trends</h2>'
        +'<p>Historical risk posture tracking &nbsp;·&nbsp; '+allSnaps.length+' snapshot'+(allSnaps.length!==1?'s':'')+' &nbsp;·&nbsp; Earliest: '+(allSnaps[0]?allSnaps[0].date:'—')+'</p>'
      +'</div>'
      +'<div style="display:flex;gap:8px;align-items:center">'
        +'<button class="btn btn-secondary btn-sm" onclick="addManualSnapshot()" title="Save a snapshot of current risk state">📸 Snapshot Now</button>'
        +'<button class="btn btn-secondary btn-sm" onclick="deleteAllTrendData()" style="color:var(--red)">🗑 Clear History</button>'
      +'</div>'
    +'</div>'

    // KPI strip
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'+kpiHtml+'</div>'

    // Period selector
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap">'
      +'<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Period:</span>'
      +'<div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">'
        +periods.map(function(p){ return '<div class="filter-chip '+(riskTrendPeriod===p?'active':'')+'" onclick="setRiskTrendPeriod(\''+p+'\')">'+p+'</div>'; }).join('')
      +'</div>'
      +'<span style="font-size:11px;color:var(--text-muted);margin-left:8px">Showing '+snaps.length+' snapshot'+(snaps.length!==1?'s':'')+(snaps.length>0?' ('+snaps[0].date+' → '+snaps[snaps.length-1].date+')':'')+'</span>'
    +'</div>'

    // Tabs
    +'<div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0">'
      +tabs.map(function(t){
        var active = riskTrendTab === t.id;
        return '<button onclick="setRiskTrendTab(\''+t.id+'\')" style="padding:8px 14px;background:none;border:none;border-bottom:2px solid '+(active?'var(--accent)':'transparent')+';color:'+(active?'var(--accent)':'var(--text-muted)')+';font-size:12px;font-weight:'+(active?'700':'500')+';cursor:pointer;transition:color .15s;white-space:nowrap">'+t.icon+' '+t.label+'</button>';
      }).join('')
    +'</div>'

    +tabContent
  +'</div>';
}

// RISKS VIEW
// =============================================
function renderRisks() {
  const s = store();
  let risks = s.risks;
  const filterSev   = filterStates.risks       || 'All';
  const filterTreat = filterStates.riskTreat   || 'All';
  const filterStatus= filterStates.riskStatus  || 'All';
  if (filterSev    !== 'All') risks = risks.filter(r => r.category          === filterSev);
  if (filterTreat  !== 'All') risks = risks.filter(r => r.treatmentDecision === filterTreat);
  if (filterStatus !== 'All') risks = risks.filter(r => r.status            === filterStatus);
  risks = [...risks].sort((a,b) => b.score - a.score);

  const catBadge    = c => ({Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[c]||'badge-gray');
  const statusBadge = st => ({Open:'badge-critical','In Mitigation':'badge-warning',Mitigated:'badge-success'}[st]||'badge-gray');
  const treatIcon   = t => ({Mitigate:'🛡️',Transfer:'🤝',Accept:'✅',Avoid:'🚫'}[t]||'—');

  function riskAge(createdAt) {
    if (!createdAt) return 0;
    return Math.max(0, Math.floor((new Date()-new Date(createdAt))/86400000));
  }
  function remDue(due) {
    if (!due) return null;
    const days = Math.floor((new Date(due)-new Date())/86400000);
    if (days<0)   return {label:'Overdue '+Math.abs(days)+'d', col:'var(--red)'};
    if (days<=7)  return {label:'Due in '+days+'d',            col:'var(--orange)'};
    if (days<=30) return {label:'Due in '+days+'d',            col:'var(--yellow)'};
    return {label:new Date(due).toLocaleDateString('en-GB',{day:'numeric',month:'short'}),col:'var(--text-muted)'};
  }

  const overdueRisks = s.risks.filter(r=>r.remediationDue&&new Date(r.remediationDue)<new Date()&&r.status!=='Mitigated');

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h2>Risk Register</h2>
        <p>${s.risks.length} risks · ${s.risks.filter(r=>r.category==='Critical').length} critical · ${s.risks.filter(r=>r.status==='Open').length} open · ${overdueRisks.length>0?`<strong style="color:var(--red)">${overdueRisks.length} overdue</strong>`:'<span style="color:var(--green)">none overdue</span>'}</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="navigate('treatment')">📋 Treatment Plans</button>
        <button class="btn btn-primary" onclick="showModal({type:'add-risk'})">+ Add Risk</button>
      </div>
    </div>

    ${overdueRisks.length>0?`<div style="background:var(--red-dim);border:1px solid rgba(239,68,68,.4);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">🚨</span>
      <div><div style="font-size:13px;font-weight:700;color:var(--red)">${overdueRisks.length} risk${overdueRisks.length>1?'s':''} past remediation deadline</div>
      <div style="font-size:12px;color:var(--text-muted)">${overdueRisks.map(r=>r.description.slice(0,40)).join(' · ')}</div></div>
    </div>`:''}

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:70px">Severity</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Critical','High','Medium','Low'].map(t=>`<div class="filter-chip ${filterSev===t?'active':''}" onclick="filterStates.risks='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:70px">Treatment</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Mitigate','Transfer','Accept','Avoid'].map(t=>`<div class="filter-chip ${filterTreat===t?'active':''}" onclick="filterStates.riskTreat='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:70px">Status</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Open','In Mitigation','Mitigated'].map(t=>`<div class="filter-chip ${filterStatus===t?'active':''}" onclick="filterStates.riskStatus='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Risk</th><th class="hide-mobile">Owner</th><th>Score</th><th>Status</th>
            <th class="hide-mobile">Treatment</th><th class="hide-mobile">Due Date</th><th class="hide-mobile">Age</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${risks.length===0?`<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">⚠️</div><h3>No risks found</h3></div></td></tr>`:
            risks.map(r=>{
              const rem=remDue(r.remediationDue);
              const age=riskAge(r.createdAt);
              const ageCol=age>60?'var(--red)':age>30?'var(--orange)':'var(--text-muted)';
              return `<tr>
                <td class="td-mono">${r.id}</td>
                <td style="max-width:220px">
                  <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(r.description)}</div>
                  <div style="margin-top:3px"><span class="badge ${catBadge(r.category)}">${r.category}</span></div>
                </td>
                <td style="font-size:12px">${esc(r.owner)}</td>
                <td style="text-align:center"><span class="score-pill ${scoreClass(r.score)}">${r.score}</span></td>
                <td><span class="badge ${statusBadge(r.status)}">${r.status}</span></td>
                <td style="font-size:12px">${r.treatmentDecision?treatIcon(r.treatmentDecision)+' '+r.treatmentDecision:'—'}</td>
                <td>${rem?`<span style="font-size:11px;font-weight:600;color:${rem.col}">${rem.label}</span>`:'—'}</td>
                <td style="font-size:11px;font-weight:600;color:${ageCol}">${age}d</td>
                <td><div class="action-row">
                  <button class="btn btn-secondary btn-xs" onclick="showModal({type:'edit-risk',id:'${r.id}'})">Edit</button>
                  <button class="btn btn-secondary btn-xs" onclick="deleteRecord('risks','${r.id}')">✕</button>
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}


// CONTROLS VIEW
// =============================================
function renderControls() {
  const s = store();
  let controls = s.controls;
  const stFilter  = filterStates.ctrlStatus || 'All';
  const effFilter = filterStates.ctrlEff    || 'All';
  if (stFilter  !== 'All') controls = controls.filter(c => c.status === stFilter);
  if (effFilter !== 'All') controls = controls.filter(c => (c.effectiveness||'Untested') === effFilter);

  const stBadge   = st => ({Implemented:'badge-success','In Progress':'badge-warning',Planned:'badge-gray'}[st]||'badge-gray');
  const effBadge  = e  => ({High:'badge-success',Medium:'badge-warning',Low:'badge-critical',Untested:'badge-gray'}[e]||'badge-gray');
  const fwColors  = {'ISO 27001':'badge-info','NIST CSF':'badge-success','SOC 2':'badge-purple','GDPR':'badge-warning','CIS':'badge-high','HIPAA':'badge-gray'};

  const highEff   = s.controls.filter(c=>c.effectiveness==='High').length;
  const medEff    = s.controls.filter(c=>c.effectiveness==='Medium').length;
  const lowEff    = s.controls.filter(c=>c.effectiveness==='Low').length;
  const untested  = s.controls.filter(c=>!c.effectiveness||c.effectiveness==='Untested').length;
  const overdue   = s.controls.filter(c=>c.nextReview&&new Date(c.nextReview)<new Date()).length;

  function reviewDue(d) {
    if (!d) return null;
    const days=Math.floor((new Date(d)-new Date())/86400000);
    if (days<0)    return {label:'Overdue',col:'var(--red)'};
    if (days<=30)  return {label:'Due soon',col:'var(--orange)'};
    return {label:new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}),col:'var(--text-muted)'};
  }

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Controls</h2>
        <p>${s.controls.length} controls · ${s.controls.filter(c=>c.status==='Implemented').length} implemented · ${highEff} high-effectiveness · ${overdue>0?`<strong style="color:var(--red)">${overdue} review overdue</strong>`:'all reviews current'}</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-control'})">+ Add Control</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      ${[['High','var(--green)',highEff,'✓ Verified effective'],['Medium','var(--yellow)',medEff,'Partially effective'],['Low','var(--red)',lowEff,'Needs improvement'],['Untested','var(--text-muted)',untested,'Not yet tested']].map(([label,col,n,sub])=>`
      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer" onclick="filterStates.ctrlEff='${effFilter===label?'All':label}';render()">
        <div style="font-size:22px;font-weight:800;color:${col}">${n}</div>
        <div style="font-size:12px;font-weight:600;color:${col}">${label}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${sub}</div>
      </div>`).join('')}
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius)">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Status</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','Implemented','In Progress','Planned'].map(t=>`<div class="filter-chip ${stFilter===t?'active':''}" onclick="filterStates.ctrlStatus='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Effectiveness</span>
        <div class="filter-bar" style="margin:0;padding:0;border:none;background:none;gap:6px">
          ${['All','High','Medium','Low','Untested'].map(t=>`<div class="filter-chip ${effFilter===t?'active':''}" onclick="filterStates.ctrlEff='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Control</th><th class="hide-mobile">Framework</th><th>Status</th><th class="hide-mobile">Effectiveness</th><th class="hide-mobile">Last Tested</th><th class="hide-mobile">Next Review</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${controls.length===0?`<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🔒</div><h3>No controls</h3><button class="btn btn-primary" onclick="navigate('frameworks')">Browse Frameworks</button></div></td></tr>`:
            controls.map(c=>{
              const eff=c.effectiveness||'Untested';
              const nxt=reviewDue(c.nextReview);
              return `<tr>
                <td class="td-mono">${c.id}</td>
                <td style="max-width:240px">
                  <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(c.name)}</div>
                  ${c.testingNotes?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(c.testingNotes)}">${esc(c.testingNotes)}</div>`:''}
                </td>
                <td><span class="badge ${fwColors[c.framework]||'badge-gray'}">${c.framework}</span></td>
                <td><span class="badge ${reportStBadge(c.status)}">${c.status}</span></td>
                <td><span class="badge ${effBadge(eff)}">${eff}</span></td>
                <td style="font-size:12px;color:var(--text-muted)">${c.lastTested||'—'}</td>
                <td>${nxt?`<span style="font-size:11px;font-weight:600;color:${nxt.col}">${nxt.label}</span>`:'—'}</td>
                <td><div class="action-row">
                  <button class="btn btn-secondary btn-xs" onclick="showModal({type:'edit-control',id:'${c.id}'})">Edit</button>
                  <button class="btn btn-secondary btn-xs" onclick="deleteRecord('controls','${c.id}')">✕</button>
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

            <button class="btn btn-secondary btn-xs" onclick="deleteRecord('evidence','${e.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}

  </div>`;
}


// VENDORS VIEW
// =============================================
function renderVendors() {
  const s = store();
  const stBadge  = st => ({Compliant:'badge-success','Under Review':'badge-warning','Remediation Required':'badge-critical','Non-Compliant':'badge-high'}[st]||'badge-gray');
  const riskBadge = r => ({High:'badge-critical',Medium:'badge-medium',Low:'badge-low'}[r]||'badge-gray');
  const riskDot   = r => ({High:'#f05252',Medium:'#f5d020',Low:'#2ecc8a'}[r]||'#8b98b5');

  const filterRisk= filterStates.vendorRisk   || 'All';
  const filterSt  = filterStates.vendorStatus || 'All';
  let vendors = s.vendors;
  if (filterRisk !== 'All') vendors = vendors.filter(v=>v.riskRating===filterRisk);
  if (filterSt   !== 'All') vendors = vendors.filter(v=>v.status===filterSt);

  const expiringSoon = s.vendors.filter(v=>{
    if (!v.contractExpiry) return false;
    const days=Math.floor((new Date(v.contractExpiry)-new Date())/86400000);
    return days>=0&&days<=90;
  });
  const highRisk  = s.vendors.filter(v=>v.riskRating==='High').length;
  const nonComp   = s.vendors.filter(v=>v.status==='Non-Compliant'||v.status==='Remediation Required').length;
  const totalVal  = s.vendors.reduce((a,v)=>a+(v.contractValue||0),0);

  function contractStatus(expiry) {
    if (!expiry) return null;
    const days=Math.floor((new Date(expiry)-new Date())/86400000);
    if (days<0)    return {label:'Expired',               col:'var(--red)'};
    if (days<=30)  return {label:'Expires in '+days+'d',  col:'var(--red)'};
    if (days<=90)  return {label:'Expires in '+days+'d',  col:'var(--orange)'};

        <h2>Vendor Management</h2>
        <p>${s.vendors.length} vendors · ${s.vendors.filter(v=>v.status==='Compliant').length} compliant · ${highRisk} high-risk · Contracted: $${Math.round(totalVal/1000)}K/yr</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-vendor'})">+ Add Vendor</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      ${[['Total Vendors',s.vendors.length,'var(--accent)'],['High Risk',highRisk,'var(--red)'],['Non-Compliant',nonComp,'var(--orange)'],['Expiring <90d',expiringSoon.length,expiringSoon.length>0?'var(--yellow)':'var(--green)']].map(([l,v,c])=>`
      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">

      </div>`).join('')}
    </div>

    ${expiringSoon.length>0?`<div style="background:var(--yellow-dim);border:1px solid rgba(245,158,11,.4);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">

          ${['All','High','Medium','Low'].map(t=>`<div class="filter-chip ${filterRisk===t?'active':''}" onclick="filterStates.vendorRisk='${t}';render()">${t}</div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);min-width:80px">Status</span>

      </div>
    </div>

      ${vendors.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🏢</div><h3>No vendors found</h3></div></div>`:
      vendors.map(v=>{
        const cs=contractStatus(v.contractExpiry);
        const slaCol=v.slaBreaches>2?'var(--red)':v.slaBreaches>0?'var(--orange)':'var(--green)';
        return `<div class="card" style="border-left:3px solid ${riskDot(v.riskRating)}">
          <div style="display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start">
            <div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
                <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${esc(v.name)}</div>
                <span class="badge ${reportStBadge(v.status)}">${v.status}</span>
                <span class="badge ${riskBadge(v.riskRating)}">${v.riskRating} Risk</span>
              </div>
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">${esc(v.service)}</div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px;margin-bottom:8px">

                <div><span style="color:var(--text-muted)">SLA Breaches:</span> <strong style="color:${slaCol}">${v.slaBreaches??'—'}</strong></div>
                <div><span style="color:var(--text-muted)">Last Assessed:</span> ${v.lastAssessed||'—'}</div>
                <div><span style="color:var(--text-muted)">Next Assessment:</span> ${v.nextAssessment||'—'}</div>
                <div><span style="color:var(--text-muted)">Data Access:</span> ${v.dataAccess||'—'}</div>
              </div>
              ${v.notes?`<div style="font-size:12px;color:var(--text-secondary);background:var(--bg-surface);padding:8px 12px;border-radius:6px;border-left:2px solid var(--border);margin-bottom:6px">${v.notes}</div>`:''}
              ${v.linkedRisks&&v.linkedRisks.length>0?`<div style="display:flex;gap:6px;flex-wrap:wrap">${v.linkedRisks.map(rid=>`<span class="badge badge-gray">⚠ ${rid}</span>`).join('')}</div>`:''}
            </div>
            <div class="action-row" style="flex-direction:column;align-items:flex-end;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="showModal({type:'edit-vendor',id:'${v.id}'})">Edit</button>
              <button class="btn btn-secondary btn-sm" onclick="deleteRecord('vendors','${v.id}')">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function markGuideVisit(flag){
  if(!guideState.active||!guideState.moduleId)return;
  var l=getLearning();
  if(!l.progress[guideState.moduleId])l.progress[guideState.moduleId]={completedSteps:[],started:true};
  l.progress[guideState.moduleId][flag]=true;
  saveLearning(l);
  checkGuideStepValidation();
}
function currentStepDef(){
  if(!guideState.active||!guideState.moduleId)return null;
  var d=STEP_DEFS[guideState.moduleId];
  return d?d[guideState.stepIndex]||null:null;
}
function launchGuide(moduleId){
  var s=store(),l=getLearning();
  if(!l.progress[moduleId])l.progress[moduleId]={completedSteps:[],started:true};
  var prog=l.progress[moduleId];
  prog._baseAssets=s.assets.length;prog._baseRisks=s.risks.length;prog._baseControls=s.controls.length;
  prog._baseEvidence=s.evidence.length;prog._baseAudits=s.audits.length;prog._baseSoa=s.soa.length;
  prog._baseSoaApplicable=s.soa.filter(function(e){return e.applicable;}).length;
  prog._baseCritical=s.incidents.filter(function(i){return i.severity==='Critical';}).length;
  prog._baseHigh=s.incidents.filter(function(i){return i.severity==='High';}).length;
  prog._baseVendors=s.vendors.length;prog._baseBia=s.resilience.length;
  prog._baseIsoControls=s.controls.filter(function(c){return c.framework==='ISO 27001';}).length;
  prog._baseSocControls=s.controls.filter(function(c){return c.framework==='SOC 2';}).length;
  prog._basePciControls=s.controls.filter(function(c){return c.framework==='PCI DSS';}).length;
  saveLearning(l);
  var defs=STEP_DEFS[moduleId]||[],cs=(l.progress[moduleId]||{}).completedSteps||[],first=0;
  for(var i=0;i<defs.length;i++){if(cs.indexOf(i)!==-1)first=i+1;else break;}
  guideState.active=true;guideState.moduleId=moduleId;
  guideState.stepIndex=Math.min(first,defs.length-1);
  guideState.panelOpen=true;guideState.completedOverlay=false;saveGuideState();
  var step=defs[guideState.stepIndex];
  if(step&&step.view)navigate(step.view);else render();
}
function guideAdvance(){
  if(!guideState.active)return;
  var defs=STEP_DEFS[guideState.moduleId]||[],l=getLearning();
  if(!l.progress[guideState.moduleId])l.progress[guideState.moduleId]={completedSteps:[],started:true};
  var cs=l.progress[guideState.moduleId].completedSteps;
  if(cs.indexOf(guideState.stepIndex)===-1)cs.push(guideState.stepIndex);
  saveLearning(l);
  if(guideState.stepIndex<defs.length-1){
    guideState.stepIndex++;saveGuideState();
    var ns=defs[guideState.stepIndex];if(ns&&ns.view)navigate(ns.view);else render();
  }else{guideState.completedOverlay=true;saveGuideState();render();}
}
function guideBack(){if(!guideState.active||guideState.stepIndex<=0)return;guideState.stepIndex--;saveGuideState();var s=STEP_DEFS[guideState.moduleId]&&STEP_DEFS[guideState.moduleId][guideState.stepIndex];if(s&&s.view)navigate(s.view);else render();}
function guideSkipStep(){guideAdvance();}
function guideExit(){guideState.active=false;guideState.completedOverlay=false;saveGuideState();navigate('learning');}
function guideTogglePanel(){guideState.panelOpen=!guideState.panelOpen;saveGuideState();var p2=document.getElementById('guide-panel'),t=document.getElementById('guide-panel-toggle'),b=document.querySelector('.guide-banner');if(p2)p2.classList.toggle('open',guideState.panelOpen);if(t)t.classList.toggle('panel-open',guideState.panelOpen);if(b)b.classList.toggle('panel-open',guideState.panelOpen);}
function guideGoToStep(idx){var d=STEP_DEFS[guideState.moduleId]||[];if(idx<0||idx>=d.length)return;guideState.stepIndex=idx;saveGuideState();var s=d[idx];if(s&&s.view)navigate(s.view);else render();}
function checkGuideStepValidation(){
  if(!guideState.active||guideState.completedOverlay)return;
  var step=currentStepDef();if(!step||!step.validates)return;
  var s=store(),l=getLearning(),prog=(l.progress[guideState.moduleId]||{});
  if(step.validates(s,prog)){showToast('Step complete!');setTimeout(guideAdvance,700);}
}

function syncGuideBannerHeight(){
  var banner=document.querySelector('.guide-banner');
  var panel=document.querySelector('.guide-steps-panel');
  var toggle=document.querySelector('.guide-panel-toggle');
  var h=banner?banner.getBoundingClientRect().height:0;
  document.documentElement.style.setProperty('--guide-banner-h', h+'px');
  if(banner&&panel){
    if(panel.classList.contains('open')){banner.classList.add('panel-open');}
    else{banner.classList.remove('panel-open');}
  }
}
function renderMatrix() {
  const s = store();
  // Build 5x5 grid (likelihood 1-5 row, impact 1-5 col)
  const getCellClass = (l,i) => {
    const score = l * i;
    if(score>=17) return 'cell-critical';
    if(score>=10) return 'cell-high';
    if(score>=5) return 'cell-medium';
    return 'cell-low';
  };

  const getCellLabel = (l,i) => {
    const score=l*i;
    if(score>=17) return 'Critical';
    if(score>=10) return 'High';
    if(score>=5) return 'Medium';
    return 'Low';
  };

  const getRisksAt = (l, i) => s.risks.filter(r => r.likelihood === l && r.impact === i);

  const dotColors = {Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'};

  let gridHtml = '';
  // Y axis labels + cells (likelihood 5 to 1 from top)
  for(let l=5; l>=1; l--) {
    // Y-axis label
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${l}</div>`;
    for(let i=1; i<=5; i++) {
      const risks = getRisksAt(l, i);
      const cls = getCellClass(l,i);
      const lbl = getCellLabel(l,i);
      gridHtml += `<div class="matrix-cell ${cls}" title="L${l} × I${i} = ${l*i} (${lbl})">
        <span style="position:absolute;top:4px;right:6px;font-size:9px;opacity:0.5">${l*i}</span>
        ${risks.map((r,idx)=>`
          <div class="risk-dot" style="background:${dotColors[r.category]};left:${20+idx*24}px;top:50%;transform:translateY(-50%)" title="${esc(r.description)}">
            ${r.id.replace('R-','')}
            <div class="risk-dot-tooltip">${esc(r.description)} (Score: ${r.score})</div>
          </div>`).join('')}
      </div>`;
    }
  }
  // X-axis row
  gridHtml += `<div></div>`;
  for(let i=1;i<=5;i++) {
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${i}</div>`;
  }

  const legend = [
    {cls:'cell-critical',label:'Critical (17-25)'},
    {cls:'cell-high',label:'High (10-16)'},
    {cls:'cell-medium',label:'Medium (5-9)'},
    {cls:'cell-low',label:'Low (1-4)'},
  ];

  return `<div class="content-area">
    <div class="page-header">
      <h2>Risk Matrix</h2>
      <p>Visual likelihood × impact heatmap with risk placement. Hover dots for details.</p>
    </div>
    <div class="grid grid-2" style="gap:24px;align-items:start">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🗂️ Likelihood × Impact Matrix</div>
        </div>
        <div style="margin-bottom:8px;font-size:12px;color:var(--text-muted);text-align:center;font-weight:600;letter-spacing:0.05em">LIKELIHOOD →</div>
        <div class="risk-matrix-wrap">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="writing-mode:vertical-rl;text-orientation:mixed;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.05em;transform:rotate(180deg);padding:8px 0">IMPACT ↑</div>
            <div>
              <div class="risk-matrix" style="min-width:380px">
                ${gridHtml}
              </div>
              <div class="axis-title" style="margin-top:4px">Impact (1–5)</div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
          ${legend.map(l=>`<div style="display:flex;align-items:center;gap:6px">
            <div class="matrix-cell ${l.cls}" style="width:16px;height:16px;border-radius:3px;min-height:auto"></div>
            <span style="font-size:11px;color:var(--text-secondary)">${l.label}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 Risk Placement Summary</div>
        </div>
        <div style="margin-bottom:12px">
          ${['Critical','High','Medium','Low'].map(cat=>{
            const catRisks = s.risks.filter(r=>r.category===cat);
            const colors={Critical:'var(--red)',High:'var(--orange)',Medium:'var(--yellow)',Low:'var(--green)'};
            return `<div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-size:13px;font-weight:600;color:${colors[cat]}">${cat}</span>
                <span style="font-size:12px;color:var(--text-muted)">${catRisks.length} risk${catRisks.length!==1?'s':''}</span>
              </div>
              <div style="font-size:12px;color:var(--text-secondary)">
                ${catRisks.slice(0,3).map(r=>`• ${esc(r.description)}`).join('<br>') || '<span style="color:var(--text-muted)">None</span>'}
                ${catRisks.length>3?`<br><span style="color:var(--text-muted)">+${catRisks.length-3} more</span>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="section-divider"></div>
        <div class="card-title" style="margin-bottom:12px">⚙️ Thresholds Config</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);background:var(--bg-surface);border-radius:var(--radius);padding:12px">
          Low:      1–4  (score = likelihood × impact)<br>
          Medium:   5–9<br>
          High:    10–16<br>
          Critical: 17–25
        </div>
      </div>
    </div>
  </div>`;
}

function addControlFromLibrary(id, name, fw) {
  const s = store();
  if (s.controls.find(c=>c.frameworkRef===id)) { showToast('Control already in your library'); return; }
  updateStore(s => {
    s.controls.push({id:genId('CTRL'),name,framework:fw,frameworkRef:id,status:'Planned',owner:'',description:'',risks:[],evidence:[]});
  });
  showToast(`Added "${name}" to your controls`);
}

function renderIncidents() {

  const stBadge = st => ({Open:'badge-critical',Investigating:'badge-high',Mitigated:'badge-warning','Resolved':'badge-success'}[st]||'badge-gray');
  const dotColor = sv => ({Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'}[sv]||'#8b98b5');

  const filter = filterStates.incidents || 'All';
  let incidents = s.incidents;
  if (filter !== 'All') incidents = incidents.filter(i => i.status === filter);

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Incident Management</h2>

    </div>
    <div class="filter-bar">
      ${['All','Open','Investigating','Mitigated','Resolved'].map(t=>`<div class="filter-chip ${filter===t?'active':''}" onclick="filterStates.incidents='${t}';render()">${t}</div>`).join('')}
    </div>
    <div class="grid grid-2" style="gap:16px">
      ${incidents.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🚨</div><h3>No incidents found</h3></div></div>`:
      incidents.map(inc=>{
        const affectedAssets = s.assets.filter(a=>inc.affectedAssets&&inc.affectedAssets.includes(a.id));
        const linkedRisks = s.risks.filter(r=>inc.linkedRisks&&inc.linkedRisks.includes(r.id));
        return `<div class="card" style="border-left:3px solid ${dotColor(inc.severity)}">
          <div class="card-header">
            <div class="card-title"><span class="severity-dot dot-${inc.severity.toLowerCase()}"></span>${esc(inc.title)}</div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:12px">

            <div><span style="color:var(--text-muted)">Severity: </span><span class="badge ${sevBadge(inc.severity)}">${inc.severity}</span></div>
            ${inc.rootCause?`<div style="grid-column:span 2"><span style="color:var(--text-muted)">Root Cause: </span>${esc(inc.rootCause)}</div>`:''}
          </div>
          ${inc.responseActions?`<div style="background:var(--bg-surface);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--accent)">
            <strong style="color:var(--text-secondary)">Response:</strong> ${esc(inc.responseActions)}
          </div>`:''}
          ${inc.lessonsLearned?`<div style="background:var(--green-dim);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--green)">
            <strong style="color:var(--green)">Lessons Learned:</strong> ${esc(inc.lessonsLearned)}
          </div>`:''}
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);margin-bottom:12px">
            ${affectedAssets.length>0?`<span>🖥️ ${affectedAssets.map(a=>a.name).join(', ')}</span>`:''}

          </div>
          <div class="action-row">
            <button class="btn btn-secondary btn-sm" onclick="showModal({type:'edit-incident',id:'${inc.id}'})">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteRecord('incidents','${inc.id}')">Delete</button>

        </div>`;
      }).join('')}

}

function renderGuideBanner(){
  if(!guideState.active||!guideState.moduleId)return'';
  var defs=STEP_DEFS[guideState.moduleId]||[];if(!defs.length)return'';
  var step=defs[guideState.stepIndex];if(!step)return'';
  var l=getLearning(),cs=(l.progress[guideState.moduleId]||{}).completedSteps||[];
  var pct=Math.round(cs.length/defs.length*100);
  var allMods=LEARNING_DATA.missions.concat(LEARNING_DATA.scenarios).concat(LEARNING_DATA.projects);
  var mod=allMods.filter(function(m){return m.id===guideState.moduleId;})[0];
  var dots=defs.map(function(d,i){var cls=cs.indexOf(i)!==-1?'done':i===guideState.stepIndex?'active':'';return'<span class="guide-dot '+cls+'" onclick="guideGoToStep('+i+')" title="Step '+(i+1)+'" style="cursor:pointer"></span>';}).join('');
  var hint=step.hint?'<div class="guide-banner-sub">'+step.hint+'</div>':'';
  var actFn=step.action?step.action.toString().replace(/\\/g,'\\\\').replace(/"/g,'&quot;'):'';
  return'<div class="guide-banner">'
    +'<div class="guide-banner-icon">'+(step.icon||'&#x1F3AF;')+'</div>'
    +'<div class="guide-banner-body">'
      +'<div class="guide-banner-mission">&#x1F393; '+(mod?mod.title:'Guided Mission')+' &mdash; Step '+(guideState.stepIndex+1)+' of '+defs.length+'</div>'
      +'<div class="guide-banner-step">'+step.label+'</div>'+hint
    +'</div>'
    +'<div class="guide-banner-progress"><div class="guide-banner-dots">'+dots+'</div><span class="guide-banner-pct">'+pct+'%</span></div>'
    +'<div class="guide-banner-actions">'
      +(guideState.stepIndex>0?'<button class="guide-btn guide-btn-secondary" onclick="guideBack()">&larr; Back</button>':'')
      +(step.action?'<button class="guide-btn guide-btn-primary" onclick="('+actFn+')()">Go &rarr;</button>':'')
      +'<button class="guide-btn guide-btn-secondary" onclick="guideSkipStep()">Skip</button>'
      +'<button class="guide-btn guide-btn-secondary" onclick="guideExit()" title="Exit guide">&times;</button>'
    +'</div></div>';
}

            + '<div style="font-size:11px;color:#64748b">' + esc(a.framework) + ' &nbsp;·&nbsp; Lead: ' + esc(a.lead) + ' &nbsp;·&nbsp; ' + esc(a.startDate||'') + ' → ' + esc(a.endDate||'') + '</div>'
            + '</div>'
            + '<span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;border:1px solid ' + stCol + ';color:' + stCol + '">' + esc(a.status) + '</span>'
            + '</div>';
        }).join('')
      + '</div>'
      + '<div style="padding:0 28px 20px;font-size:11px;color:#475569">Click any audit above to generate its compliance report</div>'
      + '</div>';
    document.body.appendChild(overlay);
  }
}

function generateAuditReport(aid) {
  requireOwnerOrModified(function() { _doGenerateAuditReport(aid); });
}
function _doGenerateAuditReport(aid) {
  var s = store();
  var a = s.audits.find(function(x){ return x.id === aid; });
  if (!a) { showToast('Audit not found'); return; }

  var linkedControls = s.controls.filter(function(c){ return a.controls && a.controls.includes(c.id); });
  var linkedEvidence = s.evidence.filter(function(e){ return a.evidence && a.evidence.includes(e.id); });
  var now = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  var implCtrl   = linkedControls.filter(function(c){ return c.status === 'Implemented'; }).length;
  var inProgCtrl = linkedControls.filter(function(c){ return c.status === 'In Progress'; }).length;
  var plannedCtrl= linkedControls.filter(function(c){ return c.status === 'Planned'; }).length;
  var highEff    = linkedControls.filter(function(c){ return c.effectiveness === 'High'; }).length;
  var ctrlEff    = linkedControls.length > 0 ? Math.round(implCtrl / linkedControls.length * 100) : 0;
  var statusCol  = {Completed:'#16a34a','In Progress':'#d97706',Planned:'#3b82f6','On Hold':'#64748b'}[a.status] || '#64748b';

  // Readiness rating
  var readiness = ctrlEff >= 80 ? 'Audit Ready' : ctrlEff >= 50 ? 'Partially Ready' : 'Preparation Required';
  var readinessCol = ctrlEff >= 80 ? '#16a34a' : ctrlEff >= 50 ? '#d97706' : '#dc2626';

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
  + '<title>' + esc(a.name) + ' — Audit Report</title>'
