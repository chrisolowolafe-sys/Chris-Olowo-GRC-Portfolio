<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise GRC Platform | Chris Olowo, PMP®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* =============================================
       DESIGN SYSTEM — Dark Industrial Precision
    ============================================= */
    :root {
      --bg-void: #080c14;
      --bg-base: #0d1117;
      --bg-elevated: #161b27;
      --bg-surface: #1c2333;
      --bg-hover: #212840;
      --border: rgba(99,120,180,0.18);
      --border-strong: rgba(99,120,180,0.35);
      --text-primary: #e8edf5;
      --text-secondary: #8b98b5;
      --text-muted: #556080;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --accent-hover: #6ba3ff;
      --green: #2ecc8a;
      --green-dim: rgba(46,204,138,0.12);
      --red: #f05252;
      --red-dim: rgba(240,82,82,0.12);
      --orange: #f5a623;
      --orange-dim: rgba(245,166,35,0.12);
      --purple: #9b6cff;
      --purple-dim: rgba(155,108,255,0.12);
      --yellow: #f5d020;
      --yellow-dim: rgba(245,208,32,0.12);
      --cyan: #22d3ee;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--font-body);
      background: var(--bg-void);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }
    /* =============================================
       LAYOUT
    ============================================= */
    #app { display: flex; height: 100vh; }
    /* ═══ SIDEBAR — COLLAPSIBLE ══════════════════════════════════════════════ */
    /* Change widths here */
    :root { --plat-expanded: 240px; }
    @media (prefers-reduced-motion: reduce) { .sidebar, .sidebar *, .sidebar-peek-btn { transition-duration: 0ms !important; } }
    body.drawer-open { overflow: hidden; }

    /* Sidebar: fully hidden by default, slides in as overlay */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--plat-expanded);
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
      transform: translateX(-100%);
      transition: transform 220ms cubic-bezier(.4,0,.2,1), box-shadow 220ms;
      z-index: 300;
      box-shadow: none;
    }
    .sidebar.is-open {
      transform: translateX(0);
      box-shadow: 4px 0 32px rgba(0,0,0,.5);
    }
    /* is-collapsed is no longer used for desktop — keep for mobile compat */
    .sidebar.is-collapsed { transform: translateX(-100%); }

    /* Scrim — shown whenever sidebar is open */
    #platScrim {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200; cursor: pointer;
      backdrop-filter: blur(2px);
    }
    #platScrim.is-visible { display: block; }

    /* Floating peek button — always visible, top-left corner */
    .sidebar-peek-btn {
      position: fixed; top: 12px; left: 12px; z-index: 400;
      width: 38px; height: 38px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 150ms, color 150ms, opacity 200ms, transform 200ms;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .sidebar-peek-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-peek-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .sidebar-peek-btn svg { width: 18px; height: 18px; pointer-events: none; }
    /* Hide peek btn while sidebar is open */
    .sidebar-peek-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-8px); }

    /* Topbar toggle button (inside sidebar header) */
    .sidebar-toggle-btn {
      width: 34px; height: 34px; background: transparent;
      border: none; border-radius: 6px;
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 150ms, color 150ms;
    }
    .sidebar-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .sidebar-toggle-btn svg { width: 18px; height: 18px; pointer-events: none; }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      overflow: hidden; flex-shrink: 0;
    }
    .logo-mark {
      width: 34px; height: 34px; min-width: 34px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 800; font-size: 14px; color: white;
      flex-shrink: 0;
    }
    .logo-text { overflow: hidden; transition: opacity 200ms ease-out; }
    .logo-text h1 {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      color: var(--text-primary); white-space: nowrap;
    }
    .logo-text p { font-size: 11px; color: var(--text-muted); }
    /* Logo text always visible — no icon-only mode */

    /* Scrollable nav — CUSTOM SCROLLBAR SCOPED HERE ONLY */
    .sidebar-nav {
      flex: 1; overflow-y: auto; padding: 12px 0; overflow-x: hidden;
      scrollbar-width: auto; scrollbar-color: #334155 #0b1220;
    }
    .sidebar-nav::-webkit-scrollbar { width: 14px; }
    .sidebar-nav::-webkit-scrollbar-track { background: #0b1220; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; border: 3px solid #0b1220; }
    .sidebar-nav::-webkit-scrollbar-thumb:hover { background: #475569; }

    .nav-group { margin-bottom: 20px; }
    .nav-group-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); padding: 0 20px 6px;
      white-space: nowrap; overflow: hidden;
      transition: opacity 200ms ease-out;
    }
    /* Nav group label always visible */

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none; white-space: nowrap;
      overflow: hidden; position: relative;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); border-left-color: var(--accent); }

    /* No icon-only collapsed state — sidebar fully hidden when closed */

    .nav-item .nav-icon { width: 16px; min-width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .nav-item .nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; transition: opacity 200ms ease-out; }


    .nav-badge {
      margin-left: auto; flex-shrink: 0;
      background: var(--red-dim); color: var(--red);
      font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
      transition: opacity 200ms;
    }

    .main-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg-void);
      /* Sidebar no longer takes layout space — main area fills full width */
      width: 100%;
    }
    .topbar {
      height: 56px; min-height: 56px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px 0 62px; gap: 16px;  /* left pad clears floating peek button */
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-subtitle { font-size: 12px; color: var(--text-muted); margin-left: 2px; }
    .topbar-spacer { flex: 1; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      width: 240px;
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text-primary); font-family: var(--font-body);
      font-size: 13px; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      cursor: pointer;
    }
    .content-area { flex: 1; overflow-y: auto; padding: 24px;
      scrollbar-width: auto; scrollbar-color: #38bdf8 #0b1220; }
    .content-area::-webkit-scrollbar { width: 12px; }
    .content-area::-webkit-scrollbar-track { background: #0b1220; }
    .content-area::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 999px; border: 3px solid #0b1220; }
    .content-area::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
    /* =============================================
       COMMON COMPONENTS
    ============================================= */
    .page-header { margin-bottom: 24px; }
    .page-header h2 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
    }
    .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger { background: var(--red); color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-xs { padding: 2px 8px; font-size: 11px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .badge-critical { background: rgba(240,82,82,0.2); color: var(--red); }
    .badge-high { background: rgba(245,166,35,0.2); color: var(--orange); }
    .badge-medium { background: rgba(245,208,32,0.2); color: var(--yellow); }
    .badge-low { background: rgba(46,204,138,0.2); color: var(--green); }
    .badge-info { background: var(--accent-dim); color: var(--accent); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-success { background: var(--green-dim); color: var(--green); }
    .badge-warning { background: var(--orange-dim); color: var(--orange); }
    .badge-gray { background: rgba(139,152,181,0.15); color: var(--text-secondary); }
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 12px; }
    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left; white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      font-size: 13px; color: var(--text-secondary);
      border-bottom: 1px solid rgba(99,120,180,0.08);
      vertical-align: middle;
    }
    tr:hover td { background: var(--bg-hover); }
    tr:last-child td { border-bottom: none; }
    .td-primary { color: var(--text-primary); font-weight: 500; }
    .td-mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    /* Filter bar */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Metric cards */
    .metric-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .metric-card .metric-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .metric-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .metric-icon.blue { background: var(--accent-dim); color: var(--accent); }
    .metric-icon.red { background: var(--red-dim); color: var(--red); }
    .metric-icon.green { background: var(--green-dim); color: var(--green); }
    .metric-icon.orange { background: var(--orange-dim); color: var(--orange); }
    .metric-icon.purple { background: var(--purple-dim); color: var(--purple); }
    .metric-value {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--text-primary); line-height: 1;
    }
    .metric-label { font-size: 12px; color: var(--text-secondary); }
    .metric-trend { font-size: 11px; }
    .metric-trend.up { color: var(--red); }
    .metric-trend.down { color: var(--green); }
    .metric-trend.flat { color: var(--text-muted); }
    /* Section divider */
    .section-divider {
      height: 1px; background: var(--border);
      margin: 24px 0;
    }
    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }
    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(8,12,20,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 560px; max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-lg { width: 780px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 18px;
      cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .form-control {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: var(--font-body); font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    /* Progress */
    .progress-bar {
      height: 6px; background: var(--bg-surface);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-item {
      padding: 8px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    .tab-item:hover { color: var(--text-primary); }
    .tab-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    /* Severity dots */
    .severity-dot {
      width: 8px; height: 8px;
      border-radius: 50%; display: inline-block;
      margin-right: 6px; flex-shrink: 0;
    }
    .dot-critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot-high { background: var(--orange); }
    .dot-medium { background: var(--yellow); }
    .dot-low { background: var(--green); }
    /* =============================================
       DASHBOARD
    ============================================= */
    .health-ring {
      position: relative; width: 110px; height: 110px;
      flex-shrink: 0;
    }
    .health-ring canvas { position: absolute; inset: 0; }
    .health-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .health-ring-label .score {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }
    .health-ring-label .score-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .dashboard-bento {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }
    .bento-wide { grid-column: span 2; }
    .bento-tall { grid-row: span 2; }
    .risk-row-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(99,120,180,0.08);
    }
    .risk-row-item:last-child { border-bottom: none; }
    .risk-row-item .risk-name {
      flex: 1; font-size: 13px; color: var(--text-secondary);
    }
    .score-pill {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      min-width: 32px; text-align: center;
    }
    /* =============================================
       RISK MATRIX
    ============================================= */
    .risk-matrix-wrap { overflow-x: auto; padding-bottom: 8px; }
    .risk-matrix {
      display: grid;
      grid-template-columns: 40px repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr) 40px;
      gap: 4px;
      width: 100%; max-width: 640px;
      aspect-ratio: 1;
      margin: 0 auto;
    }
    .matrix-cell {
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      position: relative;
      cursor: default;
      transition: transform 0.1s;
      min-height: 60px;
    }
    .matrix-cell:hover { transform: scale(1.02); z-index: 1; }
    .cell-low { background: rgba(46,204,138,0.15); border: 1px solid rgba(46,204,138,0.3); }
    .cell-medium { background: rgba(245,208,32,0.15); border: 1px solid rgba(245,208,32,0.3); }
    .cell-high { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); }
    .cell-critical { background: rgba(240,82,82,0.15); border: 1px solid rgba(240,82,82,0.3); }
    .cell-label { color: var(--text-muted); font-size: 10px; writing-mode: vertical-rl; text-orientation: mixed; }

<script>
// =============================================

const FRAMEWORKS_LIBRARY = [
  // ISO 27001 — Annex A subset

function getStore() {
  try {
    const raw = localStorage.getItem('grc_store_v3');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveStore(data) {
  localStorage.setItem('grc_store_v3', JSON.stringify(data));
}
function initStore() {
  const existing = getStore();
  // Seed if no data, OR if stale empty data from a previous broken version
  const isEmpty = !existing ||
    (!existing.assets?.length && !existing.risks?.length && !existing.controls?.length);
  if (isEmpty) saveStore(JSON.parse(JSON.stringify(SEED_DATA)));
}
function store() { return getStore() || SEED_DATA; }
function updateStore(fn) { const s = store(); fn(s); saveStore(s); render(); checkGuideStepValidation(); }

// ULID-like ID generator
function genId(prefix) {
  return prefix + '-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase();
}

// Learning progress state (persisted in localStorage)
const LEARNING_KEY = 'grcLearningProgress_v1';

function getLearning() {
  try {
    const raw = localStorage.getItem(LEARNING_KEY);
    return raw ? JSON.parse(raw) : { progress: {}, activeFilter: 'All', activeTab: 'missions' };
  } catch { return { progress: {}, activeFilter: 'All', activeTab: 'missions' }; }
}

function saveLearning(data) {
  localStorage.setItem(LEARNING_KEY, JSON.stringify(data));
}

function getModuleProgress(id) {
  const l = getLearning();
  return l.progress[id] || { completedSteps: [], started: false };
}

function toggleLearningStep(moduleId, stepId) {
  const l = getLearning();
  if (!l.progress[moduleId]) l.progress[moduleId] = { completedSteps: [], started: true };
  const steps = l.progress[moduleId].completedSteps;
  const idx = steps.indexOf(stepId);
  if (idx === -1) steps.push(stepId);
  else steps.splice(idx, 1);
  l.progress[moduleId].started = true;
  saveLearning(l);
  render();
}

function startModule(id) {
  const l = getLearning();
  if (!l.progress[id]) l.progress[id] = { completedSteps: [], started: true };
  else l.progress[id].started = true;
  saveLearning(l);
  render();
}

function setLearningTab(tab) {
  const l = getLearning(); l.activeTab = tab; saveLearning(l); render();
}

function setLearningFilter(f) {
  const l = getLearning(); l.activeFilter = f; saveLearning(l); render();
}

function resetModuleProgress(id) {
  const l = getLearning();
  delete l.progress[id];
  saveLearning(l); render();
}


function riskCategory(score) {
  if (score >= 17) return 'Critical';
  if (score >= 10) return 'High';
  if (score >= 5) return 'Medium';
  return 'Low';
}

/** Sidebar is always an overlay — open/close on all screen sizes */
function applySidebarState() {
  const sb = document.getElementById('platSidebar');
  const sc = document.getElementById('platScrim');
  const pb = document.getElementById('platPeekBtn');
  if (!sb) return;
  const isOpen = sidebarMobileOpen;   // reuse flag for both mobile & desktop
  sb.classList.toggle('is-open', isOpen);
  sb.classList.remove('is-collapsed');
  if (sc) { sc.style.display = isOpen ? 'block' : 'none'; }
  if (pb) { pb.classList.toggle('hidden', isOpen); }
  document.body.classList.toggle('drawer-open', isOpen);
}

/** Toggle called from topbar button onclick OR floating peek button */
function toggleSidebar() {
  sidebarMobileOpen = !sidebarMobileOpen;
  localStorage.setItem(PLAT_SIDEBAR_KEY, sidebarMobileOpen);
  applySidebarState();
}

// Resize handler — close sidebar on resize to avoid overlay sticking
window.addEventListener('resize', (function() {
  let t;
  return function() {
    clearTimeout(t);
    t = setTimeout(function() {

  };
})());

// RISK MATRIX VIEW
// =============================================
function renderMatrix() {
  const s = store();
  // Build 5x5 grid (likelihood 1-5 row, impact 1-5 col)
  const getCellClass = (l,i) => {
    const score = l * i;
    if(score>=17) return 'cell-critical';
    if(score>=10) return 'cell-high';
    if(score>=5) return 'cell-medium';
    return 'cell-low';
  };

  const getCellLabel = (l,i) => {
    const score=l*i;
    if(score>=17) return 'Critical';
    if(score>=10) return 'High';
    if(score>=5) return 'Medium';
    return 'Low';
  };

  const getRisksAt = (l, i) => s.risks.filter(r => r.likelihood === l && r.impact === i);

  const dotColors = {Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'};

  let gridHtml = '';
  // Y axis labels + cells (likelihood 5 to 1 from top)
  for(let l=5; l>=1; l--) {
    // Y-axis label
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${l}</div>`;
    for(let i=1; i<=5; i++) {
      const risks = getRisksAt(l, i);
      const cls = getCellClass(l,i);
      const lbl = getCellLabel(l,i);
      gridHtml += `<div class="matrix-cell ${cls}" title="L${l} × I${i} = ${l*i} (${lbl})">
        <span style="position:absolute;top:4px;right:6px;font-size:9px;opacity:0.5">${l*i}</span>
        ${risks.map((r,idx)=>`
          <div class="risk-dot" style="background:${dotColors[r.category]};left:${20+idx*24}px;top:50%;transform:translateY(-50%)" title="${r.description}">
            ${r.id.replace('R-','')}
            <div class="risk-dot-tooltip">${r.description} (Score: ${r.score})</div>
          </div>`).join('')}
      </div>`;
    }
  }
  // X-axis row
  gridHtml += `<div></div>`;
  for(let i=1;i<=5;i++) {
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${i}</div>`;
  }

  const legend = [
    {cls:'cell-critical',label:'Critical (17-25)'},
    {cls:'cell-high',label:'High (10-16)'},
    {cls:'cell-medium',label:'Medium (5-9)'},
    {cls:'cell-low',label:'Low (1-4)'},
  ];

  return `<div class="content-area">
    <div class="page-header">
      <h2>Risk Matrix</h2>
      <p>Visual likelihood × impact heatmap with risk placement. Hover dots for details.</p>
    </div>
    <div class="grid grid-2" style="gap:24px;align-items:start">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🗂️ Likelihood × Impact Matrix</div>
        </div>
        <div style="margin-bottom:8px;font-size:12px;color:var(--text-muted);text-align:center;font-weight:600;letter-spacing:0.05em">LIKELIHOOD →</div>
        <div class="risk-matrix-wrap">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="writing-mode:vertical-rl;text-orientation:mixed;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.05em;transform:rotate(180deg);padding:8px 0">IMPACT ↑</div>
            <div>
              <div class="risk-matrix" style="min-width:380px">
                ${gridHtml}
              </div>
              <div class="axis-title" style="margin-top:4px">Impact (1–5)</div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
          ${legend.map(l=>`<div style="display:flex;align-items:center;gap:6px">
            <div class="matrix-cell ${l.cls}" style="width:16px;height:16px;border-radius:3px;min-height:auto"></div>
            <span style="font-size:11px;color:var(--text-secondary)">${l.label}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 Risk Placement Summary</div>
        </div>
        <div style="margin-bottom:12px">
          ${['Critical','High','Medium','Low'].map(cat=>{
            const catRisks = s.risks.filter(r=>r.category===cat);
            const colors={Critical:'var(--red)',High:'var(--orange)',Medium:'var(--yellow)',Low:'var(--green)'};
            return `<div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-size:13px;font-weight:600;color:${colors[cat]}">${cat}</span>
                <span style="font-size:12px;color:var(--text-muted)">${catRisks.length} risk${catRisks.length!==1?'s':''}</span>
              </div>
              <div style="font-size:12px;color:var(--text-secondary)">
                ${catRisks.slice(0,3).map(r=>`• ${r.description}`).join('<br>') || '<span style="color:var(--text-muted)">None</span>'}
                ${catRisks.length>3?`<br><span style="color:var(--text-muted)">+${catRisks.length-3} more</span>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="section-divider"></div>
        <div class="card-title" style="margin-bottom:12px">⚙️ Thresholds Config</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);background:var(--bg-surface);border-radius:var(--radius);padding:12px">
          Low:      1–4  (score = likelihood × impact)<br>
          Medium:   5–9<br>
          High:    10–16<br>
          Critical: 17–25
        </div>
      </div>
    </div>
  </div>`;
}

function addControlFromLibrary(id, name, fw) {
  const s = store();
  if (s.controls.find(c=>c.frameworkRef===id)) { showToast('Control already in your library'); return; }
  updateStore(s => {
    s.controls.push({id:genId('CTRL'),name,framework:fw,frameworkRef:id,status:'Planned',owner:'',description:'',risks:[],evidence:[]});
  });
  showToast(`Added "${name}" to your controls`);
}

function renderEvidence() {

  const typeIcon = t => ({Policy:'📄',Screenshot:'🖼️',Report:'📊',Config:'⚙️',Certificate:'🏆'}[t]||'📁');
  const mimeLabel = m => m.includes('pdf')?'PDF':m.includes('image')?'Image':m.includes('sheet')?'Excel':'Doc';

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Evidence Management</h2>
        <p>Policies, screenshots, reports, and configuration exports linked to controls, risks, and audits.</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-evidence'})">+ Upload Evidence</button>
    </div>
    <!-- Upload zone -->
    <div class="upload-zone" onclick="showModal({type:'add-evidence'})" style="margin-bottom:20px">
      <div class="upload-icon">☁️</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Drag & drop files here, or click to browse</div>
      <div style="font-size:12px">Supported: PDF, PNG, JPG, XLSX, DOCX, CSV · Max 50MB</div>
    </div>
    ${s.evidence.length===0?`<div class="empty-state"><div class="empty-icon">📁</div><h3>No evidence uploaded</h3><p>Upload your first evidence file.</p></div>`:
    `<div class="evidence-grid">
      ${s.evidence.map(e=>{
        const linked = s.controls.find(c=>c.id===e.linkedTo||c.frameworkRef===e.linkedTo);
        return `<div class="evidence-card">
          <div class="evidence-icon">${typeIcon(e.type)}</div>
          <div class="evidence-name">${e.name}</div>
          <div class="evidence-meta">${e.type} · ${mimeLabel(e.mime)} · ${e.size}</div>
          <div class="evidence-meta">Uploaded by ${e.uploadedBy}</div>
          <div class="evidence-meta">${e.uploadedAt}</div>
          ${linked?`<div style="margin-top:4px"><span class="badge badge-info" style="font-size:10px">🔒 ${linked.name}</span></div>`:''}

            <button class="btn btn-secondary btn-xs" onclick="deleteRecord('evidence','${e.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

// SOA VIEW

function renderSoa() {
  const s = store();
  const applicable = s.soa.filter(e=>e.applicable).length;
  const complete = s.soa.filter(e=>e.status==='Complete').length;
  const pct = s.soa.length > 0 ? Math.round(complete/s.soa.length*100) : 0;
  const stBadge = st => ({Complete:'badge-success','In Progress':'badge-warning',Planned:'badge-gray'}[st]||'badge-gray');

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Statement of Applicability (SoA)</h2>
        <p>ISO 27001 Annex A — ${s.soa.length} controls assessed · ${applicable} applicable · ${pct}% complete</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-soa'})">+ Add Entry</button>
    </div>
    <!-- Progress -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:24px">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
            <span style="color:var(--text-secondary)">SoA Completion</span>
            <span style="color:var(--accent);font-weight:600">${pct}%</span>
          </div>
          <div class="progress-bar" style="height:8px">
            <div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div>
          </div>
        </div>
        <div style="display:flex;gap:20px;flex-shrink:0">
          <div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--green)">${applicable}</div><div style="font-size:11px;color:var(--text-muted)">Applicable</div></div>
          <div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-muted)">${s.soa.length-applicable}</div><div style="font-size:11px;color:var(--text-muted)">Excluded</div></div>
          <div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--accent)">${complete}</div><div style="font-size:11px;color:var(--text-muted)">Complete</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Control Ref</th><th>Control Name</th><th>Applicable</th><th>Justification</th><th>Measures</th><th>Evidence</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${s.soa.map(entry => {
              const ev = s.evidence.find(e=>e.id===entry.evidence);
              return `<tr class="${entry.applicable?'soa-row-applicable':'soa-row-excluded'}">
                <td class="td-mono">${entry.controlRef}</td>
                <td class="td-primary">${entry.controlName}</td>
                <td><span class="badge ${entry.applicable?'badge-success':'badge-gray'}">${entry.applicable?'Yes':'No'}</span></td>
                <td style="font-size:12px;color:var(--text-secondary);max-width:200px">${entry.justification}</td>
                <td style="font-size:12px;color:var(--text-secondary);max-width:160px">${entry.measures||'—'}</td>
                <td>${ev?`<span class="badge badge-info" style="font-size:10px">📁 ${ev.name.slice(0,20)}…</span>`:'<span style="color:var(--text-muted);font-size:12px">—</span>'}</td>
                <td><span class="badge ${stBadge(entry.status)}">${entry.status}</span></td>
                <td><div class="action-row">
                  <button class="btn btn-secondary btn-xs" onclick="showModal({type:'edit-soa',id:'${entry.id}'})">Edit</button>
                  <button class="btn btn-secondary btn-xs" onclick="deleteRecord('soa','${entry.id}')">✕</button>

            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

    <div class="grid grid-4" style="margin-bottom:20px">

        <div class="metric-icon blue">💡</div>
        <div class="metric-value">${s.resilience.length}</div>
        <div class="metric-label">Services Assessed</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon red">⚡</div>

      <div class="metric-card">

    </div>

          </div>
          ${asset?`<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Asset: ${asset.name}</div>`:''}
          <div class="rto-rpo">
            <div class="rto-rpo-item">
              <div class="val">${b.rto}</div>
              <div class="lbl">RTO</div>
            </div>
            <div class="rto-rpo-item">
              <div class="val">${b.rpo}</div>
              <div class="lbl">RPO</div>
            </div>
            <div class="rto-rpo-item">
              <div class="val">${b.maxTolerance}</div>
              <div class="lbl">Max Outage</div>
            </div>
          </div>
          ${deps.length>0?`<div style="margin-top:10px;font-size:12px">
            <span style="color:var(--text-muted)">Dependencies: </span>
            ${deps.map(d=>`<span class="badge badge-gray">${d.name}</span>`).join(' ')}
          </div>`:''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
            <span style="font-size:11px;color:var(--text-muted)">Last reviewed: ${b.lastReviewed}</span>
            <span class="badge ${b.status==='Documented'?'badge-success':'badge-warning'}">${b.status}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// INCIDENTS VIEW

function renderIncidents() {
  const s = store();
  const sevBadge = sv => ({Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[sv]||'badge-gray');
  const stBadge = st => ({Open:'badge-critical',Investigating:'badge-high',Mitigated:'badge-warning','Resolved':'badge-success'}[st]||'badge-gray');
  const dotColor = sv => ({Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'}[sv]||'#8b98b5');

  const filter = filterStates.incidents || 'All';
  let incidents = s.incidents;
  if (filter !== 'All') incidents = incidents.filter(i => i.status === filter);
  if (searchQuery) incidents = incidents.filter(i=>i.title.toLowerCase().includes(searchQuery.toLowerCase()));

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Incident Management</h2>
        <p>${s.incidents.length} incidents · ${s.incidents.filter(i=>i.status!=='Resolved'&&i.status!=='Mitigated').length} active</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-incident'})">+ Log Incident</button>
    </div>
    <div class="filter-bar">
      ${['All','Open','Investigating','Mitigated','Resolved'].map(t=>`<div class="filter-chip ${filter===t?'active':''}" onclick="filterStates.incidents='${t}';render()">${t}</div>`).join('')}
    </div>
    <div class="grid grid-2" style="gap:16px">
      ${incidents.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🚨</div><h3>No incidents found</h3></div></div>`:
      incidents.map(inc=>{
        const affectedAssets = s.assets.filter(a=>inc.affectedAssets&&inc.affectedAssets.includes(a.id));
        const linkedRisks = s.risks.filter(r=>inc.linkedRisks&&inc.linkedRisks.includes(r.id));
        return `<div class="card" style="border-left:3px solid ${dotColor(inc.severity)}">
          <div class="card-header">
            <div class="card-title"><span class="severity-dot dot-${inc.severity.toLowerCase()}"></span>${inc.title}</div>
            <span class="badge ${stBadge(inc.status)}">${inc.status}</span>
          </div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">${inc.description}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:12px">
            <div><span style="color:var(--text-muted)">Date: </span>${inc.date}</div>
            <div><span style="color:var(--text-muted)">Severity: </span><span class="badge ${sevBadge(inc.severity)}">${inc.severity}</span></div>
            ${inc.rootCause?`<div style="grid-column:span 2"><span style="color:var(--text-muted)">Root Cause: </span>${inc.rootCause}</div>`:''}
          </div>
          ${inc.responseActions?`<div style="background:var(--bg-surface);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--accent)">
            <strong style="color:var(--text-secondary)">Response:</strong> ${inc.responseActions}
          </div>`:''}
          ${inc.lessonsLearned?`<div style="background:var(--green-dim);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--green)">
            <strong style="color:var(--green)">Lessons Learned:</strong> ${inc.lessonsLearned}
          </div>`:''}
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);margin-bottom:12px">
            ${affectedAssets.length>0?`<span>🖥️ ${affectedAssets.map(a=>a.name).join(', ')}</span>`:''}
            ${linkedRisks.length>0?`<span>⚠️ ${linkedRisks.map(r=>r.id).join(', ')}</span>`:''}
          </div>
          <div class="action-row">
            <button class="btn btn-secondary btn-sm" onclick="showModal({type:'edit-incident',id:'${inc.id}'})">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteRecord('incidents','${inc.id}')">Delete</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function markGuideVisit(flag){
  if(!guideState.active||!guideState.moduleId)return;
  var l=getLearning();
  if(!l.progress[guideState.moduleId])l.progress[guideState.moduleId]={completedSteps:[],started:true};
  l.progress[guideState.moduleId][flag]=true;
  saveLearning(l);
  checkGuideStepValidation();
}
function currentStepDef(){
  if(!guideState.active||!guideState.moduleId)return null;
  var d=STEP_DEFS[guideState.moduleId];
  return d?d[guideState.stepIndex]||null:null;
}
function launchGuide(moduleId){
  var s=store(),l=getLearning();
  if(!l.progress[moduleId])l.progress[moduleId]={completedSteps:[],started:true};
  var prog=l.progress[moduleId];
  prog._baseAssets=s.assets.length;prog._baseRisks=s.risks.length;prog._baseControls=s.controls.length;
  prog._baseEvidence=s.evidence.length;prog._baseAudits=s.audits.length;prog._baseSoa=s.soa.length;
  prog._baseSoaApplicable=s.soa.filter(function(e){return e.applicable;}).length;
  prog._baseCritical=s.incidents.filter(function(i){return i.severity==='Critical';}).length;
  prog._baseHigh=s.incidents.filter(function(i){return i.severity==='High';}).length;
  prog._baseVendors=s.vendors.length;prog._baseBia=s.resilience.length;
  prog._baseIsoControls=s.controls.filter(function(c){return c.framework==='ISO 27001';}).length;
  prog._baseSocControls=s.controls.filter(function(c){return c.framework==='SOC 2';}).length;
  prog._basePciControls=s.controls.filter(function(c){return c.framework==='PCI DSS';}).length;
  saveLearning(l);
  var defs=STEP_DEFS[moduleId]||[],cs=(l.progress[moduleId]||{}).completedSteps||[],first=0;
  for(var i=0;i<defs.length;i++){if(cs.indexOf(i)!==-1)first=i+1;else break;}
  guideState.active=true;guideState.moduleId=moduleId;
  guideState.stepIndex=Math.min(first,defs.length-1);
  guideState.panelOpen=true;guideState.completedOverlay=false;saveGuideState();
  var step=defs[guideState.stepIndex];
  if(step&&step.view)navigate(step.view);else render();
}
function guideAdvance(){
  if(!guideState.active)return;
  var defs=STEP_DEFS[guideState.moduleId]||[],l=getLearning();
  if(!l.progress[guideState.moduleId])l.progress[guideState.moduleId]={completedSteps:[],started:true};
  var cs=l.progress[guideState.moduleId].completedSteps;
  if(cs.indexOf(guideState.stepIndex)===-1)cs.push(guideState.stepIndex);
  saveLearning(l);
  if(guideState.stepIndex<defs.length-1){
    guideState.stepIndex++;saveGuideState();
    var ns=defs[guideState.stepIndex];if(ns&&ns.view)navigate(ns.view);else render();
  }else{guideState.completedOverlay=true;saveGuideState();render();}
}
function guideBack(){if(!guideState.active||guideState.stepIndex<=0)return;guideState.stepIndex--;saveGuideState();var s=STEP_DEFS[guideState.moduleId]&&STEP_DEFS[guideState.moduleId][guideState.stepIndex];if(s&&s.view)navigate(s.view);else render();}
function guideSkipStep(){guideAdvance();}
function guideExit(){guideState.active=false;guideState.completedOverlay=false;saveGuideState();navigate('learning');}
function guideTogglePanel(){guideState.panelOpen=!guideState.panelOpen;saveGuideState();var p2=document.getElementById('guide-panel'),t=document.getElementById('guide-panel-toggle');if(p2)p2.classList.toggle('open',guideState.panelOpen);if(t)t.classList.toggle('panel-open',guideState.panelOpen);}
function guideGoToStep(idx){var d=STEP_DEFS[guideState.moduleId]||[];if(idx<0||idx>=d.length)return;guideState.stepIndex=idx;saveGuideState();var s=d[idx];if(s&&s.view)navigate(s.view);else render();}
function checkGuideStepValidation(){
  if(!guideState.active||guideState.completedOverlay)return;
  var step=currentStepDef();if(!step||!step.validates)return;
  var s=store(),l=getLearning(),prog=(l.progress[guideState.moduleId]||{});
  if(step.validates(s,prog)){showToast('Step complete!');setTimeout(guideAdvance,700);}
}
function renderGuideBanner(){
  if(!guideState.active||!guideState.moduleId)return'';
  var defs=STEP_DEFS[guideState.moduleId]||[];if(!defs.length)return'';
  var step=defs[guideState.stepIndex];if(!step)return'';
  var l=getLearning(),cs=(l.progress[guideState.moduleId]||{}).completedSteps||[];
  var pct=Math.round(cs.length/defs.length*100);
  var allMods=LEARNING_DATA.missions.concat(LEARNING_DATA.scenarios).concat(LEARNING_DATA.projects);
  var mod=allMods.filter(function(m){return m.id===guideState.moduleId;})[0];
  var dots=defs.map(function(d,i){var cls=cs.indexOf(i)!==-1?'done':i===guideState.stepIndex?'active':'';return'<span class="guide-dot '+cls+'" onclick="guideGoToStep('+i+')" title="Step '+(i+1)+'" style="cursor:pointer"></span>';}).join('');
  var hint=step.hint?'<div class="guide-banner-sub">'+step.hint+'</div>':'';
  var actFn=step.action?step.action.toString().replace(/\\/g,'\\\\').replace(/"/g,'&quot;'):'';
  return'<div class="guide-banner">'
    +'<div class="guide-banner-icon">'+(step.icon||'&#x1F3AF;')+'</div>'
    +'<div class="guide-banner-body">'
      +'<div class="guide-banner-mission">&#x1F393; '+(mod?mod.title:'Guided Mission')+' &mdash; Step '+(guideState.stepIndex+1)+' of '+defs.length+'</div>'
      +'<div class="guide-banner-step">'+step.label+'</div>'+hint
    +'</div>'
    +'<div class="guide-banner-progress"><div class="guide-banner-dots">'+dots+'</div><span class="guide-banner-pct">'+pct+'%</span></div>'
    +'<div class="guide-banner-actions">'
      +(guideState.stepIndex>0?'<button class="guide-btn guide-btn-secondary" onclick="guideBack()">&larr; Back</button>':'')
      +(step.action?'<button class="guide-btn guide-btn-primary" onclick="('+actFn+')()">Go &rarr;</button>':'')
      +'<button class="guide-btn guide-btn-secondary" onclick="guideSkipStep()">Skip</button>'
      +'<button class="guide-btn guide-btn-secondary" onclick="guideExit()" title="Exit guide">&times;</button>'
    +'</div></div>';
}
function renderGuidePanel(){

function renderLearning() {
  var l = getLearning();
  var tab    = l.activeTab    || 'missions';
  var filter = l.activeFilter || 'All';

  var allItems = tab === 'missions'  ? LEARNING_DATA.missions
               : tab === 'scenarios' ? LEARNING_DATA.scenarios
               :                       LEARNING_DATA.projects;

  var filtered = filter === 'All'
    ? allItems
    : allItems.filter(function(m){ return m.category === filter; });

  var allCategories = ['All'].concat(
    Object.keys(
      [...LEARNING_DATA.missions, ...LEARNING_DATA.scenarios, ...LEARNING_DATA.projects]
        .reduce(function(acc,m){ acc[m.category]=1; return acc; }, {})
    )
  );

  var totalModules   = LEARNING_DATA.missions.length + LEARNING_DATA.scenarios.length + LEARNING_DATA.projects.length;
  var startedCount   = Object.keys(l.progress).filter(function(id){ return l.progress[id].started; }).length;
  var allMods        = LEARNING_DATA.missions.concat(LEARNING_DATA.scenarios).concat(LEARNING_DATA.projects);
  var completedCount = allMods.filter(function(m){
    var steps = m.steps || m.tasks || [];
    var prog  = getModuleProgress(m.id);
    return steps.length > 0 && prog.completedSteps.length >= steps.length;
  }).length;

  function fwTag(fw) {
    var cls = fw.toLowerCase().indexOf('iso')  !== -1 ? 'iso'
            : fw.toLowerCase().indexOf('soc')  !== -1 ? 'soc'
            : fw.toLowerCase().indexOf('pci')  !== -1 ? 'pci'
            : fw.toLowerCase().indexOf('nist') !== -1 ? 'nist' : '';
    return '<span class="lframework-tag ' + cls + '">' + fw + '</span>';
  }

  function diffClass(d) {
    return d === 'Beginner' ? 'badge-success' : d === 'Intermediate' ? 'badge-warning' : 'badge-critical';
  }

  function card(item) {
    var steps = item.steps || item.tasks || [];
    var prog  = getModuleProgress(item.id);
    var done  = prog.completedSteps || [];
    var pct   = steps.length ? Math.round(done.length / steps.length * 100) : 0;
    var complete = steps.length > 0 && done.length >= steps.length;
    var started  = prog.started || done.length > 0;
    var linkTarget = item.links ? item.links[0] : 'dashboard';
    var mid  = item.id;  // module id alias — safe for string concat

    var stepsHtml = steps.map(function(s) {
      var isDone = done.indexOf(s.id) !== -1;
      var markFn = "toggleLearningStep('" + mid + "'," + s.id + ")";
      return '<div class="lstep' + (isDone ? ' done' : '') + '">'
           + '<div class="lstep-num" onclick="' + markFn + '" style="cursor:pointer" title="Toggle step">'
           + (isDone ? '&#10003;' : s.id)
           + '</div>'
           + '<span style="cursor:pointer" onclick="' + markFn + '">' + s.label + '</span>'
           + '</div>';
    }).join('');

    var fwHtml      = item.frameworks ? '<div class="lproject-frameworks">' + item.frameworks.map(fwTag).join('') + '</div>' : '';
    var linksHtml   = item.links      ? '<span>\uD83D\uDD17 ' + item.links.join(' \u00B7 ') + '</span>' : '';
    var companyHtml = item.company    ? '<strong>' + item.company + ' \u00B7 ' + item.industry + '</strong>' : '';

    var resetFn  = "resetModuleProgress('" + mid + "')";
    var hasGuideDefs = typeof STEP_DEFS !== 'undefined' && STEP_DEFS[mid] && STEP_DEFS[mid].length > 0;
    var startFn  = complete ? ("navigate('" + linkTarget + "')") : hasGuideDefs ? ("launchGuide('" + mid + "')") : ("startModule('" + mid + "')");
    var resetBtn = started  ? '<button class="btn btn-xs btn-secondary" onclick="' + resetFn + '" title="Reset progress">\u21BA</button>' : '';
    var startLbl = complete ? '\uD83D\uDD01 Review' : started ? '\u25B6 Continue' : '\u25B6 Start';
    var startBtn = '<button class="btn btn-sm ' + (complete ? 'btn-secondary' : 'btn-primary') + '" onclick="' + startFn + '">' + startLbl + '</button>';

    return '<div class="lcard' + (complete ? ' is-complete' : '') + '" data-diff="' + item.difficulty + '">'
         + (complete ? '<span class="lcomplete-badge">&#10003; Complete</span>' : '')
         + '<div class="lcard-header">'
           + '<div class="lcard-icon">' + item.icon + '</div>'
           + '<div class="lcard-meta">'
             + '<div class="lcard-title">' + item.title + '</div>'
             + '<div class="lcard-badges">'
               + '<span class="badge ' + diffClass(item.difficulty) + '">' + item.difficulty + '</span>'
               + '<span class="badge badge-info">' + item.category + '</span>'
             + '</div>'
           + '</div>'
         + '</div>'
         + '<p class="lcard-desc">' + item.description + '</p>'
         + fwHtml
         + '<div class="lsteps">' + stepsHtml + '</div>'
         + '<div class="lprogress">'
           + '<div class="lprogress-row">'
             + '<span class="lprogress-label">' + done.length + ' / ' + steps.length + ' steps complete</span>'
             + '<span class="lprogress-pct">' + pct + '%</span>'
           + '</div>'
           + '<div class="lprogress-track"><div class="lprogress-fill' + (complete ? ' green' : '') + '" style="width:' + pct + '%"></div></div>'
         + '</div>'
         + '<div class="lcard-footer">'
           + '<div class="lcard-footer-meta">'
             + '<span>\u23F1 ' + item.estimatedTime + '</span>'
             + companyHtml
             + linksHtml
           + '</div>'
           + '<div style="display:flex;gap:6px;align-items:center">' + resetBtn + startBtn + '</div>'
         + '</div>'
         + '</div>';
  }

  var tabDesc = tab === 'missions'
    ? '<strong style="color:var(--text-primary)">\uD83D\uDCD6 Guided Missions</strong> \u2014 Step-by-step walkthroughs teaching core GRC workflows. Click any step to mark it complete as you work through the platform.'
    : tab === 'scenarios'
    ? '<strong style="color:var(--text-primary)">\uD83C\uDFAF Practice Scenarios</strong> \u2014 Simulated real-world GRC situations. Work through each step using the live platform features.'
    : '<strong style="color:var(--text-primary)">\uD83C\uDFD7 GRC Practice Projects</strong> \u2014 Enterprise-scale simulations representing real companies. Apply multiple frameworks across a full project lifecycle.';

  var tabBar = ['missions','scenarios','projects'].map(function(t){
    var labels = { missions:'\uD83D\uDDC2\uFE0F Guided Missions', scenarios:'\uD83C\uDFAF Practice Scenarios', projects:'\uD83C\uDFD7 GRC Practice Projects' };
    return '<button class="ltab' + (tab===t?' active':'') + '" role="tab" aria-selected="' + (tab===t) + '" onclick="setLearningTab(\'' + t + '\')">' + labels[t] + '</button>';
  }).join('');

  var filterBar = allCategories.map(function(cat){
    return '<span class="filter-chip' + (filter===cat?' active':'') + '" onclick="setLearningFilter(\'' + cat + '\')">' + cat + '</span>';
  }).join('');

  var cardsHtml = filtered.length === 0
    ? '<div class="lcard-empty"><div class="empty-icon">\uD83D\uDD0D</div><p>No modules match this filter.</p></div>'
    : filtered.map(card).join('');

  return '<div class="content-area">'
    + '<div class="learning-hero">'
      + '<div>'
        + '<h2>\uD83C\uDF93 Learning Mode</h2>'
        + '<p>Practice real-world GRC workflows in a safe sandbox. Work through guided missions, simulate operational scenarios, and tackle enterprise-scale projects \u2014 all inside the live platform.</p>'
      + '</div>'
      + '<div class="learning-hero-stats">'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + completedCount + '</div><div class="lhero-stat-label">Completed</div></div>'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + startedCount   + '</div><div class="lhero-stat-label">In Progress</div></div>'
        + '<div class="lhero-stat"><div class="lhero-stat-val">' + totalModules   + '</div><div class="lhero-stat-label">Total Modules</div></div>'
      + '</div>'
    + '</div>'
    + '<div class="ltab-bar" role="tablist" aria-label="Learning sections">' + tabBar + '</div>'
    + '<div style="margin-bottom:16px;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;color:var(--text-secondary)">' + tabDesc + '</div>'
    + '<div class="lfilter-bar"><span style="font-size:12px;color:var(--text-muted);margin-right:4px">Filter:</span>' + filterBar + '</div>'
    + '<div class="lcard-grid">' + cardsHtml + '</div>'
    + '</div>';
}
