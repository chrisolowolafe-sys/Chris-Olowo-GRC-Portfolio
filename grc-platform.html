          <select class="form-control" id="f-type">
            ${['Policy','Screenshot','Report','Config','Certificate','Other'].map(t=>`<option ${(e.type||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Linked To (Control)</label>
          <select class="form-control" id="f-linkedTo">
            <option value="">— None —</option>
            ${s.controls.map(c=>`<option value="${c.id}" ${e.linkedTo===c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">File Size</label><input class="form-control" id="f-size" value="${e.size||''}" placeholder="142 KB"/></div>
        <div class="form-group"><label class="form-label">Uploaded By</label><input class="form-control" id="f-uploadedBy" value="${e.uploadedBy||'Chris Olowo'}"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEvidence('${isEdit?e.id:''}')">${isEdit?'Save':'Upload Evidence'}</button>
      </div>`;
  }

  else if (modalState.type === 'add-incident' || modalState.type === 'edit-incident') {
    const isEdit = modalState.type === 'edit-incident';
    const inc = isEdit ? s.incidents.find(x=>x.id===modalState.id) : {};
    title = isEdit ? 'Edit Incident' : 'Log New Incident';
    content = `
      <div class="form-group"><label class="form-label">Title *</label><input class="form-control" id="f-title" value="${inc.title||''}" placeholder="Brief incident title"/></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="f-description">${inc.description||''}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Severity</label>
          <select class="form-control" id="f-severity">
            ${['Low','Medium','High','Critical'].map(t=>`<option ${(inc.severity||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            ${['Open','Investigating','Mitigated','Resolved'].map(t=>`<option ${(inc.status||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date</label><input class="form-control" type="date" id="f-date" value="${inc.date||new Date().toISOString().slice(0,10)}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Root Cause</label><input class="form-control" id="f-rootCause" value="${inc.rootCause||''}"/></div>
      <div class="form-group"><label class="form-label">Response Actions</label><textarea class="form-control" id="f-responseActions">${inc.responseActions||''}</textarea></div>
      <div class="form-group"><label class="form-label">Lessons Learned</label><textarea class="form-control" id="f-lessonsLearned">${inc.lessonsLearned||''}</textarea></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveIncident('${isEdit?inc.id:''}')">${isEdit?'Save Changes':'Log Incident'}</button>
      </div>`;
  }

  else if (modalState.type === 'add-soa' || modalState.type === 'edit-soa') {
    const isEdit = modalState.type === 'edit-soa';
    const e = isEdit ? s.soa.find(x=>x.id===modalState.id) : {};
    title = isEdit ? 'Edit SoA Entry' : 'Add SoA Entry';
    content = `
      <div class="form-row">
        <div class="form-group"><label class="form-label">Control Ref *</label><input class="form-control" id="f-controlRef" value="${e.controlRef||''}" placeholder="ISO-5.1"/></div>
        <div class="form-group"><label class="form-label">Control Name *</label><input class="form-control" id="f-controlName" value="${e.controlName||''}" placeholder="Security policies"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Applicable</label>
          <select class="form-control" id="f-applicable">
            <option value="true" ${e.applicable!==false?'selected':''}>Yes</option>
            <option value="false" ${e.applicable===false?'selected':''}>No</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            ${['Planned','In Progress','Complete'].map(t=>`<option ${(e.status||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Justification</label><textarea class="form-control" id="f-justification">${e.justification||''}</textarea></div>
      <div class="form-group"><label class="form-label">Measures</label><textarea class="form-control" id="f-measures">${e.measures||''}</textarea></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSoa('${isEdit?e.id:''}')">${isEdit?'Save Changes':'Add Entry'}</button>
      </div>`;
  }

  else if (modalState.type === 'add-control' || modalState.type === 'edit-control') {
    const isEdit = modalState.type === 'edit-control';
    const c = isEdit ? s.controls.find(x=>x.id===modalState.id) : {};
    title = isEdit ? 'Edit Control' : 'Add Control';
    content = `
      <div class="form-group"><label class="form-label">Name *</label><input class="form-control" id="f-name" value="${c.name||''}" placeholder="Control name"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Framework</label>
          <select class="form-control" id="f-framework">
            ${['ISO 27001','NIST CSF','SOC 2','GDPR','CIS','HIPAA','Custom'].map(f=>`<option ${(c.framework||'')==f?'selected':''}>${f}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            ${['Planned','In Progress','Implemented'].map(t=>`<option ${(c.status||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Owner</label><input class="form-control" id="f-owner" value="${c.owner||''}"/></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="f-description">${c.description||''}</textarea></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveControl('${isEdit?c.id:''}')">${isEdit?'Save Changes':'Add Control'}</button>
      </div>`;
  }

  else if (modalState.type === 'add-vendor' || modalState.type === 'edit-vendor') {
    const isEdit = modalState.type === 'edit-vendor';
    const v = isEdit ? s.vendors.find(x=>x.id===modalState.id) : {};
    title = isEdit ? 'Edit Vendor' : 'Add Vendor';
    content = `
      <div class="form-group"><label class="form-label">Vendor Name *</label><input class="form-control" id="f-name" value="${v.name||''}"/></div>
      <div class="form-group"><label class="form-label">Service</label><input class="form-control" id="f-service" value="${v.service||''}"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Risk Rating</label>
          <select class="form-control" id="f-riskRating">
            ${['Low','Medium','High'].map(t=>`<option ${(v.riskRating||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            ${['Compliant','Under Review','Remediation Required','Non-Compliant'].map(t=>`<option ${(v.status||'')==t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Contact Email</label><input class="form-control" id="f-contact" value="${v.contact||''}"/></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveVendor('${isEdit?v.id:''}')">${isEdit?'Save Changes':'Add Vendor'}</button>
      </div>`;
  }

  else if (modalState.type === 'add-bia') {
    title = 'Add BIA Entry';
    content = `
      <div class="form-group"><label class="form-label">Service Name *</label><input class="form-control" id="f-service" placeholder="Customer Database"/></div>
      <div class="form-group"><label class="form-label">Asset</label>
        <select class="form-control" id="f-assetId">
          <option value="">— Select Asset —</option>
          ${s.assets.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">RTO</label><input class="form-control" id="f-rto" placeholder="4h"/></div>
        <div class="form-group"><label class="form-label">RPO</label><input class="form-control" id="f-rpo" placeholder="1h"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Criticality</label>
          <select class="form-control" id="f-criticality">
            ${['Low','Medium','High','Critical'].map(t=>`<option>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Max Tolerable Outage</label><input class="form-control" id="f-maxTolerance" placeholder="4 hours"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBia()">Add BIA Entry</button>
      </div>`;
  }

  else if (modalState.type === 'audit-detail') {
    const a = s.audits.find(x=>x.id===modalState.id);
    if (!a) return '';
    title = `Audit: ${a.name}`;
    const linkedControls = s.controls.filter(c=>a.controls&&a.controls.includes(c.id));
    const linkedEvidence = s.evidence.filter(e=>a.evidence&&a.evidence.includes(e.id));
    content = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px">
        <div><span style="color:var(--text-muted)">Framework</span><br/><strong>${a.framework}</strong></div>
        <div><span style="color:var(--text-muted)">Lead</span><br/><strong>${a.lead}</strong></div>
        <div><span style="color:var(--text-muted)">Start</span><br/><strong>${a.startDate}</strong></div>
        <div><span style="color:var(--text-muted)">End</span><br/><strong>${a.endDate}</strong></div>
      </div>
      ${a.findings?`<div style="background:var(--bg-surface);border-radius:var(--radius);padding:12px;font-size:13px;margin-bottom:16px;border-left:3px solid var(--orange)"><strong>Findings:</strong><br/>${a.findings}</div>`:''}
      <div class="card-title" style="margin-bottom:8px">Linked Controls (${linkedControls.length})</div>
      ${linkedControls.length>0?`<div style="margin-bottom:16px">${linkedControls.map(c=>`<span class="badge badge-info" style="margin:2px">${c.name}</span>`).join('')}</div>`:
      '<div style="color:var(--text-muted);font-size:12px;margin-bottom:16px">No controls linked</div>'}
      <div class="card-title" style="margin-bottom:8px">Evidence (${linkedEvidence.length})</div>
      ${linkedEvidence.length>0?linkedEvidence.map(e=>`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">📄 ${e.name} · ${e.uploadedAt}</div>`).join(''):
      '<div style="color:var(--text-muted);font-size:12px">No evidence linked</div>'}
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>`;
  }

  if (!content) return '';

  return `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        ${content}
      </div>
    </div>`;
}

// =============================================
// CRUD OPERATIONS
// =============================================
function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function saveAsset(editId) {
  const name = val('f-name');
  if(!name) { alert('Name is required'); return; }
  updateStore(s => {
    const data = {name,owner:val('f-owner'),type:val('f-type'),status:val('f-status'),classification:val('f-classification'),criticality:val('f-criticality'),description:val('f-description')};
    if(editId) { const i=s.assets.findIndex(a=>a.id===editId); if(i>=0) Object.assign(s.assets[i],data); }
    else s.assets.push({id:genId('A'),risks:[],controls:[],...data});
  });
  closeModal();
  showToast(editId?'Asset updated':'Asset added');
}

function saveRisk(editId) {
  const desc = val('f-description');
  if(!desc) { alert('Description is required'); return; }
  const l = parseInt(val('f-likelihood')||1);
  const i = parseInt(val('f-impact')||1);
  const sc = l*i;
  const cat = riskCategory(sc);
  updateStore(s => {
    const data = {description:desc,assetId:val('f-assetId'),owner:val('f-owner'),likelihood:l,impact:i,score:sc,category:cat,status:val('f-status'),mitigationPlan:val('f-mitigation'),controlIds:[]};
    if(editId) { const idx=s.risks.findIndex(r=>r.id===editId); if(idx>=0) Object.assign(s.risks[idx],data); }
    else s.risks.push({id:genId('R'),createdAt:new Date().toISOString().slice(0,10),...data});
  });
  closeModal();
  showToast(editId?'Risk updated':'Risk added to register');
}

function saveAudit(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }
  updateStore(s => {
    const data = {name,framework:val('f-framework'),status:val('f-status'),lead:val('f-lead'),startDate:val('f-startDate'),endDate:val('f-endDate'),findings:val('f-findings')};
    if(editId) { const i=s.audits.findIndex(a=>a.id===editId); if(i>=0) Object.assign(s.audits[i],data); }
    else s.audits.push({id:genId('AUD'),controls:[],evidence:[],createdAt:new Date().toISOString().slice(0,10),...data});
  });
  closeModal();
  showToast(editId?'Audit updated':'Audit created');
}

function saveEvidence(editId) {
  const name = val('f-name');
  if(!name) { alert('File name required'); return; }
  updateStore(s => {
    const data = {name,type:val('f-type'),linkedTo:val('f-linkedTo'),size:val('f-size')||'—',mime:'application/octet-stream',uploadedBy:val('f-uploadedBy')||'Chris Olowo',uploadedAt:new Date().toISOString().slice(0,10),checksum:'sha256:pending'};
    if(editId) { const i=s.evidence.findIndex(e=>e.id===editId); if(i>=0) Object.assign(s.evidence[i],data); }
    else s.evidence.push({id:genId('EV'),...data});
  });
  closeModal();
  showToast(editId?'Evidence updated':'Evidence uploaded');
}

function saveIncident(editId) {
  const title = val('f-title');
  if(!title) { alert('Title required'); return; }
  updateStore(s => {
    const data = {title,description:val('f-description'),severity:val('f-severity'),status:val('f-status'),date:val('f-date'),rootCause:val('f-rootCause'),responseActions:val('f-responseActions'),lessonsLearned:val('f-lessonsLearned'),affectedAssets:[],linkedRisks:[],linkedControls:[]};
    if(editId) { const i=s.incidents.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.incidents[i],data); }
    else s.incidents.push({id:genId('INC'),...data});
  });
  closeModal();
  showToast(editId?'Incident updated':'Incident logged');
}

function saveSoa(editId) {
  const ref = val('f-controlRef'); const name = val('f-controlName');
  if(!ref||!name) { alert('Control Ref and Name required'); return; }
  updateStore(s => {
    const data = {controlRef:ref,controlName:name,applicable:val('f-applicable')==='true',justification:val('f-justification'),measures:val('f-measures'),status:val('f-status'),evidence:''};
    if(editId) { const i=s.soa.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.soa[i],data); }
    else s.soa.push({id:genId('SOA'),...data});
  });
  closeModal();
  showToast(editId?'SoA entry updated':'SoA entry added');
}

function saveControl(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }
  updateStore(s => {
    const data = {name,framework:val('f-framework'),status:val('f-status'),owner:val('f-owner'),description:val('f-description'),frameworkRef:'',risks:[],evidence:[]};
    if(editId) { const i=s.controls.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.controls[i],data); }
    else s.controls.push({id:genId('CTRL'),...data});
  });
  closeModal();
  showToast(editId?'Control updated':'Control added');
}

function saveVendor(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }
  updateStore(s => {
    const data = {name,service:val('f-service'),riskRating:val('f-riskRating'),status:val('f-status'),contact:val('f-contact'),lastAssessed:new Date().toISOString().slice(0,10)};
    if(editId) { const i=s.vendors.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.vendors[i],data); }
    else s.vendors.push({id:genId('V'),...data});
  });
  closeModal();
  showToast(editId?'Vendor updated':'Vendor added');
}

function saveBia() {
  const svc = val('f-service');
  if(!svc) { alert('Service name required'); return; }
  updateStore(s => {
    s.resilience.push({id:genId('BIA'),service:svc,assetId:val('f-assetId'),rto:val('f-rto'),rpo:val('f-rpo'),criticality:val('f-criticality'),maxTolerance:val('f-maxTolerance'),dependencies:[],annualCost:'',status:'Documented',lastReviewed:new Date().toISOString().slice(0,10)});
  });
  closeModal();
  showToast('BIA entry added');
}

function deleteRecord(entity, id) {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  updateStore(s => { s[entity] = s[entity].filter(x=>x.id!==id); });
  showToast('Record deleted');
}

function updateScorePreview() {
  const l = parseInt(document.getElementById('f-likelihood')?.value||1);
  const i = parseInt(document.getElementById('f-impact')?.value||1);
  const sc = l*i;
  const cat = riskCategory(sc);
  const sv = document.getElementById('score-val');
  const cv = document.getElementById('cat-val');
  if(sv) sv.textContent = sc;
  if(cv) { cv.textContent = cat; cv.className='badge badge-'+cat.toLowerCase(); }
}

function resetToSeed() {
  if (!confirm('Reset all data to seed? This will overwrite your current data.')) return;
  saveStore(SEED_DATA);
  render();
  showToast('Data reset to demo seed');
}

// =============================================
// MAIN RENDER
// =============================================
function render() {
  const viewRenderers = {
    dashboard: renderDashboard,
    assets: renderAssets,
    vendors: renderVendors,
    risks: renderRisks,
    matrix: renderMatrix,
    frameworks: renderFrameworks,
    controls: renderControls,
    audits: renderAudits,
    evidence: renderEvidence,
    soa: renderSoa,
    resilience: renderResilience,
    incidents: renderIncidents,
    learning: renderLearning,
  };

  const renderer = viewRenderers[currentView] || renderDashboard;
  const _wrappedRenderer = function() {
    var raw = renderer();
    if (guideState && guideState.active && currentView !== 'learning') {
      var banner = renderGuideBanner();
      var insertPt = raw.indexOf('<div class="content-area"');
      if (insertPt !== -1) { var closeTag = raw.indexOf('>', insertPt)+1; raw = raw.slice(0,closeTag)+banner+raw.slice(closeTag); }
    }
    return raw;
  };
  const appEl = document.getElementById('app');

  appEl.innerHTML = `
    ${renderSidebar()}
    <div class="main-area">
      ${renderTopbar()}
      ${_wrappedRenderer()}
    </div>
    ${renderModal()}
    ${renderGuidePanel()}
    ${renderGuideComplete()}
  `;
}

// Apply sidebar state after every render (class must survive innerHTML replacement)
const _origRender = render;
render = function() { _origRender(); applySidebarState(); };

// Add scrim + floating peek button to body once (lives outside #app)
(function() {
  if (!document.getElementById('platScrim')) {
    const sc = document.createElement('div');
    sc.id = 'platScrim';
    sc.setAttribute('aria-hidden', 'true');
    sc.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);z-index:200;cursor:pointer;display:none';
    sc.addEventListener('click', function() { sidebarMobileOpen = false; applySidebarState(); });
    document.body.insertBefore(sc, document.body.firstChild);
  }
  // Floating hamburger peek button — always visible, opens sidebar
  if (!document.getElementById('platPeekBtn')) {
    const pb = document.createElement('button');
    pb.id = 'platPeekBtn';
    pb.className = 'sidebar-peek-btn';
    pb.setAttribute('aria-label', 'Open navigation');
    pb.setAttribute('title', 'Open menu (or press Ctrl+\\)');
    pb.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
    pb.addEventListener('click', toggleSidebar);
    document.body.appendChild(pb);
  }
  // Esc closes sidebar
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && sidebarMobileOpen) { sidebarMobileOpen = false; applySidebarState(); }
  });
})();

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const gs = document.getElementById('global-search');
    if (gs) gs.focus();
  }
  if (e.key === 'Escape' && modalState) closeModal();
});

// Boot
initStore();
render();
</script>
