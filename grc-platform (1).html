<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise GRC Platform | Chris Olowo, PMP®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* =============================================
       DESIGN SYSTEM — Dark Industrial Precision
    ============================================= */
    :root {
      --bg-void: #080c14;
      --bg-base: #0d1117;
      --bg-elevated: #161b27;
      --bg-surface: #1c2333;
      --bg-hover: #212840;
      --border: rgba(99,120,180,0.18);
      --border-strong: rgba(99,120,180,0.35);
      --text-primary: #e8edf5;
      --text-secondary: #8b98b5;
      --text-muted: #556080;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --accent-hover: #6ba3ff;
      --green: #2ecc8a;
      --green-dim: rgba(46,204,138,0.12);
      --red: #f05252;
      --red-dim: rgba(240,82,82,0.12);
      --orange: #f5a623;
      --orange-dim: rgba(245,166,35,0.12);
      --purple: #9b6cff;
      --purple-dim: rgba(155,108,255,0.12);
      --yellow: #f5d020;
      --yellow-dim: rgba(245,208,32,0.12);
      --cyan: #22d3ee;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--font-body);
      background: var(--bg-void);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }
    /* =============================================
       LAYOUT
    ============================================= */
    #app { display: flex; height: 100vh; }
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 800; font-size: 14px; color: white;
      flex-shrink: 0;
    }
    .logo-text { overflow: hidden; }
    .logo-text h1 {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      color: var(--text-primary); white-space: nowrap;
    }
    .logo-text p { font-size: 11px; color: var(--text-muted); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); }
    .nav-group { margin-bottom: 20px; }
    .nav-group-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 0 20px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-item .nav-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--red-dim); color: var(--red);
      font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
    }
    .main-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg-void);
    }
    .topbar {
      height: 56px; min-height: 56px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; gap: 16px;
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-subtitle { font-size: 12px; color: var(--text-muted); margin-left: 2px; }
    .topbar-spacer { flex: 1; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      width: 240px;
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text-primary); font-family: var(--font-body);
      font-size: 13px; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      cursor: pointer;
    }
    .content-area { flex: 1; overflow-y: auto; padding: 24px; }
    .content-area::-webkit-scrollbar { width: 4px; }
    .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* =============================================
       COMMON COMPONENTS
    ============================================= */
    .page-header { margin-bottom: 24px; }
    .page-header h2 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
    }
    .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger { background: var(--red); color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-xs { padding: 2px 8px; font-size: 11px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .badge-critical { background: rgba(240,82,82,0.2); color: var(--red); }
    .badge-high { background: rgba(245,166,35,0.2); color: var(--orange); }
    .badge-medium { background: rgba(245,208,32,0.2); color: var(--yellow); }
    .badge-low { background: rgba(46,204,138,0.2); color: var(--green); }
    .badge-info { background: var(--accent-dim); color: var(--accent); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-success { background: var(--green-dim); color: var(--green); }
    .badge-warning { background: var(--orange-dim); color: var(--orange); }
    .badge-gray { background: rgba(139,152,181,0.15); color: var(--text-secondary); }
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 12px; }
    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left; white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      font-size: 13px; color: var(--text-secondary);
      border-bottom: 1px solid rgba(99,120,180,0.08);
      vertical-align: middle;
    }
    tr:hover td { background: var(--bg-hover); }
    tr:last-child td { border-bottom: none; }
    .td-primary { color: var(--text-primary); font-weight: 500; }
    .td-mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    /* Filter bar */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Metric cards */
    .metric-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .metric-card .metric-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .metric-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .metric-icon.blue { background: var(--accent-dim); color: var(--accent); }
    .metric-icon.red { background: var(--red-dim); color: var(--red); }
    .metric-icon.green { background: var(--green-dim); color: var(--green); }
    .metric-icon.orange { background: var(--orange-dim); color: var(--orange); }
    .metric-icon.purple { background: var(--purple-dim); color: var(--purple); }
    .metric-value {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--text-primary); line-height: 1;
    }
    .metric-label { font-size: 12px; color: var(--text-secondary); }
    .metric-trend { font-size: 11px; }
    .metric-trend.up { color: var(--red); }
    .metric-trend.down { color: var(--green); }
    .metric-trend.flat { color: var(--text-muted); }
    /* Section divider */
    .section-divider {
      height: 1px; background: var(--border);
      margin: 24px 0;
    }
    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }
    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(8,12,20,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 560px; max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-lg { width: 780px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 18px;
      cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .form-control {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: var(--font-body); font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    /* Progress */
    .progress-bar {
      height: 6px; background: var(--bg-surface);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-item {
      padding: 8px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    .tab-item:hover { color: var(--text-primary); }
    .tab-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    /* Severity dots */
    .severity-dot {
      width: 8px; height: 8px;
      border-radius: 50%; display: inline-block;
      margin-right: 6px; flex-shrink: 0;
    }
    .dot-critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot-high { background: var(--orange); }
    .dot-medium { background: var(--yellow); }
    .dot-low { background: var(--green); }
    /* =============================================
       DASHBOARD
    ============================================= */
    .health-ring {
      position: relative; width: 110px; height: 110px;
      flex-shrink: 0;
    }
    .health-ring canvas { position: absolute; inset: 0; }
    .health-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .health-ring-label .score {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }
    .health-ring-label .score-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .dashboard-bento {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }
    .bento-wide { grid-column: span 2; }
    .bento-tall { grid-row: span 2; }
    .risk-row-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(99,120,180,0.08);
    }
    .risk-row-item:last-child { border-bottom: none; }
    .risk-row-item .risk-name {
      flex: 1; font-size: 13px; color: var(--text-secondary);
    }
    .score-pill {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      min-width: 32px; text-align: center;
    }
    /* =============================================
       RISK MATRIX
    ============================================= */
    .risk-matrix-wrap { overflow-x: auto; padding-bottom: 8px; }
    .risk-matrix {
      display: grid;
      grid-template-columns: 40px repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr) 40px;
      gap: 4px;
      width: 100%; max-width: 640px;
      aspect-ratio: 1;
      margin: 0 auto;
    }
    .matrix-cell {
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      position: relative;
      cursor: default;
      transition: transform 0.1s;
      min-height: 60px;
    }
    .matrix-cell:hover { transform: scale(1.02); z-index: 1; }
    .cell-low { background: rgba(46,204,138,0.15); border: 1px solid rgba(46,204,138,0.3); }
    .cell-medium { background: rgba(245,208,32,0.15); border: 1px solid rgba(245,208,32,0.3); }
    .cell-high { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); }
    .cell-critical { background: rgba(240,82,82,0.15); border: 1px solid rgba(240,82,82,0.3); }
    .cell-label { color: var(--text-muted); font-size: 10px; writing-mode: vertical-rl; text-orientation: mixed; }
    .cell-label-h { color: var(--text-muted); font-size: 10px; }
    .risk-dot {
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white;
      cursor: pointer;
      transition: transform 0.15s;
      z-index: 2;
    }
    .risk-dot:hover { transform: scale(1.3); z-index: 10; }
    .risk-dot-tooltip {
      display: none;
      position: absolute;
      bottom: 130%; left: 50%; transform: translateX(-50%);
      background: var(--bg-void);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px 10px;
      white-space: nowrap;
      font-size: 11px; color: var(--text-primary);
      z-index: 20;
      pointer-events: none;
    }
    .risk-dot:hover .risk-dot-tooltip { display: block; }
    .matrix-axis-label {
      font-size: 11px; color: var(--text-muted);
      text-align: center;
    }
    .axis-title {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      text-align: center; margin-top: 8px;
    }
    /* =============================================
       FRAMEWORK LIBRARY
    ============================================= */
    .framework-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .framework-chip:hover { border-color: var(--accent); color: var(--accent); }
    .framework-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .control-row td:first-child { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    /* =============================================
       SCROLLBARS
    ============================================= */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    /* =============================================
       RESPONSIVE TWEAKS
    ============================================= */
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .dashboard-bento { grid-template-columns: 1fr 1fr; }
      .bento-wide { grid-column: span 2; }
    }
    @media (max-width: 800px) {
      .sidebar { display: none; }
    }
    /* =============================================
       INCIDENTS
    ============================================= */
    .timeline {
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute; left: 7px; top: 8px; bottom: 8px;
      width: 1px; background: var(--border);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 20px;
    }
    .timeline-dot {
      position: absolute; left: -24px; top: 4px;
      width: 15px; height: 15px;
      border-radius: 50%;
      border: 2px solid var(--bg-elevated);
    }
    .timeline-content {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .timeline-title { font-weight: 600; color: var(--text-primary); font-size: 13px; }
    .timeline-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    /* =============================================
       RESILIENCE / BIA
    ============================================= */
    .bia-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .bia-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

      padding: 10px;

      font-size: 18px; font-weight: 800;

      border: 1px solid var(--border);

      transition: border-color 0.15s;

    .evidence-name { font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .evidence-meta { font-size: 11px; color: var(--text-muted); }

      border: 2px dashed var(--border);

      padding: 32px;

      transition: all 0.15s;
      color: var(--text-muted);

      color: var(--accent);
      background: var(--accent-dim);

      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-elevated);
      border: 1px solid var(--green);

function getStore() {
  try {
    const raw = localStorage.getItem('grc_store_v2');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveStore(data) {
  localStorage.setItem('grc_store_v2', JSON.stringify(data));
}
function initStore() {
  if (!getStore()) saveStore(SEED_DATA);
}
function store() { return getStore() || SEED_DATA; }
function updateStore(fn) { const s = store(); fn(s); saveStore(s); render(); }

// ULID-like ID generator
function genId(prefix) {
  return prefix + '-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase();
}

function riskCategory(score) {
  if (score >= 17) return 'Critical';
  if (score >= 10) return 'High';
  if (score >= 5) return 'Medium';
  return 'Low';
}
function riskScore(l,i){ return l*i; }

// =============================================
// RENDER ENGINE
// =============================================
let currentView = 'dashboard';
let chartInstances = {};
let modalState = null;
let filterStates = {};
let searchQuery = '';

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = '✓ ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function navigate(view) {
  currentView = view;
  // Safe chart destroy — looks up live instances directly from canvas DOM elements
  // Prevents double-registration bug that causes infinite resize loop
  ['health-chart','risk-cat-chart','ctrl-chart'].forEach(id => {
    const canvas = document.getElementById(id);
    if (canvas) { const c = Chart.getChart(canvas); if (c) c.destroy(); }
  });
  chartInstances = {};
  render();
}

function showModal(state) { modalState = state; render(); }
function closeModal() { modalState = null; render(); }

function renderDashboard() {
  const s = store();
  const criticalRisks = s.risks.filter(r=>r.category==='Critical').length;
  const highRisks = s.risks.filter(r=>r.category==='High').length;
  const openRisks = s.risks.filter(r=>r.status==='Open').length;
  const implCtrl = s.controls.filter(c=>c.status==='Implemented').length;
  const ctrlEff = s.controls.length > 0 ? Math.round(implCtrl/s.controls.length*100) : 0;
  const riskScore_calc = Math.max(0, 100-(criticalRisks*20)-(highRisks*10));
  const health = Math.round((ctrlEff + riskScore_calc)/2);
  const openInc = s.incidents.filter(i=>i.status!=='Resolved'&&i.status!=='Mitigated').length;
  const topRisks = [...s.risks].sort((a,b)=>b.score-a.score).slice(0,6);
  const recentInc = [...s.incidents].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);

  const sev = (sev) => {
    const m = {Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'};
    return m[sev]||'badge-gray';
  };

  setTimeout(() => {
    // Health donut
    const ctx = document.getElementById('health-chart');
    if (ctx && !chartInstances['health']) {
      chartInstances['health'] = new Chart(ctx, {
        type:'doughnut',
        data:{datasets:[{data:[health,100-health],backgroundColor:['#4f8ef7','rgba(99,120,180,0.15)'],borderWidth:0,circumference:270,rotation:225}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},cutout:'80%',plugins:{legend:{display:false},tooltip:{enabled:false}}}
      });
    }
    // Risk by category bar
    const rc = document.getElementById('risk-cat-chart');
    if (rc && !chartInstances['risk-cat']) {
      const cats=['Low','Medium','High','Critical'];
      const counts = cats.map(c=>s.risks.filter(r=>r.category===c).length);
      chartInstances['risk-cat'] = new Chart(rc, {
        type:'bar',
        data:{labels:cats,datasets:[{data:counts,backgroundColor:['#2ecc8a','#f5d020','#f5a623','#f05252'],borderRadius:6,borderSkipped:false,maxBarThickness:48}]},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          animation:{duration:400},
          plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}},
          scales:{
            x:{grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5'}},
            y:{beginAtZero:true,grid:{color:'rgba(99,120,180,0.1)'},ticks:{color:'#8b98b5',stepSize:1,precision:0}}
          }
        }
      });
    }
    // Control status pie
    const csp = document.getElementById('ctrl-chart');
    if (csp && !chartInstances['ctrl']) {
      const statuses=['Implemented','In Progress','Planned'];
      const counts2 = statuses.map(st=>s.controls.filter(c=>c.status===st).length);
      chartInstances['ctrl'] = new Chart(csp, {
        type:'doughnut',
        data:{labels:statuses,datasets:[{data:counts2,backgroundColor:['#2ecc8a','#4f8ef7','#8b98b5'],borderWidth:0}]},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          animation:{duration:400},
          plugins:{
            legend:{position:'bottom',labels:{color:'#8b98b5',font:{size:11},padding:12}},
            tooltip:{backgroundColor:'rgba(10,15,30,0.95)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}
          },
          cutout:'65%'
        }
      });
    }
  }, 50);

  const scoreClass = s => {
    if(s>=17)return 'score-25'; if(s>=10)return 'score-16'; if(s>=5)return 'score-9'; return 'score-4';
  };

  return `
    <div class="content-area" id="dashboard">
      <!-- Metrics row -->
      <div class="grid grid-5" style="margin-bottom:20px">
        <div class="metric-card">
          <div class="metric-top">
            <div class="metric-icon blue">🖥️</div>
            <span class="metric-trend flat">Stable</span>
          </div>
          <div class="metric-value">${s.assets.length}</div>
          <div class="metric-label">Total Assets</div>
        </div>
        <div class="metric-card">
          <div class="metric-top">
            <div class="metric-icon red">⚠️</div>
            <span class="metric-trend up">+${criticalRisks} critical</span>
          </div>
          <div class="metric-value">${s.risks.length}</div>
          <div class="metric-label">Active Risks</div>
        </div>
        <div class="metric-card">
          <div class="metric-top">
            <div class="metric-icon green">🔒</div>
            <span class="metric-trend down">${ctrlEff}% effective</span>
          </div>
          <div class="metric-value">${s.controls.length}</div>
          <div class="metric-label">Controls</div>
        </div>

            <div class="metric-icon orange">🚨</div>

          </div>
          <div class="metric-value">${s.vendors.length}</div>

        </div>
      </div>

      <!-- Bento grid -->
      <div class="dashboard-bento">
        <!-- Health score -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">❤️ GRC Health Score</div>
            <span class="badge ${health>=80?'badge-success':health>=50?'badge-warning':'badge-critical'}">${health>=80?'Healthy':health>=50?'Fair':'Needs Attention'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:20px">
            <div class="health-ring">
              <canvas id="health-chart" width="110" height="110"></canvas>
              <div class="health-ring-label">
                <span class="score">${health}</span>

              </div>
            </div>
            <div style="flex:1">
              <div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px">
                  <span>Control Effectiveness</span><span>${ctrlEff}%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${ctrlEff}%;background:var(--green)"></div></div>
              </div>
              <div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px">
                  <span>Risk Score</span><span>${riskScore_calc}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${riskScore_calc}%;background:var(--accent)"></div></div>
              </div>

        <!-- Risk categories chart -->

          </div>
          <div style="position:relative;height:160px;width:100%;overflow:hidden"><canvas id="risk-cat-chart"></canvas></div>
        </div>

        <!-- Control status -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">🔒 Control Status</div>
          </div>
          <div style="position:relative;height:160px;width:100%;overflow:hidden"><canvas id="ctrl-chart"></canvas></div>

// RISKS VIEW

function renderRisks() {
  const s = store();
  let risks = s.risks;
  const filter = filterStates.risks || 'All';
  if (filter !== 'All') risks = risks.filter(r => r.category === filter);
  if (searchQuery) risks = risks.filter(r => r.description.toLowerCase().includes(searchQuery.toLowerCase()));
  risks = [...risks].sort((a,b)=>b.score-a.score);

  const catBadge = c => ({Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'}[c]||'badge-gray');
  const statusBadge = st => ({Open:'badge-critical','In Mitigation':'badge-warning',Mitigated:'badge-success'}[st]||'badge-gray');
  const scoreClass = s => { if(s>=17)return 'score-25'; if(s>=10)return 'score-16'; if(s>=5)return 'score-9'; return 'score-4'; };

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Risk Register</h2>
        <p>${s.risks.length} risks · ${s.risks.filter(r=>r.category==='Critical').length} critical · ${s.risks.filter(r=>r.status==='Open').length} open</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-risk'})">+ Add Risk</button>
    </div>
    <div class="filter-bar">
      ${['All','Critical','High','Medium','Low'].map(t=>`<div class="filter-chip ${filter===t?'active':''}" onclick="filterStates.risks='${t}';render()">${t}</div>`).join('')}
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Risk Description</th><th>Asset</th><th>Owner</th>
            <th>Likelihood</th><th>Impact</th><th>Score</th><th>Category</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${risks.length === 0 ? `<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">⚠️</div><h3>No risks found</h3><p>Add a risk to the register to get started.</p></div></td></tr>` :
            risks.map(r => {
              const asset = s.assets.find(a=>a.id===r.assetId);
              return `<tr>
                <td class="td-mono">${r.id}</td>
                <td class="td-primary" style="max-width:240px">${r.description}</td>
                <td style="font-size:12px">${asset?asset.name:'—'}</td>
                <td style="font-size:12px">${r.owner}</td>
                <td style="text-align:center;font-family:var(--font-mono)">${r.likelihood}</td>
                <td style="text-align:center;font-family:var(--font-mono)">${r.impact}</td>
                <td style="text-align:center"><span class="score-pill ${scoreClass(r.score)}">${r.score}</span></td>
                <td><span class="badge ${catBadge(r.category)}">${r.category}</span></td>
                <td><span class="badge ${statusBadge(r.status)}">${r.status}</span></td>
                <td><div class="action-row">
                  <button class="btn btn-secondary btn-xs" onclick="showModal({type:'edit-risk',id:'${r.id}'})">Edit</button>
                  <button class="btn btn-secondary btn-xs" onclick="deleteRecord('risks','${r.id}')">✕</button>
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// =============================================
// RISK MATRIX VIEW
// =============================================
function renderMatrix() {
  const s = store();
  // Build 5x5 grid (likelihood 1-5 row, impact 1-5 col)
  const getCellClass = (l,i) => {
    const score = l * i;
    if(score>=17) return 'cell-critical';
    if(score>=10) return 'cell-high';
    if(score>=5) return 'cell-medium';
    return 'cell-low';
  };

  const getCellLabel = (l,i) => {
    const score=l*i;
    if(score>=17) return 'Critical';
    if(score>=10) return 'High';
    if(score>=5) return 'Medium';
    return 'Low';
  };

  const getRisksAt = (l, i) => s.risks.filter(r => r.likelihood === l && r.impact === i);

  const dotColors = {Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'};

  let gridHtml = '';
  // Y axis labels + cells (likelihood 5 to 1 from top)
  for(let l=5; l>=1; l--) {
    // Y-axis label
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${l}</div>`;
    for(let i=1; i<=5; i++) {
      const risks = getRisksAt(l, i);
      const cls = getCellClass(l,i);
      const lbl = getCellLabel(l,i);
      gridHtml += `<div class="matrix-cell ${cls}" title="L${l} × I${i} = ${l*i} (${lbl})">
        <span style="position:absolute;top:4px;right:6px;font-size:9px;opacity:0.5">${l*i}</span>
        ${risks.map((r,idx)=>`
          <div class="risk-dot" style="background:${dotColors[r.category]};left:${20+idx*24}px;top:50%;transform:translateY(-50%)" title="${r.description}">
            ${r.id.replace('R-','')}
            <div class="risk-dot-tooltip">${r.description} (Score: ${r.score})</div>
          </div>`).join('')}
      </div>`;
    }
  }
  // X-axis row
  gridHtml += `<div></div>`;
  for(let i=1;i<=5;i++) {
    gridHtml += `<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${i}</div>`;
  }

  const legend = [
    {cls:'cell-critical',label:'Critical (17-25)'},
    {cls:'cell-high',label:'High (10-16)'},
    {cls:'cell-medium',label:'Medium (5-9)'},
    {cls:'cell-low',label:'Low (1-4)'},
  ];

  return `<div class="content-area">

function renderFrameworks() {

  const fwColors = {'ISO 27001':'badge-info','NIST CSF':'badge-success','SOC 2':'badge-purple','GDPR':'badge-warning','CIS':'badge-high','HIPAA':'badge-gray'};

function addControlFromLibrary(id, name, fw) {
  const s = store();
  if (s.controls.find(c=>c.frameworkRef===id)) { showToast('Control already in your library'); return; }
  updateStore(s => {
    s.controls.push({id:genId('CTRL'),name,framework:fw,frameworkRef:id,status:'Planned',owner:'',description:'',risks:[],evidence:[]});
  });
  showToast(`Added "${name}" to your controls`);
}

  const stBadge = st => ({Open:'badge-critical',Investigating:'badge-high',Mitigated:'badge-warning','Resolved':'badge-success'}[st]||'badge-gray');
  const dotColor = sv => ({Critical:'#f05252',High:'#f5a623',Medium:'#f5d020',Low:'#2ecc8a'}[sv]||'#8b98b5');

  const filter = filterStates.incidents || 'All';
  let incidents = s.incidents;
  if (filter !== 'All') incidents = incidents.filter(i => i.status === filter);
  if (searchQuery) incidents = incidents.filter(i=>i.title.toLowerCase().includes(searchQuery.toLowerCase()));

  return `<div class="content-area">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2>Incident Management</h2>
        <p>${s.incidents.length} incidents · ${s.incidents.filter(i=>i.status!=='Resolved'&&i.status!=='Mitigated').length} active</p>
      </div>
      <button class="btn btn-primary" onclick="showModal({type:'add-incident'})">+ Log Incident</button>
    </div>
    <div class="filter-bar">
      ${['All','Open','Investigating','Mitigated','Resolved'].map(t=>`<div class="filter-chip ${filter===t?'active':''}" onclick="filterStates.incidents='${t}';render()">${t}</div>`).join('')}
    </div>
    <div class="grid grid-2" style="gap:16px">
      ${incidents.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🚨</div><h3>No incidents found</h3></div></div>`:
      incidents.map(inc=>{
        const affectedAssets = s.assets.filter(a=>inc.affectedAssets&&inc.affectedAssets.includes(a.id));
        const linkedRisks = s.risks.filter(r=>inc.linkedRisks&&inc.linkedRisks.includes(r.id));
        return `<div class="card" style="border-left:3px solid ${dotColor(inc.severity)}">
          <div class="card-header">
            <div class="card-title"><span class="severity-dot dot-${inc.severity.toLowerCase()}"></span>${inc.title}</div>
            <span class="badge ${stBadge(inc.status)}">${inc.status}</span>
          </div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">${inc.description}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:12px">
            <div><span style="color:var(--text-muted)">Date: </span>${inc.date}</div>
            <div><span style="color:var(--text-muted)">Severity: </span><span class="badge ${sevBadge(inc.severity)}">${inc.severity}</span></div>
            ${inc.rootCause?`<div style="grid-column:span 2"><span style="color:var(--text-muted)">Root Cause: </span>${inc.rootCause}</div>`:''}
          </div>
          ${inc.responseActions?`<div style="background:var(--bg-surface);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--accent)">
            <strong style="color:var(--text-secondary)">Response:</strong> ${inc.responseActions}
          </div>`:''}
          ${inc.lessonsLearned?`<div style="background:var(--green-dim);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:8px;border-left:2px solid var(--green)">
            <strong style="color:var(--green)">Lessons Learned:</strong> ${inc.lessonsLearned}
          </div>`:''}
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);margin-bottom:12px">
            ${affectedAssets.length>0?`<span>🖥️ ${affectedAssets.map(a=>a.name).join(', ')}</span>`:''}
            ${linkedRisks.length>0?`<span>⚠️ ${linkedRisks.map(r=>r.id).join(', ')}</span>`:''}
          </div>
          <div class="action-row">
            <button class="btn btn-secondary btn-sm" onclick="showModal({type:'edit-incident',id:'${inc.id}'})">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteRecord('incidents','${inc.id}')">Delete</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

    if (!a) return '';
    title = `Audit: ${a.name}`;
    const linkedControls = s.controls.filter(c=>a.controls&&a.controls.includes(c.id));
    const linkedEvidence = s.evidence.filter(e=>a.evidence&&a.evidence.includes(e.id));
    content = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px">
        <div><span style="color:var(--text-muted)">Framework</span><br/><strong>${a.framework}</strong></div>
        <div><span style="color:var(--text-muted)">Lead</span><br/><strong>${a.lead}</strong></div>
        <div><span style="color:var(--text-muted)">Start</span><br/><strong>${a.startDate}</strong></div>
        <div><span style="color:var(--text-muted)">End</span><br/><strong>${a.endDate}</strong></div>
      </div>
      ${a.findings?`<div style="background:var(--bg-surface);border-radius:var(--radius);padding:12px;font-size:13px;margin-bottom:16px;border-left:3px solid var(--orange)"><strong>Findings:</strong><br/>${a.findings}</div>`:''}
      <div class="card-title" style="margin-bottom:8px">Linked Controls (${linkedControls.length})</div>
      ${linkedControls.length>0?`<div style="margin-bottom:16px">${linkedControls.map(c=>`<span class="badge badge-info" style="margin:2px">${c.name}</span>`).join('')}</div>`:
      '<div style="color:var(--text-muted);font-size:12px;margin-bottom:16px">No controls linked</div>'}
      <div class="card-title" style="margin-bottom:8px">Evidence (${linkedEvidence.length})</div>
      ${linkedEvidence.length>0?linkedEvidence.map(e=>`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">📄 ${e.name} · ${e.uploadedAt}</div>`).join(''):
      '<div style="color:var(--text-muted);font-size:12px">No evidence linked</div>'}
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>`;
  }

  if (!content) return '';

  return `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        ${content}
      </div>
    </div>`;
}

// =============================================
// CRUD OPERATIONS
// =============================================
function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function saveAsset(editId) {
  const name = val('f-name');
  if(!name) { alert('Name is required'); return; }
  updateStore(s => {
    const data = {name,owner:val('f-owner'),type:val('f-type'),status:val('f-status'),classification:val('f-classification'),criticality:val('f-criticality'),description:val('f-description')};
    if(editId) { const i=s.assets.findIndex(a=>a.id===editId); if(i>=0) Object.assign(s.assets[i],data); }
    else s.assets.push({id:genId('A'),risks:[],controls:[],...data});
  });
  closeModal();
  showToast(editId?'Asset updated':'Asset added');
}

function saveRisk(editId) {
  const desc = val('f-description');
  if(!desc) { alert('Description is required'); return; }
  const l = parseInt(val('f-likelihood')||1);
  const i = parseInt(val('f-impact')||1);
  const sc = l*i;
  const cat = riskCategory(sc);
  updateStore(s => {
    const data = {description:desc,assetId:val('f-assetId'),owner:val('f-owner'),likelihood:l,impact:i,score:sc,category:cat,status:val('f-status'),mitigationPlan:val('f-mitigation'),controlIds:[]};
    if(editId) { const idx=s.risks.findIndex(r=>r.id===editId); if(idx>=0) Object.assign(s.risks[idx],data); }
    else s.risks.push({id:genId('R'),createdAt:new Date().toISOString().slice(0,10),...data});
  });
  closeModal();
  showToast(editId?'Risk updated':'Risk added to register');
}

function saveAudit(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }
  updateStore(s => {
    const data = {name,framework:val('f-framework'),status:val('f-status'),lead:val('f-lead'),startDate:val('f-startDate'),endDate:val('f-endDate'),findings:val('f-findings')};
    if(editId) { const i=s.audits.findIndex(a=>a.id===editId); if(i>=0) Object.assign(s.audits[i],data); }
    else s.audits.push({id:genId('AUD'),controls:[],evidence:[],createdAt:new Date().toISOString().slice(0,10),...data});
  });
  closeModal();
  showToast(editId?'Audit updated':'Audit created');
}

function saveEvidence(editId) {
  const name = val('f-name');
  if(!name) { alert('File name required'); return; }
  updateStore(s => {
    const data = {name,type:val('f-type'),linkedTo:val('f-linkedTo'),size:val('f-size')||'—',mime:'application/octet-stream',uploadedBy:val('f-uploadedBy')||'Chris Olowo',uploadedAt:new Date().toISOString().slice(0,10),checksum:'sha256:pending'};
    if(editId) { const i=s.evidence.findIndex(e=>e.id===editId); if(i>=0) Object.assign(s.evidence[i],data); }

    const data = {title,description:val('f-description'),severity:val('f-severity'),status:val('f-status'),date:val('f-date'),rootCause:val('f-rootCause'),responseActions:val('f-responseActions'),lessonsLearned:val('f-lessonsLearned'),affectedAssets:[],linkedRisks:[],linkedControls:[]};
    if(editId) { const i=s.incidents.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.incidents[i],data); }

function saveSoa(editId) {
  const ref = val('f-controlRef'); const name = val('f-controlName');
  if(!ref||!name) { alert('Control Ref and Name required'); return; }
  updateStore(s => {
    const data = {controlRef:ref,controlName:name,applicable:val('f-applicable')==='true',justification:val('f-justification'),measures:val('f-measures'),status:val('f-status'),evidence:''};
    if(editId) { const i=s.soa.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.soa[i],data); }
    else s.soa.push({id:genId('SOA'),...data});

}

function saveControl(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }

    const data = {name,framework:val('f-framework'),status:val('f-status'),owner:val('f-owner'),description:val('f-description'),frameworkRef:'',risks:[],evidence:[]};

    else s.controls.push({id:genId('CTRL'),...data});
  });

function saveVendor(editId) {
  const name = val('f-name');
  if(!name) { alert('Name required'); return; }
  updateStore(s => {
    const data = {name,service:val('f-service'),riskRating:val('f-riskRating'),status:val('f-status'),contact:val('f-contact'),lastAssessed:new Date().toISOString().slice(0,10)};
    if(editId) { const i=s.vendors.findIndex(x=>x.id===editId); if(i>=0) Object.assign(s.vendors[i],data); }
    else s.vendors.push({id:genId('V'),...data});
  });
  closeModal();
  showToast(editId?'Vendor updated':'Vendor added');
}

function saveBia() {
  const svc = val('f-service');
  if(!svc) { alert('Service name required'); return; }
  updateStore(s => {
    s.resilience.push({id:genId('BIA'),service:svc,assetId:val('f-assetId'),rto:val('f-rto'),rpo:val('f-rpo'),criticality:val('f-criticality'),maxTolerance:val('f-maxTolerance'),dependencies:[],annualCost:'',status:'Documented',lastReviewed:new Date().toISOString().slice(0,10)});
  });
  closeModal();
  showToast('BIA entry added');
}

function deleteRecord(entity, id) {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  updateStore(s => { s[entity] = s[entity].filter(x=>x.id!==id); });
  showToast('Record deleted');
}

function updateScorePreview() {
  const l = parseInt(document.getElementById('f-likelihood')?.value||1);
  const i = parseInt(document.getElementById('f-impact')?.value||1);
  const sc = l*i;
  const cat = riskCategory(sc);
  const sv = document.getElementById('score-val');
  const cv = document.getElementById('cat-val');
  if(sv) sv.textContent = sc;
  if(cv) { cv.textContent = cat; cv.className='badge badge-'+cat.toLowerCase(); }
}

function resetToSeed() {
  if (!confirm('Reset all data to seed? This will overwrite your current data.')) return;
  saveStore(SEED_DATA);
  render();
  showToast('Data reset to demo seed');
}

// =============================================
// MAIN RENDER
// =============================================
function render() {
  const viewRenderers = {
    dashboard: renderDashboard,
    assets: renderAssets,
    vendors: renderVendors,
    risks: renderRisks,
    matrix: renderMatrix,
    frameworks: renderFrameworks,
    controls: renderControls,
    audits: renderAudits,
    evidence: renderEvidence,
    soa: renderSoa,
    resilience: renderResilience,
    incidents: renderIncidents,
  };

  const renderer = viewRenderers[currentView] || renderDashboard;
  const appEl = document.getElementById('app');

  appEl.innerHTML = `
    ${renderSidebar()}
    <div class="main-area">
      ${renderTopbar()}
      ${renderer()}
    </div>
    ${renderModal()}
  `;
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const gs = document.getElementById('global-search');
    if (gs) gs.focus();
  }
  if (e.key === 'Escape' && modalState) closeModal();
});

// Boot
initStore();
render();
</script>
